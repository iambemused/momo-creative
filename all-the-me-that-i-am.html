    // ─── WORLD EVENT MODAL ───
    function WorldEventModal({ we, dob, onSave, onCancel }) {
      const {S} = React.useContext(AppCtx);
      const [title, setTitle] = useState(we?.title || "");
      const [year,  setYear]  = useState(we?.year  || "");
      const [notes, setNotes] = useState(we?.notes || "");
      const myAge = dob && year ? Math.floor(parseInt(year) - (new Date(dob).getFullYear() + new Date(dob).getMonth()/12)) : null;
      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={{...S.modal, maxWidth:420}} onClick={e => e.stopPropagation()}>
            <h3 style={{...S.modalTitle, marginBottom:4}}>
              {we ? "Edit world event" : "Add a world event"}
            </h3>
            <p style={{fontSize:12,color:"#5a4e3e",marginBottom:18,fontFamily:"'Cormorant Garamond',Georgia,serif",lineHeight:1.6}}>
              Something that happened in the world you were alive for — context behind the self.
            </p>
            <div style={S.modalField}>
              <label style={S.label}>What happened?</label>
              <input style={S.input} value={title} onChange={e=>setTitle(e.target.value)}
                placeholder="e.g. Moon landing, Berlin Wall falls, First iPhone…" autoFocus />
            </div>
            <div style={S.modalField}>
              <label style={S.label}>Year</label>
              <input style={S.input} type="number" value={year} onChange={e=>setYear(e.target.value)}
                placeholder="e.g. 1969" min={1800} max={2100} />
              {myAge !== null && (
                <span style={S.ageHint}>
                  {myAge >= 0 ? ` You were ${myAge} years old.` : ` ${Math.abs(myAge)} years before you were born.`}
                </span>
              )}
            </div>
            <div style={S.modalField}>
              <label style={S.label}>Notes <span style={{color:"#5a4e3e",fontWeight:400}}>(optional)</span></label>
              <textarea style={S.textarea} rows={2} value={notes} onChange={e=>setNotes(e.target.value)}
                placeholder="Your memory of it, why it matters to you…" />
            </div>
            <div style={S.modalActions}>
              <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
              <button style={S.saveBtn} onClick={() => onSave({title:title.trim(),year,notes:notes.trim()})}
                disabled={!title.trim()||!year}>
                {we ? "Update" : "Add to world"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── STRAND MODAL ─── conversational entry for the people who constitute a life
    function StrandModal({ strand, dob, onSave, onCancel }) {
      const {S} = React.useContext(AppCtx);
      const isEditing = !!strand;
      const [step,          setStep]          = useState(isEditing ? 1 : 0);
      const [type,          setType]          = useState(strand?.type || null);
      const [name,          setName]          = useState(strand?.name || "");
      const [personDob,     setPersonDob]     = useState(strand?.personDob || "");
      const [enteredLifeAt, setEnteredLifeAt] = useState(strand?.enteredLifeAt || "");
      const [closedAt,      setClosedAt]      = useState(strand?.closedAt || "");
      const [notes,         setNotes]         = useState(strand?.notes || "");
      const [isPresent,     setIsPresent]     = useState(strand ? strand.status==="active" : true);
      const [howClosed,     setHowClosed]     = useState(
        strand?.status==="deceased" ? "deceased"
        : strand?.status==="estranged" ? "estranged"
        : "separation"
      );
      const [relationship,  setRelationship]  = useState(strand?.relationship || "mother");
      const [extendedDesc,  setExtendedDesc]  = useState(strand?.extendedDesc || "");
      const [atHome,        setAtHome]        = useState(() => {
        if (!strand || (strand.type !== "child" && strand.type !== "grandchild")) return "yes";
        const visitPhase = (strand.phases||[]).find(p => p.label === "visiting");
        const leftPhase  = (strand.phases||[]).find(p => p.label === "left_home");
        if (visitPhase) return "visiting";
        if (leftPhase)  return "no";
        return "yes";
      });
      const [leftHomeAt,    setLeftHomeAt]    = useState(() => {
        if (!strand || (strand.type !== "child" && strand.type !== "grandchild")) return "";
        const visitPhase = (strand.phases||[]).find(p => p.label === "visiting");
        const leftPhase  = (strand.phases||[]).find(p => p.label === "left_home");
        return (visitPhase || leftPhase)?.startDate || "";
      });
      const [siblingDob,     setSiblingDob]    = useState(strand?.siblingDob || strand?.personDob || "");
      const [siblingFromBirth, setSiblingFromBirth] = useState(
        strand?.type === "sibling" ? (strand?.siblingFromBirth !== false) : true
      );

      // Date precision state — shared across all date fields
      const [datePrecision, setDatePrecision] = useState("year"); // "year" | "month" | "full"

      const typeInfo = STRAND_TYPES.find(t => t.id === type);

      const dateInput = (value, setValue, placeholder="Year, e.g. 1978") => (
        <div>
          <div style={{display:"flex", gap:6, marginBottom:6}}>
            {[{id:"year",l:"Year"},{id:"month",l:"Month & year"},{id:"full",l:"Exact date"}].map(opt => (
              <button key={opt.id} onClick={() => { setDatePrecision(opt.id); setValue(""); }}
                style={{
                  padding:"3px 9px", borderRadius:3, cursor:"pointer", fontSize:11, border:"none",
                  fontFamily:"'DM Sans',system-ui,sans-serif",
                  background: datePrecision===opt.id ? "rgba(180,168,145,0.2)" : "rgba(180,168,145,0.06)",
                  color: datePrecision===opt.id ? "#e8dcc8" : "#6a5e4e",
                  outline: datePrecision===opt.id ? "1px solid rgba(180,168,145,0.3)" : "1px solid rgba(180,168,145,0.1)",
                }}>{opt.l}</button>
            ))}
          </div>
          {datePrecision==="full"  && <input style={S.input} type="date"   value={value} onChange={e=>setValue(e.target.value)} />}
          {datePrecision==="month" && <input style={S.input} type="month"  value={value} onChange={e=>setValue(e.target.value)} />}
          {datePrecision==="year"  && <input style={S.input} type="number" value={value} onChange={e=>setValue(e.target.value)} placeholder={placeholder} min={1900} max={2100} />}
          {value && dob && (() => {
            const a = getAgeAt(dob, value);
            return a !== null ? <span style={S.ageHint}> (your age: {a})</span> : null;
          })()}
        </div>
      );

      // Build phases from conversation answers
      const buildPhases = () => {
        if (type === "child") {
          if (atHome === "yes") {
            return [{ id: generateId(), label:"at_home", startDate: enteredLifeAt, endDate: "ongoing", autoGenerated: true }];
          }
          if (atHome === "visiting") {
            // Born/entered life → visiting from separation date (or same date if they never lived with you)
            const phases = [];
            if (leftHomeAt && leftHomeAt !== enteredLifeAt) {
              phases.push({ id: generateId(), label:"at_home", startDate: enteredLifeAt, endDate: leftHomeAt, autoGenerated: true });
            }
            phases.push({ id: generateId(), label:"visiting", startDate: leftHomeAt || enteredLifeAt, endDate: "ongoing", autoGenerated: true });
            return phases;
          }
          // atHome === "no"
          const phases = [{ id: generateId(), label:"at_home", startDate: enteredLifeAt, endDate: leftHomeAt || "ongoing", autoGenerated: true }];
          if (leftHomeAt) phases.push({ id: generateId(), label:"left_home", startDate: leftHomeAt, endDate: "ongoing", autoGenerated: true });
          return phases;
        }
        if (type === "grandchild") {
          const phases = [{ id: generateId(), label:"at_home", startDate: enteredLifeAt, endDate: atHome==="yes" ? "ongoing" : (leftHomeAt||"ongoing"), autoGenerated: true }];
          if (atHome !== "yes" && leftHomeAt) phases.push({ id: generateId(), label:"left_home", startDate: leftHomeAt, endDate: "ongoing", autoGenerated: true });
          return phases;
        }
        if (type === "friend") {
          return [{ id: generateId(), label: isPresent ? "close" : "distant", startDate: enteredLifeAt, endDate: isPresent ? "ongoing" : (closedAt||null), autoGenerated: true }];
        }
        return [{ id: generateId(), label:"active", startDate: enteredLifeAt, endDate: isPresent ? "ongoing" : (closedAt||null), autoGenerated: true }];
      };

      const handleSave = () => {
        // For siblings: enteredLifeAt is derived — if from birth, use the user's own DOB.
        // If not from birth, use the explicitly entered date.
        const finalEnteredLifeAt = type === "sibling"
          ? (siblingFromBirth ? (dob || siblingDob || enteredLifeAt) : enteredLifeAt)
          : enteredLifeAt;
        if (!type || !finalEnteredLifeAt) return;
        const finalStatus = isPresent ? "active"
          : howClosed === "deceased" ? "deceased"
          : howClosed === "estranged" ? "estranged" : "transitioned";
        onSave({
          type, name: name.trim() || null,
          personDob: (type==="parent"||type==="grandparent"||type==="partner"||type==="child"||type==="grandchild"||type==="friend") ? (personDob.trim()||null) : null,
          siblingDob: type === "sibling" ? (siblingDob||null) : null,
          siblingFromBirth: type === "sibling" ? siblingFromBirth : null,
          enteredLifeAt: finalEnteredLifeAt,
          closedAt: isPresent ? null : (closedAt || null),
          status: finalStatus,
          notes: notes.trim(),
          relationship: (type==="parent"||type==="grandparent") ? relationship : null,
          extendedDesc: (type==="extended"||type==="friend") ? extendedDesc : null,
          phases: isEditing ? (strand.phases||[]) : buildPhases(),
        });
      };

      const whenLabel = (t) => {
        if (t === "child")       return "When were they born — or when did they come into your life?";
        if (t === "grandchild")  return "When were they born?";
        if (t === "partner")     return "When did this relationship begin?";
        if (t === "parent")      return "Were they present from your birth? If so, enter your birth year.";
        if (t === "grandparent") return "Were they part of your life growing up? Enter the year they were present from.";
        if (t === "friend")      return "When did this friendship begin?";
        if (t === "extended")    return "From when were they a significant part of your world?";
        return "When did they enter your life?";
      };

      const RELS = {
        parent:      ["Mother","Father","Step-mother","Step-father","Adoptive mother","Adoptive father","Other"],
        grandparent: ["Maternal grandmother","Maternal grandfather","Paternal grandmother","Paternal grandfather","Other"],
      };

      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={{...S.modal, maxWidth:460}} onClick={e => e.stopPropagation()}>

            {/* STEP 0 — choose type (new only) */}
            {step === 0 && <>
              <h3 style={{...S.modalTitle, marginBottom:6}}>Add a person</h3>
              <p style={{fontSize:13, color:"#8a7e6b", marginBottom:18, fontFamily:"'Cormorant Garamond',Georgia,serif", lineHeight:1.6}}>
                Who is this person to you?
              </p>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:20}}>
                {STRAND_TYPES.map(t => (
                  <button key={t.id} onClick={() => setType(t.id)} style={{
                    padding:"12px 10px", borderRadius:6, cursor:"pointer", textAlign:"left",
                    fontFamily:"'DM Sans',system-ui,sans-serif", border:"none",
                    background: type===t.id ? `${t.color}22` : "rgba(180,168,145,0.07)",
                    outline: type===t.id ? `1.5px solid ${t.color}66` : "1px solid rgba(180,168,145,0.12)",
                    transition:"all 0.18s",
                  }}>
                    <div style={{fontSize:18, marginBottom:4}}>{t.emoji}</div>
                    <div style={{fontSize:13, fontWeight:600, color: type===t.id ? t.color : "#c8bca8"}}>{t.label}</div>
                    <div style={{fontSize:11, color:"#6a5e4e", marginTop:2}}>{t.desc}</div>
                  </button>
                ))}
              </div>
              <div style={S.modalActions}>
                <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
                <button style={S.saveBtn} onClick={() => setStep(1)} disabled={!type}>Next →</button>
              </div>
            </>}

            {/* STEP 1 — name, optional DOB, relationship label, when they entered your life */}
            {step === 1 && <>
              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:16}}>
                <span style={{fontSize:22}}>{typeInfo?.emoji}</span>
                <h3 style={{...S.modalTitle, margin:0}}>{isEditing ? "Edit" : ""} {typeInfo?.label}</h3>
              </div>

              {(type==="parent"||type==="grandparent") && (
                <div style={S.modalField}>
                  <label style={S.label}>Which {type}?</label>
                  <select style={S.select} value={relationship} onChange={e=>setRelationship(e.target.value)}>
                    {(RELS[type]||[]).map(r => <option key={r} value={r.toLowerCase().replace(/ /g,"_")}>{r}</option>)}
                  </select>
                </div>
              )}

              <div style={S.modalField}>
                <label style={S.label}>Name <span style={{color:"#5a4e3e", fontWeight:400}}>(optional)</span></label>
                <input style={S.input} value={name} onChange={e=>setName(e.target.value)}
                  placeholder={type==="extended" ? "e.g. Large family, Wellington, New Zealand" : "First name, or however you'd refer to them"}
                  autoFocus />
              </div>

              {/* Date of birth — for parents, grandparents, partners, children, grandchildren and friends */}
              {(type==="parent"||type==="grandparent"||type==="partner"||type==="child"||type==="grandchild"||type==="friend") && (
                <div style={S.modalField}>
                  <label style={S.label}>Their date of birth <span style={{color:"#5a4e3e", fontWeight:400}}>(optional)</span></label>
                  <div style={{display:"flex", gap:6, marginBottom:6}}>
                    {[{id:"year",l:"Year"},{id:"month",l:"Month & year"},{id:"full",l:"Exact date"}].map(opt => (
                      <button key={opt.id} onClick={() => setDatePrecision(opt.id)}
                        style={{
                          padding:"3px 9px", borderRadius:3, cursor:"pointer", fontSize:11, border:"none",
                          fontFamily:"'DM Sans',system-ui,sans-serif",
                          background: datePrecision===opt.id ? "rgba(180,168,145,0.2)" : "rgba(180,168,145,0.06)",
                          color: datePrecision===opt.id ? "#e8dcc8" : "#6a5e4e",
                          outline: datePrecision===opt.id ? "1px solid rgba(180,168,145,0.3)" : "1px solid rgba(180,168,145,0.1)",
                        }}>{opt.l}</button>
                    ))}
                  </div>
                  {datePrecision==="full"  && <input style={S.input} type="date"   value={personDob} onChange={e=>setPersonDob(e.target.value)} />}
                  {datePrecision==="month" && <input style={S.input} type="month"  value={personDob} onChange={e=>setPersonDob(e.target.value)} />}
                  {datePrecision==="year"  && <input style={S.input} type="number" value={personDob} onChange={e=>setPersonDob(e.target.value)} placeholder="e.g. 1942" min={1880} max={2050} />}
                </div>
              )}

              {type==="extended" && (
                <div style={S.modalField}>
                  <label style={S.label}>Describe this family world</label>
                  <textarea style={S.textarea} rows={2} value={extendedDesc} onChange={e=>setExtendedDesc(e.target.value)}
                    placeholder="e.g. Ten aunties, six uncles, dozens of cousins — Christmas filled a room" />
                </div>
              )}

              {/* Sibling — birthdate first, then "were they in your life from birth?" */}
              {type === "sibling" ? (
                <>
                  <div style={S.modalField}>
                    <label style={S.label}>Their date of birth</label>
                    {dateInput(siblingDob, setSiblingDob, "e.g. 1978")}
                  </div>
                  <div style={S.modalField}>
                    <label style={S.label}>Were they part of your life from birth?</label>
                    <div style={{fontSize:11, color:"#6a5e4e", marginBottom:6, fontStyle:"italic"}}>
                      Most siblings are — but some may have been away, adopted out, or otherwise absent until later.
                    </div>
                    <div style={{display:"flex", gap:8}}>
                      {[{v:true,l:"Yes, from birth"},{v:false,l:"No, they came in later"}].map(opt => (
                        <button key={String(opt.v)} onClick={() => setSiblingFromBirth(opt.v)} style={{
                          flex:1, padding:"9px 0", borderRadius:5, cursor:"pointer",
                          fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:12, border:"none",
                          background: siblingFromBirth===opt.v ? "rgba(128,222,234,0.15)" : "rgba(180,168,145,0.07)",
                          color: siblingFromBirth===opt.v ? "#80DEEA" : "#8a7e6b",
                          outline: siblingFromBirth===opt.v ? "1.5px solid rgba(128,222,234,0.35)" : "1px solid rgba(180,168,145,0.12)",
                          transition:"all 0.18s",
                        }}>{opt.l}</button>
                      ))}
                    </div>
                  </div>
                  {!siblingFromBirth && (
                    <div style={S.modalField}>
                      <label style={S.label}>When did they enter your life?</label>
                      {dateInput(enteredLifeAt, setEnteredLifeAt, "Year")}
                    </div>
                  )}
                </>
              ) : (
                <div style={S.modalField}>
                  <label style={S.label}>When did they enter your life?</label>
                  <div style={{fontSize:11, color:"#6a5e4e", marginBottom:6, fontStyle:"italic"}}>
                    {whenLabel(type)}
                  </div>
                  {dateInput(enteredLifeAt, setEnteredLifeAt)}
                </div>
              )}

              <div style={S.modalField}>
                <label style={S.label}>Notes <span style={{color:"#5a4e3e", fontWeight:400}}>(optional)</span></label>
                <textarea style={S.textarea} rows={2} value={notes} onChange={e=>setNotes(e.target.value)}
                  placeholder="A few words — context, texture, what this person means to you" />
              </div>

              <div style={{display:"flex", gap:8}}>
                {!isEditing && <button style={{...S.cancelBtn, flex:0}} onClick={() => setStep(0)}>← Back</button>}
                <div style={{flex:1}}/>
                <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
                <button style={S.saveBtn} onClick={() => isEditing ? handleSave() : setStep(2)}
                  disabled={type === "sibling" ? (!siblingDob && !siblingFromBirth) : !enteredLifeAt}>
                  {isEditing ? "Update" : "Next →"}
                </button>
              </div>
            </>}

            {/* STEP 2 — present / ended / child phase (new only) */}
            {step === 2 && <>
              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:16}}>
                <span style={{fontSize:22}}>{typeInfo?.emoji}</span>
                <h3 style={{...S.modalTitle, margin:0}}>{name || typeInfo?.label}</h3>
              </div>

              {type === "child" && <>
                <div style={S.modalField}>
                  <label style={S.label}>How are they present in your life?</label>
                  <div style={{display:"flex", flexDirection:"column", gap:6, marginTop:4}}>
                    {[
                      {v:"yes",      l:"Living with me",         sub:"They're at home with you"},
                      {v:"visiting", l:"Actively in my life",    sub:"Regular contact — visits, dinners, their own key to the door"},
                      {v:"no",       l:"Grown and gone their own way", sub:"Independent — still your child, but the daily presence has passed"},
                    ].map(opt => (
                      <button key={opt.v} onClick={() => setAtHome(opt.v)} style={{
                        padding:"9px 12px", borderRadius:5, cursor:"pointer", textAlign:"left",
                        fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:12, border:"none",
                        background: atHome===opt.v ? "rgba(129,199,132,0.18)" : "rgba(180,168,145,0.07)",
                        color: atHome===opt.v ? "#81C784" : "#8a7e6b",
                        outline: atHome===opt.v ? "1.5px solid rgba(129,199,132,0.4)" : "1px solid rgba(180,168,145,0.12)",
                        transition:"all 0.18s",
                      }}>
                        <div style={{fontWeight:600}}>{opt.l}</div>
                        <div style={{fontSize:11, marginTop:2, opacity:0.7}}>{opt.sub}</div>
                      </button>
                    ))}
                  </div>
                </div>
                {(atHome === "visiting" || atHome === "no") && (
                  <div style={S.modalField}>
                    <label style={S.label}>
                      {atHome === "visiting"
                        ? "From when? (e.g. year things shifted)"
                        : "When did this chapter begin?"}
                    </label>
                    {dateInput(leftHomeAt, setLeftHomeAt, "Year, e.g. 2000")}
                  </div>
                )}
                <div style={S.modalField}>
                  <label style={S.label}>Notes <span style={{color:"#5a4e3e", fontWeight:400}}>(optional — for the real story)</span></label>
                  <textarea style={S.textarea} rows={2} value={notes} onChange={e=>setNotes(e.target.value)}
                    placeholder="e.g. Tuesday family dinners every week for 20 years — the heart of everything" />
                </div>
              </>}

              {type === "grandchild" && <>
                <div style={S.modalField}>
                  <label style={S.label}>Do they live with you?</label>
                  <div style={{display:"flex", gap:8, marginTop:4}}>
                    {[{v:"yes",l:"Yes, at home"},{v:"no",l:"No, nearby or away"}].map(opt => (
                      <button key={opt.v} onClick={() => setAtHome(opt.v)} style={{
                        flex:1, padding:"9px 0", borderRadius:5, cursor:"pointer",
                        fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:12, border:"none",
                        background: atHome===opt.v ? "rgba(174,213,129,0.18)" : "rgba(180,168,145,0.07)",
                        color: atHome===opt.v ? "#AED581" : "#8a7e6b",
                        outline: atHome===opt.v ? "1.5px solid rgba(174,213,129,0.4)" : "1px solid rgba(180,168,145,0.12)",
                        transition:"all 0.18s",
                      }}>{opt.l}</button>
                    ))}
                  </div>
                </div>
                {atHome === "no" && (
                  <div style={S.modalField}>
                    <label style={S.label}>Since when? <span style={{color:"#5a4e3e", fontWeight:400}}>(optional)</span></label>
                    {dateInput(leftHomeAt, setLeftHomeAt, "Year, e.g. 2022")}
                  </div>
                )}
              </>}

              {type === "friend" && <>
                <div style={S.modalField}>
                  <label style={S.label}>Are you still close?</label>
                  <div style={{display:"flex", gap:8, marginTop:4}}>
                    {[{v:true,l:"Yes, still close"},{v:false,l:"We've drifted"}].map(opt => (
                      <button key={String(opt.v)} onClick={() => setIsPresent(opt.v)} style={{
                        flex:1, padding:"9px 0", borderRadius:5, cursor:"pointer",
                        fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:12, border:"none",
                        background: isPresent===opt.v ? "rgba(255,183,77,0.18)" : "rgba(180,168,145,0.07)",
                        color: isPresent===opt.v ? "#FFB74D" : "#8a7e6b",
                        outline: isPresent===opt.v ? "1.5px solid rgba(255,183,77,0.4)" : "1px solid rgba(180,168,145,0.12)",
                        transition:"all 0.18s",
                      }}>{opt.l}</button>
                    ))}
                  </div>
                </div>
                {!isPresent && (
                  <div style={S.modalField}>
                    <label style={S.label}>When did you drift apart?</label>
                    {dateInput(closedAt, setClosedAt, "Year")}
                  </div>
                )}
                <div style={S.modalField}>
                  <label style={S.label}>Have they ever moved away? <span style={{color:"#5a4e3e", fontWeight:400}}>(optional note)</span></label>
                  <input style={S.input} value={extendedDesc} onChange={e=>setExtendedDesc(e.target.value)}
                    placeholder="e.g. Moved to Sydney 1998 — still close regardless" />
                  <div style={{fontSize:11,color:"#5a4e3e",marginTop:4,fontStyle:"italic"}}>
                    Distance doesn't end a friendship — this is just context for your record.
                  </div>
                </div>
              </>}

              {(type !== "child" && type !== "grandchild" && type !== "friend") && <>
                <div style={S.modalField}>
                  <label style={S.label}>
                    {type==="partner" ? "Are you still together?" :
                     type==="extended" ? "Is this family world still part of your life?" :
                     "Are they still living?"}
                  </label>
                  <div style={{display:"flex", gap:8, marginTop:4}}>
                    {[{v:true,l:"Yes"},{v:false,l:"No"}].map(opt => (
                      <button key={String(opt.v)} onClick={() => setIsPresent(opt.v)} style={{
                        flex:1, padding:"9px 0", borderRadius:5, cursor:"pointer",
                        fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:12, border:"none",
                        background: isPresent===opt.v ? "rgba(180,168,145,0.18)" : "rgba(180,168,145,0.07)",
                        color: isPresent===opt.v ? "#e8dcc8" : "#8a7e6b",
                        outline: isPresent===opt.v ? "1.5px solid rgba(180,168,145,0.35)" : "1px solid rgba(180,168,145,0.12)",
                        transition:"all 0.18s",
                      }}>{opt.l}</button>
                    ))}
                  </div>
                </div>

                {!isPresent && <>
                  {(type==="parent"||type==="grandparent"||type==="sibling") && (
                    <div style={S.modalField}>
                      <label style={S.label}>How did this end?</label>
                      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:4}}>
                        {[{v:"deceased",l:"They passed away"},{v:"estranged",l:"Estrangement"},{v:"other",l:"Other"}].map(opt=>(
                          <button key={opt.v} onClick={()=>setHowClosed(opt.v)} style={{
                            padding:"6px 12px", borderRadius:4, cursor:"pointer", fontSize:12, border:"none",
                            fontFamily:"'DM Sans',system-ui,sans-serif",
                            background: howClosed===opt.v?"rgba(180,168,145,0.18)":"rgba(180,168,145,0.07)",
                            color: howClosed===opt.v?"#e8dcc8":"#8a7e6b",
                            outline: howClosed===opt.v?"1.5px solid rgba(180,168,145,0.35)":"1px solid rgba(180,168,145,0.12)",
                          }}>{opt.l}</button>
                        ))}
                      </div>
                    </div>
                  )}
                  {type==="partner" && (
                    <div style={S.modalField}>
                      <label style={S.label}>How did this end?</label>
                      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:4}}>
                        {[{v:"separated",l:"Separated"},{v:"divorced",l:"Divorced"},{v:"deceased",l:"They passed away"},{v:"other",l:"Other"}].map(opt=>(
                          <button key={opt.v} onClick={()=>setHowClosed(opt.v)} style={{
                            padding:"6px 12px", borderRadius:4, cursor:"pointer", fontSize:12, border:"none",
                            fontFamily:"'DM Sans',system-ui,sans-serif",
                            background: howClosed===opt.v?"rgba(180,168,145,0.18)":"rgba(180,168,145,0.07)",
                            color: howClosed===opt.v?"#e8dcc8":"#8a7e6b",
                            outline: howClosed===opt.v?"1.5px solid rgba(180,168,145,0.35)":"1px solid rgba(180,168,145,0.12)",
                          }}>{opt.l}</button>
                        ))}
                      </div>
                      <div style={{fontSize:11,color:"#5a4e3e",marginTop:5,fontStyle:"italic"}}>
                        You can record both — add a second closing event in your timeline if needed.
                      </div>
                    </div>
                  )}
                  <div style={S.modalField}>
                    <label style={S.label}>When?</label>
                    {dateInput(closedAt, setClosedAt, "Year")}
                    {howClosed==="deceased" && (
                      <div style={{fontSize:11,color:"#BA68C8",marginTop:5,fontStyle:"italic"}}>
                        A loss event will be added to your timeline automatically.
                      </div>
                    )}
                  </div>
                </>}
              </>}

              <div style={{display:"flex", gap:8}}>
                <button style={{...S.cancelBtn, flex:0}} onClick={() => setStep(1)}>← Back</button>
                <div style={{flex:1}}/>
                <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
                <button style={S.saveBtn} onClick={handleSave}
                  disabled={type === "sibling" ? (!siblingDob && !enteredLifeAt) : !enteredLifeAt}>
                  Add to my world
                </button>
              </div>
            </>}

          </div>
        </div>
      );
    }

    // ─── EVENT MODAL ───
    function EventModal({ event, dob, layers, onSave, onCancel }) {
      const {S} = React.useContext(AppCtx);
      const [title,         setTitle]        = useState(event?.title || "");
      const [layer,         setLayer]        = useState(event?.layer || layers[0].id);
      const [startDate,     setStartDate]    = useState(event?.startDate || "");
      const [endDate,       setEndDate]      = useState(event?.endDate==="ongoing"?"":(event?.endDate||""));
      const [isPeriod,      setIsPeriod]     = useState(!!event?.endDate);
      const [isOngoing,     setIsOngoing]    = useState(event?.endDate==="ongoing");
      const [notes,         setNotes]        = useState(event?.notes || "");
      const [links,         setLinks]        = useState(event?.links || []);
      const [isPrivate,     setIsPrivate]    = useState(event?.isPrivate || false);
      const [isFutureEvent, setIsFutureEvent]= useState(event?.isFutureEvent || false);
      const [futureNature,  setFutureNature] = useState(event?.futureNature || "intention");
      const [reviewDate,    setReviewDate]   = useState(event?.reviewDate || "");
      const [dateInputMode, setDateInputMode]= useState(
        event?.startDate?(/^\d{4}$/.test(event.startDate)?"year":/^\d{4}-\d{2}$/.test(event.startDate)?"month":"full"):"year"
      );
      const [showLinkForm,  setShowLinkForm] = useState(false);
      const [newLinkUrl,    setNewLinkUrl]   = useState("");
      const [newLinkLabel,  setNewLinkLabel] = useState("");

      const FUTURE_NATURES = [
        { id:"intention", label:"Intention",  desc:"Something you're actively working toward",         color:"#29B6F6" },
        { id:"ambition",  label:"Ambition",   desc:"A hoped-for shape of your future self",            color:"#FFD54F" },
        { id:"fear",      label:"Fear",       desc:"Something you're navigating around or bracing for",color:"#F06292" },
        { id:"question",  label:"Question",   desc:"Something unresolved that the future will answer", color:"#BA68C8" },
      ];

      const addLink = () => {
        if (!newLinkUrl) return;
        setLinks([...links, { url: newLinkUrl, label: newLinkLabel || "" }]);
        setNewLinkUrl(""); setNewLinkLabel(""); setShowLinkForm(false);
      };

      const handleSave = () => {
        if (!title || !startDate) return;
        onSave({
          title, layer, startDate,
          endDate: isPeriod?(isOngoing?"ongoing":(endDate||null)):null,
          notes, links, isPrivate,
          isFutureEvent,
          futureNature: isFutureEvent ? futureNature : null,
          reviewDate:   isFutureEvent ? (reviewDate||null) : null,
        });
      };

      const selectedNature = FUTURE_NATURES.find(n=>n.id===futureNature);

      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <h3 style={S.modalTitle}>{event ? "Edit Event" : "Add Life Event"}</h3>

            {/* Past / Future toggle */}
            <div style={{display:"flex",gap:0,marginBottom:20,borderRadius:6,overflow:"hidden",
              border:"1px solid rgba(180,168,145,0.15)"}}>
              <button onClick={()=>setIsFutureEvent(false)} style={{
                flex:1,padding:"8px 0",fontSize:12,cursor:"pointer",
                fontFamily:"'DM Sans',system-ui,sans-serif",border:"none",
                background:!isFutureEvent?"rgba(180,168,145,0.12)":"transparent",
                color:!isFutureEvent?"#e8dcc8":"#6a5e4e",
                fontWeight:!isFutureEvent?600:400,transition:"all 0.2s",
              }}>Lived</button>
              <button onClick={()=>setIsFutureEvent(true)} style={{
                flex:1,padding:"8px 0",fontSize:12,cursor:"pointer",
                fontFamily:"'DM Sans',system-ui,sans-serif",border:"none",
                borderLeft:"1px solid rgba(180,168,145,0.15)",
                background:isFutureEvent?"rgba(197,168,130,0.10)":"transparent",
                color:isFutureEvent?"#c8a84a":"#6a5e4e",
                fontWeight:isFutureEvent?600:400,transition:"all 0.2s",
              }}>Ahead</button>
            </div>

            <div style={S.modalField}>
              <label style={S.label}>{isFutureEvent?"What are you mapping?":"What happened?"}</label>
              <input style={S.input} value={title} onChange={e => setTitle(e.target.value)}
                placeholder={isFutureEvent
                  ?"e.g., Write the book, Leave the city, Find stillness"
                  :"e.g., Started at WSP, Moved to Perth, First marathon"}
                autoFocus />
            </div>

            <div style={S.modalField}>
              <label style={S.label}>Layer</label>
              <select style={S.select} value={layer} onChange={e => setLayer(e.target.value)}>
                {layers.map(l => <option key={l.id} value={l.id}>{l.label} — {l.desc}</option>)}
              </select>
            </div>

            {/* Future nature selector */}
            {isFutureEvent && (
              <div style={S.modalField}>
                <label style={S.label}>Nature</label>
                <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                  {FUTURE_NATURES.map(n => (
                    <button key={n.id} onClick={()=>setFutureNature(n.id)}
                      title={n.desc} style={{
                      padding:"5px 12px",borderRadius:4,fontSize:12,cursor:"pointer",
                      fontFamily:"'DM Sans',system-ui,sans-serif",border:"none",
                      background:futureNature===n.id?`${n.color}22`:"rgba(180,168,145,0.06)",
                      color:futureNature===n.id?n.color:"#8a7e6b",
                      outline:futureNature===n.id?`1px solid ${n.color}55`:"1px solid rgba(180,168,145,0.12)",
                      transition:"all 0.2s",
                    }}>{n.label}</button>
                  ))}
                </div>
                {selectedNature && (
                  <div style={{fontSize:11,color:"#6a5e4b",marginTop:6,fontStyle:"italic"}}>
                    {selectedNature.desc}
                  </div>
                )}
              </div>
            )}

            <div style={S.modalField}>
              <label style={S.label}>Date precision</label>
              <div style={S.radioGroup}>
                {[{id:"full",label:"Exact date"},{id:"month",label:"Month & year"},{id:"year",label:"Year only"}].map(opt => (
                  <label key={opt.id} style={S.radioLabel}>
                    <input type="radio" name="dateMode" checked={dateInputMode===opt.id}
                      onChange={() => {setDateInputMode(opt.id);setStartDate("");setEndDate("");}} />
                    {opt.label}
                  </label>
                ))}
              </div>
            </div>

            <div style={S.modalRow}>
              <div style={{flex:1}}>
                <label style={S.label}>
                  {isFutureEvent?(isPeriod?"From when?":"When?"):(isPeriod?"Start":"When")}
                  {startDate && dob && (() => { const a=getAgeAt(dob,startDate); return a!==null?<span style={S.ageHint}> (age {a})</span>:null; })()}
                </label>
                {dateInputMode==="full"  && <input style={S.input} type="date"   value={startDate} onChange={e=>setStartDate(e.target.value)} />}
                {dateInputMode==="month" && <input style={S.input} type="month"  value={startDate} onChange={e=>setStartDate(e.target.value)} />}
                {dateInputMode==="year"  && <input style={S.input} type="number" value={startDate} onChange={e=>setStartDate(e.target.value)} placeholder="e.g., 2027" min={1900} max={2100} />}
              </div>
            </div>

            <div style={S.modalField}>
              <label style={S.radioLabel}>
                <input type="checkbox" checked={isPeriod} onChange={e=>{setIsPeriod(e.target.checked);if(!e.target.checked)setIsOngoing(false);}} />
                This spans a period of time
              </label>
              {isPeriod && (
                <div style={{marginTop:10}}>
                  <label style={S.radioLabel}>
                    <input type="checkbox" checked={isOngoing} onChange={e=>setIsOngoing(e.target.checked)} />
                    {isFutureEvent?"Open-ended (no fixed end)":"Still ongoing"}
                  </label>
                  {!isOngoing && (
                    <div style={{marginTop:8}}>
                      <label style={S.label}>End
                        {endDate && dob && (() => { const a=getAgeAt(dob,endDate); return a!==null?<span style={S.ageHint}> (age {a})</span>:null; })()}
                      </label>
                      {dateInputMode==="full"  && <input style={S.input} type="date"   value={endDate} onChange={e=>setEndDate(e.target.value)} />}
                      {dateInputMode==="month" && <input style={S.input} type="month"  value={endDate} onChange={e=>setEndDate(e.target.value)} />}
                      {dateInputMode==="year"  && <input style={S.input} type="number" value={endDate} onChange={e=>setEndDate(e.target.value)} placeholder="e.g., 2030" min={1900} max={2100} />}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Review date — future events only */}
            {isFutureEvent && (
              <div style={S.modalField}>
                <label style={S.label}>Review date (optional)</label>
                <input style={S.input} type="date" value={reviewDate} onChange={e=>setReviewDate(e.target.value)} />
                <div style={{fontSize:11,color:"#6a5e4b",marginTop:4}}>
                  When you'd like the app to prompt you to revisit this — to see how you look compared with what you imagined.
                </div>
              </div>
            )}

            <div style={S.modalField}>
              <label style={S.label}>Notes (optional)</label>
              <textarea style={S.textarea} value={notes} onChange={e=>setNotes(e.target.value)}
                placeholder={isFutureEvent
                  ?"Why does this matter? What would it mean if it happens?"
                  :"Any reflections, details, context..."} rows={3} />
            </div>

            <div style={S.modalField}>
              <label style={S.radioLabel}>
                <input type="checkbox" checked={isPrivate} onChange={e=>setIsPrivate(e.target.checked)} />
                <span>Private</span>
                <span style={{fontSize:11,color:"#6a5e4b",marginLeft:4}}>— excluded when printing or sharing</span>
              </label>
            </div>

            <div style={S.modalField}>
              <label style={S.label}>Links & references (optional)</label>
              <div style={S.linksHelp}>Attach URLs to anything that enriches this event.</div>
              {links.length>0 && <div style={S.linksList}>
                {links.map((lk,i) => (
                  <div key={i} style={S.linkItem}>
                    <span style={S.linkItemLabel}>{lk.label||lk.url}</span>
                    <button style={{...S.smallBtn,color:"#c44"}} onClick={()=>setLinks(links.filter((_,j)=>j!==i))}>×</button>
                  </div>
                ))}
              </div>}
              {showLinkForm ? (
                <div style={{marginTop:4}}>
                  <input style={S.input} value={newLinkUrl} onChange={e=>setNewLinkUrl(e.target.value)} placeholder="https://..." />
                  <input style={{...S.input,marginTop:4}} value={newLinkLabel} onChange={e=>setNewLinkLabel(e.target.value)} placeholder="Label (optional)" />
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <button style={S.smallSaveBtn} onClick={addLink}>Add link</button>
                    <button style={S.smallBtn} onClick={()=>setShowLinkForm(false)}>Cancel</button>
                  </div>
                </div>
              ) : (
                <button style={S.addLinkBtn} onClick={()=>setShowLinkForm(true)}>+ Add a link</button>
              )}
            </div>

            <div style={S.modalActions}>
              <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
              <button style={S.saveBtn} onClick={handleSave} disabled={!title||!startDate}>
                {event?"Update":(isFutureEvent?"Add to Ahead":"Add to timeline")}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── CUSTOM LAYER MODAL ───
    function CustomLayerModal({ onSave, onCancel }) {
      const {S} = React.useContext(AppCtx);
      const [label, setLabel] = useState("");
      const [desc, setDesc] = useState("");
      const [color, setColor] = useState("#FF9800");
      const presets = ["#FF9800","#009688","#795548","#607D8B","#E040FB","#FF5252","#448AFF","#69F0AE","#FFD740","#B388FF"];
      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={{...S.modal,maxWidth:400}} onClick={e => e.stopPropagation()}>
            <h3 style={S.modalTitle}>Add Custom Layer</h3>
            <div style={S.modalField}>
              <label style={S.label}>Layer name</label>
              <input style={S.input} value={label} onChange={e => setLabel(e.target.value)}
                placeholder="e.g., Pets, Music, Reading, Faith" autoFocus />
            </div>
            <div style={S.modalField}>
              <label style={S.label}>Description</label>
              <input style={S.input} value={desc} onChange={e => setDesc(e.target.value)} placeholder="What does this layer capture?" />
            </div>
            <div style={S.modalField}>
              <label style={S.label}>Colour</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                {presets.map(c => <div key={c} onClick={() => setColor(c)} style={{
                  width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",
                  border:color===c?"3px solid #e8dcc8":"3px solid transparent",transition:"border 0.15s"}} />)}
                <input type="color" value={color} onChange={e => setColor(e.target.value)}
                  style={{width:28,height:28,border:"none",background:"none",cursor:"pointer"}} />
              </div>
            </div>
            <div style={S.modalActions}>
              <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
              <button style={S.saveBtn} onClick={() => onSave({label,desc,color})} disabled={!label}>Add layer</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── PRINT / SHARE DIALOG ───
    function PrintDialog({ events, layers, dob, name, currentAge, onPrint, onCancel }) {
      const {S} = React.useContext(AppCtx);
      const [includePrivate, setIncludePrivate] = useState(true);
      const [selectedLayers, setSelectedLayers] = useState(layers.map(l => l.id));
      const [printTitle, setPrintTitle] = useState("All The Me That I Am");

      const privateCount = events.filter(e => e.isPrivate).length;
      const privateInSelection = events.filter(e => e.isPrivate && selectedLayers.includes(e.layer)).length;
      const totalInSelection = events.filter(e => selectedLayers.includes(e.layer) && (includePrivate || !e.isPrivate)).length;

      const toggleLayerSel = (id) => {
        setSelectedLayers(prev => prev.includes(id) ? prev.filter(l => l !== id) : [...prev, id]);
      };

      const handlePrint = () => {
        if (!includePrivate && privateInSelection > 0) {
          const ok = confirm(`⚠ Privacy check: ${privateInSelection} private event${privateInSelection > 1 ? 's' : ''} will be EXCLUDED from this print.\n\nThe printed version will contain ${totalInSelection} events across ${selectedLayers.length} layers.\n\nProceed?`);
          if (!ok) return;
        }
        if (includePrivate && privateInSelection > 0) {
          const ok = confirm(`⚠ Privacy warning: You are printing the FULL record, which includes ${privateInSelection} event${privateInSelection > 1 ? 's' : ''} marked as private.\n\nIf this is intended for sharing, consider using "Shareable" mode instead.\n\nProceed with full record?`);
          if (!ok) return;
        }
        onPrint({ includeLayers: selectedLayers, includePrivate, title: printTitle });
      };

      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={{...S.modal,maxWidth:500}} onClick={e => e.stopPropagation()}>
            <h3 style={S.modalTitle}>Print / Share</h3>

            <div style={S.modalField}>
              <label style={S.label}>Document title</label>
              <input style={S.input} value={printTitle} onChange={e => setPrintTitle(e.target.value)} />
            </div>

            <div style={S.modalField}>
              <label style={S.label}>Privacy mode</label>
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <button onClick={() => setIncludePrivate(true)}
                  style={includePrivate ? S.printModeActive : S.printMode}>
                  <span style={{fontWeight:600}}>Full record</span>
                  <span style={{fontSize:11,color:"#8a7e6b",display:"block",marginTop:2}}>Everything, including private entries</span>
                </button>
                <button onClick={() => setIncludePrivate(false)}
                  style={!includePrivate ? S.printModeActive : S.printMode}>
                  <span style={{fontWeight:600}}>Shareable</span>
                  <span style={{fontSize:11,color:"#8a7e6b",display:"block",marginTop:2}}>Excludes entries marked private</span>
                </button>
              </div>
              {!includePrivate && privateInSelection > 0 && (
                <div style={S.privacyNotice}>
                  🔒 {privateInSelection} private event{privateInSelection > 1 ? "s" : ""} in selected layers will be excluded.
                </div>
              )}
              {includePrivate && privateInSelection > 0 && (
                <div style={S.privacyWarn}>
                  ⚠ {privateInSelection} private event{privateInSelection > 1 ? "s" : ""} will be included. Switch to "Shareable" if this is for others.
                </div>
              )}
              {privateCount === 0 && (
                <div style={{fontSize:11,color:"#6a5e4b",marginTop:6}}>
                  No events are currently marked as private.
                </div>
              )}
            </div>

            <div style={S.modalField}>
              <label style={S.label}>Include layers</label>
              <div style={{display:"flex",gap:4,marginTop:6,marginBottom:6}}>
                <button style={S.smallBtn} onClick={() => setSelectedLayers(layers.map(l=>l.id))}>All</button>
                <button style={S.smallBtn} onClick={() => setSelectedLayers([])}>None</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2,maxHeight:200,overflowY:"auto"}}>
                {layers.map(layer => {
                  const count = events.filter(e => e.layer === layer.id && (includePrivate || !e.isPrivate)).length;
                  const privCount = events.filter(e => e.layer === layer.id && e.isPrivate).length;
                  const sel = selectedLayers.includes(layer.id);
                  return (
                    <label key={layer.id} style={{
                      display:"flex",alignItems:"center",gap:8,padding:"4px 8px",
                      borderRadius:4,cursor:"pointer",fontSize:13,color:sel?"#e8dcc8":"#6a5e4b",
                      background:sel?"rgba(180,168,145,0.08)":"transparent",
                      transition:"all 0.15s",
                    }}>
                      <input type="checkbox" checked={sel} onChange={() => toggleLayerSel(layer.id)} />
                      <span style={{...S.dot,background:layer.color,opacity:sel?1:0.3}}></span>
                      <span style={{flex:1}}>{layer.label}</span>
                      <span style={{fontSize:11,color:"#8a7e6b"}}>{count}</span>
                      {!includePrivate && privCount > 0 && <span style={{fontSize:9,color:"#90A4AE"}}>({privCount} private)</span>}
                    </label>
                  );
                })}
              </div>
            </div>

            <div style={{padding:"12px 0",borderTop:"1px solid rgba(180,168,145,0.1)",marginTop:8}}>
              <div style={{fontSize:13,color:"#b4a891"}}>
                This will print <strong>{totalInSelection}</strong> events across <strong>{selectedLayers.length}</strong> layer{selectedLayers.length !== 1 ? "s" : ""}.
              </div>
            </div>

            <div style={S.modalActions}>
              <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
              <button style={S.saveBtn} onClick={handlePrint} disabled={selectedLayers.length===0 || totalInSelection===0}>
                Print
              </button>
            </div>
          </div>
        </div>
      );
    }


    // ─── MOUNT ───
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LifeTimeline />);
  </script>
</body>
</html>
