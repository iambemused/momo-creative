    const storage = {
      get(key) {
        try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
        catch { return null; }
      },
      set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); return true; }
        catch { return false; }
      },
      remove(key) {
        try { localStorage.removeItem(key); return true; }
        catch { return false; }
      }
    };

    const parseDate = (str) => {
      if (!str) return null;
      if (str === "ongoing") return new Date();
      if (/^\d{4}$/.test(str)) return new Date(parseInt(str), 0, 1);
      if (/^\d{4}-\d{2}$/.test(str)) {
        const [y, m] = str.split("-");
        return new Date(parseInt(y), parseInt(m) - 1, 1);
      }
      return new Date(str);
    };

    const formatDateDisplay = (str) => {
      if (!str) return "";
      if (str === "ongoing") return "Ongoing";
      if (/^\d{4}$/.test(str)) return str;
      if (/^\d{4}-\d{2}$/.test(str)) {
        const d = parseDate(str);
        return d.toLocaleDateString("en-AU", { month: "short", year: "numeric" });
      }
      const d = parseDate(str);
      return d.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
    };

      if (!dob || !dateStr) return null;
      const birth = parseDate(dob);
      const target = dateStr === "ongoing" ? new Date() : parseDate(dateStr);
      if (!birth || !target) return null;
      let age = target.getFullYear() - birth.getFullYear();
      const m = target.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && target.getDate() < birth.getDate())) age--;
      return age;
    };

    const defaultData = () => ({
      name: "", dob: "", lifeExpectancy: 82, events: [], customLayers: [],
      activeLayers: DEFAULT_LAYERS.map((l) => l.id), viewMode: "timeline",
      beyondMeLabel: "Beyond Me",
      strands: [],
      worldEvents: [],
    });

    // ─── STRAND HELPERS ───
    const STRAND_TYPES = [
      { id:"child",       label:"Child",        emoji:"🌱", desc:"A child in your life",                 color:"#81C784" },
      { id:"grandchild",  label:"Grandchild",   emoji:"🌼", desc:"A grandchild — joy from a new generation", color:"#AED581" },
      { id:"partner",     label:"Partner",      emoji:"🤝", desc:"A partner or spouse",                  color:"#F48FB1" },
      { id:"parent",      label:"Parent",       emoji:"🌳", desc:"A parent or step-parent",              color:"#CE9A5B" },
      { id:"grandparent", label:"Grandparent",  emoji:"🌿", desc:"A grandparent",                        color:"#A1887F" },
      { id:"sibling",     label:"Sibling",      emoji:"🍃", desc:"A brother or sister",                  color:"#80DEEA" },
      { id:"friend",      label:"Close friend", emoji:"🫂", desc:"A close friend — part of who you are", color:"#FFB74D" },
      { id:"extended",    label:"Family world", emoji:"🌲", desc:"Extended family as a lived context",   color:"#B0BEC5" },
    ];

    // Nucleus zone and weight per strand type/phase
    const strandNucleusWeight = (strand, phase) => {
      if (!phase) return { zone: "none", w: 0 };
      const t = strand.type;
      if (t === "child") {
        if (phase.label === "at_home")   return { zone: "inner", w: 1.0 };
        if (phase.label === "visiting")  return { zone: "outer", w: 0.75 };
        if (phase.label === "left_home") return { zone: "outer", w: 0.55 };
        return { zone: "outer", w: 0.4 };
      }
      if (t === "grandchild") {
        if (phase.label === "at_home")   return { zone: "inner", w: 0.85 };
        if (phase.label === "left_home") return { zone: "outer", w: 0.5 };
        return { zone: "outer", w: 0.4 };
      }
      if (t === "partner") return { zone: "inner", w: 1.2 };
      if (t === "parent")  return { zone: "outer", w: 0.6 };
      if (t === "grandparent") return { zone: "outer", w: 0.35 };
      if (t === "sibling") return { zone: "outer", w: 0.45 };
      if (t === "friend") {
        if (phase.label === "close")     return { zone: "inner", w: 0.8 };
        if (phase.label === "distant")   return { zone: "outer", w: 0.4 };
        return { zone: "inner", w: 0.75 };
      }
      if (t === "extended") return { zone: "outer", w: 0.7 };
      return { zone: "outer", w: 0.3 };
    };

    function Tooltip({ text, children }) {
      const [show, setShow] = useState(false);
      const [pos, setPos] = useState({ x: 0, y: 0, below: false });
      return (
        <span
          onMouseEnter={(e) => {
            const r = e.currentTarget.getBoundingClientRect();
            const nearTop = r.top < 60;
            setPos({ x: r.left + r.width / 2, y: nearTop ? r.bottom + 8 : r.top - 8, below: nearTop });
            setShow(true);
          }}
          onMouseLeave={() => setShow(false)}
          style={{ position: "relative", display: "inline-flex", alignItems: "center" }}
        >
          {children}
          {show && (
            <span style={{
              position: "fixed", left: pos.x, top: pos.y,
              transform: pos.below ? "translateX(-50%)" : "translate(-50%, -100%)",
              background: "#3a352e", color: "#e8dcc8", fontSize: 12,
              padding: "6px 12px", borderRadius: 6, whiteSpace: "normal",
              boxShadow: "0 4px 16px rgba(0,0,0,0.4)", zIndex: 1000,
              border: "1px solid rgba(180,168,145,0.2)",
              fontFamily: "'DM Sans', system-ui, sans-serif", fontWeight: 400,
              lineHeight: 1.4, maxWidth: 260, textAlign: "center",
              pointerEvents: "none",
            }}>
              {text}
            </span>
          )}
        </span>
      );
    }

    function LifeTimeline() {
      const [data, setData] = useState(defaultData());
      const [loading, setLoading] = useState(true);
      const [lightMode, setLightMode] = useState(() => localStorage.getItem('attmtia-lm') === '1');
      const S = buildS(lightMode);
      const toggleLight = () => setLightMode(lm => {
        const next = !lm;
        localStorage.setItem('attmtia-lm', next ? '1' : '0');
        return next;
      });
      const [showSetup, setShowSetup] = useState(false);
      const [showAddEvent, setShowAddEvent] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [zoomLevel, setZoomLevel] = useState(1);
      const [panOffset, setPanOffset] = useState(0);
      const [trackFontSize, setTrackFontSize] = useState(11);
      const [isPanning, setIsPanning] = useState(false);
      const [panStart, setPanStart] = useState(0);
      const [panStartOffset, setPanStartOffset] = useState(0);
      const [hoveredEvent, setHoveredEvent] = useState(null);
      const [filterLayer, setFilterLayer] = useState(null);
      const [showLayerPanel, setShowLayerPanel] = useState(false);
      const [showCustomLayerForm, setShowCustomLayerForm] = useState(false);
      const [showPrintDialog, setShowPrintDialog] = useState(false);
      const [importMsg, setImportMsg] = useState(null);
      const [hoveredLayer, setHoveredLayer] = useState(null);
      const [hoveredLayerPos, setHoveredLayerPos] = useState({x:0,y:0});
      const [showAddPerson, setShowAddPerson]   = useState(false);
      const [editingStrand, setEditingStrand]   = useState(null);
      const [selectedStrand, setSelectedStrand] = useState(null);
      const [showWorldEvent, setShowWorldEvent] = useState(false);
      const [editingWorldEvent, setEditingWorldEvent] = useState(null);
      const [showWorldLibrary, setShowWorldLibrary] = useState(false);
      const [showAboutModal, setShowAboutModal] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);
      const [showLinkedIn, setShowLinkedIn] = useState(false);
      const [cursorYear,    setCursorYear]      = useState(null);
      const [cursorX,       setCursorX]         = useState(null);
      const [cursorPinned,  setCursorPinned]    = useState(false);
      const containerRef = useRef(null);
      const timelineRef = useRef(null);
      const importRef = useRef(null);

      const allLayers = useMemo(() => {
        const base = DEFAULT_LAYERS.map(l =>
          l.id === "beyondme" ? { ...l, label: data.beyondMeLabel || "Beyond Me" } : l
        );
        return [...base, ...(data.customLayers || [])];
      }, [data.customLayers, data.beyondMeLabel]);

      useEffect(() => {
        const saved = storage.get(STORAGE_KEY);
        if (saved) {
          setData({ ...defaultData(), ...saved });
          if (!saved.dob) setShowSetup(true);
        } else {
          setShowSetup(true);
        }
        setLoading(false);
      }, []);

      const saveData = useCallback((newData) => {
        setData(newData);
        storage.set(STORAGE_KEY, newData);
      }, []);

      const today = new Date();
      const currentAge = data.dob ? getAgeAt(data.dob, today.toISOString().split("T")[0]) : null;
      const birthYear = data.dob ? parseDate(data.dob).getFullYear() : today.getFullYear() - 30;
      const endYear = birthYear + (data.lifeExpectancy || 82) + 2;

      // Extend timeline leftward to cover earliest known birth year in strands
      const earliestStrandYear = (data.strands||[]).reduce((earliest, s) => {
        const dobStr = s.type==="sibling" ? s.siblingDob
          : (s.type==="parent"||s.type==="grandparent"||s.type==="partner"||s.type==="child"||s.type==="grandchild"||s.type==="friend") ? s.personDob : null;
        if (!dobStr) return earliest;
        const y = parseInt(String(dobStr).slice(0,4));
        return isNaN(y) ? earliest : Math.min(earliest, y);
      }, birthYear);
      const startYear = Math.min(birthYear, earliestStrandYear) - 2; // 2yr left padding

      const totalYears = endYear - startYear;
      const baseWidth = 60;
      const timelineWidth = totalYears * baseWidth * zoomLevel;

      const yearToX = (year) => ((year - startYear) / totalYears) * timelineWidth;
      const dateToX = (dateStr) => {
        const d = dateStr === "ongoing" ? new Date() : parseDate(dateStr);
        if (!d) return 0;
        const yearFrac = d.getFullYear() + d.getMonth() / 12 + d.getDate() / 365;
        return ((yearFrac - startYear) / totalYears) * timelineWidth;
      };
      const todayX = dateToX(today.toISOString().split("T")[0]);

      const handleWheel = useCallback((e) => {
        e.preventDefault();
        setZoomLevel((z) => Math.max(0.3, Math.min(10, z * (e.deltaY > 0 ? 0.9 : 1.1))));
      }, []);

      const handleMouseDown = useCallback((e) => {
        if (e.target.closest(".event-marker, .event-bar, button, input, select, textarea, .modal-overlay, .layer-panel, a")) return;
        setIsPanning(true);
        setPanStart(e.clientX);
        setPanStartOffset(panOffset);
      }, [panOffset]);

      const handleMouseMove = useCallback((e) => {
        if (isPanning) {
          setPanOffset(panStartOffset + (e.clientX - panStart));
          return;
        }
        if (cursorPinned) return;
        // Compute year from mouse position relative to timeline
        const container = containerRef.current;
        if (!container) return;
        const rect = container.getBoundingClientRect();
        const rawX = e.clientX - rect.left - panOffset;
        const year = startYear + (rawX / timelineWidth) * totalYears;
        if (year >= birthYear - 1 && year <= endYear + 1) {
          setCursorX(e.clientX - rect.left);
          setCursorYear(year);
        }
      }, [isPanning, panStart, panStartOffset, cursorPinned, panOffset, birthYear, timelineWidth, totalYears, endYear]);

      const handleTimelineClick = useCallback((e) => {
        if (e.target.closest(".event-marker, .event-bar, button, input, select, textarea, .modal-overlay, .layer-panel, a, .strand-bar")) return;
        if (isPanning) return;
        setCursorPinned(p => !p);
      }, [isPanning]);

      const handleMouseLeave = useCallback(() => {
        if (!cursorPinned) { setCursorYear(null); setCursorX(null); }
      }, [cursorPinned]);

      const handleMouseUp = useCallback(() => setIsPanning(false), []);

      // ── Touch handlers for mobile horizontal panning ──
      // All values stored in refs so handlers register ONCE and never churn
      const touchStartX    = useRef(0);
      const touchStartY    = useRef(0);
      const touchStartOff  = useRef(0);
      const touchDir       = useRef(null); // 'h' | 'v' | null
      const panOffsetRef   = useRef(panOffset);
      useEffect(() => { panOffsetRef.current = panOffset; }, [panOffset]);

      const handleTouchStart = useCallback((e) => {
        if (e.target.closest(".event-marker, .event-bar, button, input, select, textarea, .modal-overlay, .layer-panel, a")) return;
        const t = e.touches[0];
        touchStartX.current  = t.clientX;
        touchStartY.current  = t.clientY;
        touchStartOff.current = panOffsetRef.current;
        touchDir.current     = null;
      }, []); // no deps — uses only refs

      const handleTouchMove = useCallback((e) => {
        const t = e.touches[0];
        const dx = t.clientX - touchStartX.current;
        const dy = t.clientY - touchStartY.current;

        if (!touchDir.current) {
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
            touchDir.current = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
          } else return;
        }

        if (touchDir.current === 'h') {
          e.preventDefault();
          setIsPanning(true);
          setPanOffset(touchStartOff.current + dx);
        }
      }, []); // no deps — uses only refs + setters (stable)

      const handleTouchEnd = useCallback(() => {
        touchDir.current = null;
        setIsPanning(false);
      }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        el.addEventListener("wheel",      handleWheel,      { passive: false });
        el.addEventListener("touchstart", handleTouchStart, { passive: false });
        el.addEventListener("touchmove",  handleTouchMove,  { passive: false });
        el.addEventListener("touchend",   handleTouchEnd,   { passive: true  });
        return () => {
          el.removeEventListener("wheel",      handleWheel);
          el.removeEventListener("touchstart", handleTouchStart);
          el.removeEventListener("touchmove",  handleTouchMove);
          el.removeEventListener("touchend",   handleTouchEnd);
        };
      }, []); // register once — handlers use refs, not closure state

      const visibleEvents = useMemo(() => {
        return data.events.filter((ev) => {
          if (!data.activeLayers.includes(ev.layer)) return false;
          if (filterLayer && ev.layer !== filterLayer) return false;
          return true;
        });
      }, [data.events, data.activeLayers, filterLayer]);

      const toggleLayer = (layerId) => {
        const newActive = data.activeLayers.includes(layerId)
          ? data.activeLayers.filter((l) => l !== layerId)
          : [...data.activeLayers, layerId];
        saveData({ ...data, activeLayers: newActive });
      };

      const addOrUpdateEvent = (event) => {
        let newEvents;
        if (editingEvent) {
          newEvents = data.events.map((e) => (e.id === editingEvent.id ? { ...event, id: editingEvent.id } : e));
        } else {
          newEvents = [...data.events, { ...event, id: generateId() }];
        }
        saveData({ ...data, events: newEvents });
        setShowAddEvent(false);
        setEditingEvent(null);
      };

      const deleteEvent = (id) => {
        saveData({ ...data, events: data.events.filter((e) => e.id !== id) });
        setSelectedEvent(null);
      };

      // ─── STRAND CRUD ───
      const addOrUpdateStrand = (strand) => {
        const strands = data.strands || [];
        let newStrands;
        if (editingStrand) {
          newStrands = strands.map(s => s.id === editingStrand.id ? { ...strand, id: editingStrand.id } : s);
        } else {
          newStrands = [...strands, { ...strand, id: generateId() }];
        }
        // Auto-create Losses event if strand closed by death
        let newEvents = data.events;
        if (strand.status === "deceased" && strand.closedAt && !editingStrand) {
          const typeLabel = STRAND_TYPES.find(t => t.id === strand.type)?.label || "Person";
          const lossEvent = {
            id: generateId(), title: strand.name ? `${strand.name} passed away` : `${typeLabel} passed away`,
            layer: "losses", startDate: strand.closedAt, endDate: null,
            notes: "", links: [], isPrivate: false, isFutureEvent: false,
            futureNature: null, reviewDate: null, autoCreated: true,
          };
          newEvents = [...data.events, lossEvent];
        }
        saveData({ ...data, strands: newStrands, events: newEvents });
        setShowAddPerson(false);
        setEditingStrand(null);
      };

      const deleteStrand = (id) => {
        saveData({ ...data, strands: (data.strands||[]).filter(s => s.id !== id) });
        setSelectedStrand(null);
      };

      const addPhaseToStrand = (strandId, phase) => {
        const newStrands = (data.strands||[]).map(s =>
          s.id === strandId ? { ...s, phases: [...(s.phases||[]), { ...phase, id: generateId() }] } : s
        );
        saveData({ ...data, strands: newStrands });      };

      // ─── WORLD EVENTS CRUD ───
      const addOrUpdateWorldEvent = (we) => {
        const wes = data.worldEvents || [];
        let newWEs;
        if (editingWorldEvent) {
          newWEs = wes.map(w => w.id === editingWorldEvent.id ? { ...we, id: editingWorldEvent.id } : w);
        } else {
          newWEs = [...wes, { ...we, id: generateId() }];
        }
        saveData({ ...data, worldEvents: newWEs });
        setShowWorldEvent(false);
        setEditingWorldEvent(null);
      };
      const deleteWorldEvent = (id) => {
        saveData({ ...data, worldEvents: (data.worldEvents||[]).filter(w => w.id !== id) });
      };

      const togglePrivacy = (id) => {
        saveData({ ...data, events: data.events.map(e =>
          e.id === id ? { ...e, isPrivate: !e.isPrivate } : e
        )});
      };
      const toggleGroupPrivacy = (ids, makePrivate) => {
        const idSet = new Set(ids);
        saveData({ ...data, events: data.events.map(e =>
          idSet.has(e.id) ? { ...e, isPrivate: makePrivate } : e
        )});
      };

      const addCustomLayer = (layer) => {
        const newCustom = [...(data.customLayers || []), newLayer];
        saveData({ ...data, customLayers: newCustom, activeLayers: [...data.activeLayers, newLayer.id] });
        setShowCustomLayerForm(false);
      };

      const removeCustomLayer = (layerId) => {
        if (!confirm("Remove this custom layer? Events assigned to it will lose their layer.")) return;
        saveData({
          ...data,
          customLayers: (data.customLayers || []).filter((l) => l.id !== layerId),
          activeLayers: data.activeLayers.filter((l) => l !== layerId),
        });
      };

      // ─── EXPORT ───
      const exportData = () => {
        const exportObj = {
          exportedAt: new Date().toISOString(),
          app: "All The Me That I Am", version: 3,
          profile: { name: data.name, dob: data.dob, lifeExpectancy: data.lifeExpectancy },
          customLayers: data.customLayers || [],
          strands: data.strands || [],
          worldEvents: data.worldEvents || [],
          events: data.events.map((ev) => {
            const layer = allLayers.find((l) => l.id === ev.layer);
            return { ...ev, layerLabel: layer?.label || ev.layer };
          }),
        };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `all-the-me-${data.name || "export"}-${new Date().toISOString().split("T")[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── EXPORT SHARED SELF (for Crossroads) ───
      const exportSharedSelf = () => {
        const sharedEvents = data.events
          .filter(e => !e.isPrivate)
          .map(ev => {
            const layer = allLayers.find(l => l.id === ev.layer);
            return {
              id: ev.id,
              year: ev.year,
              endYear: ev.endYear || null,
              title: ev.title,
              notes: ev.notes || "",
              layer: ev.layer,
              layerLabel: layer?.label || ev.layer,
              layerColor: layer?.color || "#888",
              isFutureEvent: ev.isFutureEvent || false,
              links: ev.links || [],
            };
          });
        const sharedStrands = (data.strands || []).map(s => ({
          id: s.id,
          type: s.type,
          name: s.name || "",
          relationship: s.relationship || "",
          personDob: s.personDob || null,
          color: s.color || "",
          startYear: s.startYear || null,
          endYear: s.endYear || null,
        }));
        const exportObj = {
          type: "attmtia-shared-self",
          version: 1,
          exportedAt: new Date().toISOString(),
          person: {
            name: data.name || "Unknown",
            birthYear: data.dob ? parseInt(String(data.dob).slice(0,4)) : null,
            lifeExpectancy: data.lifeExpectancy || 82,
          },
          sharedEventCount: sharedEvents.length,
          privateEventCount: data.events.filter(e => e.isPrivate).length,
          events: sharedEvents,
          strands: sharedStrands,
          worldEvents: (data.worldEvents || []).map(w => ({
            id: w.id, year: w.year, title: w.title, notes: w.notes || "",
          })),
        };
        const name = (data.name || "me").replace(/\s+/g,"-").toLowerCase();
        const date = new Date().toISOString().split("T")[0];
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `crossroads-${name}-${date}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── IMPORT ───
      const handleImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (imported.app !== "All The Me That I Am") {
              setImportMsg("This doesn't look like an All The Me That I Am export file.");
              return;
            }
            const mergeChoice = data.events.length > 0
              ? confirm("You have existing data. Click OK to merge (add imported events), or Cancel to replace all data.")
              : false;

            if (mergeChoice) {
              // Merge: add new events, avoid duplicates by title+startDate
              const existingKeys = new Set(data.events.map(e => `${e.title}|${e.startDate}`));
              const newEvents = (imported.events || [])
                .filter(e => !existingKeys.has(`${e.title}|${e.startDate}`))
                .map(e => ({ ...e, id: generateId(), layerLabel: undefined }));
              const newCustom = [...(data.customLayers || [])];
              (imported.customLayers || []).forEach(cl => {
                if (!newCustom.find(x => x.label === cl.label)) newCustom.push(cl);
              });
              const newActiveLayers = [...new Set([...data.activeLayers, ...newCustom.map(l => l.id)])];
              saveData({ ...data, events: [...data.events, ...newEvents], customLayers: newCustom, activeLayers: newActiveLayers });
              setImportMsg(`Merged ${newEvents.length} new events.`);
            } else {
              // Replace
              const newData = {
                ...defaultData(),
                name: imported.profile?.name || "",
                dob: imported.profile?.dob || "",
                lifeExpectancy: imported.profile?.lifeExpectancy || 82,
                customLayers: imported.customLayers || [],
                strands: imported.strands || [],
                worldEvents: imported.worldEvents || [],
                events: (imported.events || []).map(e => ({ ...e, id: e.id || generateId(), layerLabel: undefined })),
                activeLayers: [...DEFAULT_LAYERS.map(l => l.id), ...(imported.customLayers || []).map(l => l.id)],
              };
              saveData(newData);
              setImportMsg(`Imported ${newData.events.length} events.`);
              if (!newData.dob) setShowSetup(true);
            }
          } catch (err) {
            setImportMsg("Failed to read file. Make sure it's a valid JSON export.");
          }
        };
        reader.readAsText(file);
        if (importRef.current) importRef.current.value = "";
      };

      // ─── PRINT ───
      const executePrint = (opts) => {
        const { includeLayers, includePrivate, title: printTitle } = opts;
        const filteredEvents = data.events.filter(ev => {
          if (!includeLayers.includes(ev.layer)) return false;
          if (!includePrivate && ev.isPrivate) return false;
          return true;
        });
        const sorted = [...filteredEvents].sort((a, b) => (parseDate(a.startDate) || 0) - (parseDate(b.startDate) || 0));
        const grouped = {};
        allLayers.forEach((l) => { grouped[l.id] = []; });
        sorted.forEach((ev) => { if (grouped[ev.layer]) grouped[ev.layer].push(ev); });

        const layerSections = allLayers
          .filter((l) => includeLayers.includes(l.id) && grouped[l.id]?.length > 0)
          .map((l) => {
            const rows = grouped[l.id].map((ev) => {
              const age = getAgeAt(data.dob, ev.startDate);
              const when = formatDateDisplay(ev.startDate) + (ev.endDate ? ` → ${formatDateDisplay(ev.endDate)}` : "");
              const links = (ev.links || []).map((lk) => `<a href="${lk.url}" style="color:#1565C0;font-size:11px;">${lk.label || lk.url}</a>`).join(", ");
              return `<tr>
                <td style="padding:4px 8px;border-bottom:1px solid #ddd;font-size:12px;color:#666;">${age !== null ? age : "—"}</td>
                <td style="padding:4px 8px;border-bottom:1px solid #ddd;font-size:12px;">${when}</td>
                <td style="padding:4px 8px;border-bottom:1px solid #ddd;font-size:12px;font-weight:500;">${ev.title}</td>
                <td style="padding:4px 8px;border-bottom:1px solid #ddd;font-size:11px;color:#666;">${ev.notes || ""}${links ? "<br/>" + links : ""}</td>
              </tr>`;
            }).join("");
            return `<div style="margin-bottom:24px;break-inside:avoid;">
              <h3 style="font-family:Georgia,serif;font-size:16px;margin:0 0 8px;color:${l.color};border-bottom:2px solid ${l.color};padding-bottom:4px;">${l.label}</h3>
              <p style="font-size:11px;color:#888;margin:0 0 8px;font-style:italic;">${l.desc}</p>
              <table style="width:100%;border-collapse:collapse;">
                <thead><tr>
                  <th style="text-align:left;padding:4px 8px;font-size:10px;text-transform:uppercase;color:#999;border-bottom:2px solid #ddd;width:50px;">Age</th>
                  <th style="text-align:left;padding:4px 8px;font-size:10px;text-transform:uppercase;color:#999;border-bottom:2px solid #ddd;">When</th>
                  <th style="text-align:left;padding:4px 8px;font-size:10px;text-transform:uppercase;color:#999;border-bottom:2px solid #ddd;">What</th>
                  <th style="text-align:left;padding:4px 8px;font-size:10px;text-transform:uppercase;color:#999;border-bottom:2px solid #ddd;">Notes</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
          }).join("");

        const displayTitle = printTitle || "All The Me That I Am";
        const modeLabel = includePrivate ? "Full record" : "Shareable version";
        const w = window.open("", "_blank");
        w.document.write(`<!DOCTYPE html><html><head><title>${displayTitle} — ${data.name || ""}</title>
          <style>@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
        </head><body style="font-family:-apple-system,system-ui,sans-serif;padding:40px;max-width:900px;margin:0 auto;color:#333;">
          <h1 style="font-family:Georgia,serif;font-size:28px;font-weight:400;margin:0;">${displayTitle}</h1>
          <p style="color:#888;margin:4px 0 24px;">${data.name ? data.name + " · " : ""}${currentAge !== null ? "Age " + currentAge + " · " : ""}${filteredEvents.length} events · ${modeLabel} · ${new Date().toLocaleDateString("en-AU")}</p>
          ${layerSections}
          <div style="margin-top:32px;padding-top:16px;border-top:1px solid #ddd;font-size:10px;color:#aaa;">Generated by "All The Me That I Am" — A cartography of self</div>
        </body></html>`);
        w.document.close();
        w.focus();
        setTimeout(() => w.print(), 300);
        setShowPrintDialog(false);
      };

      const resetAll = () => {
        if (confirm("This will erase all your data. Are you sure?")) {
          setData(defaultData());
          setShowSetup(true);
          storage.remove(STORAGE_KEY);
        }
      };

      const layerForId = (id) => allLayers.find((l) => l.id === id);
      const ageMarkers = [];
      const ageStep = zoomLevel < 0.6 ? 10 : zoomLevel < 1.5 ? 5 : 1;
      // Include negative ages for pre-birth section
      const preYears = birthYear - startYear;
      for (let age = -Math.ceil(preYears/ageStep)*ageStep; age <= (data.lifeExpectancy || 82); age += ageStep) {
        ageMarkers.push(age);
      }

      if (loading) return <div style={S.loadingScreen}><div style={S.loadingText}>Loading your timeline...</div></div>;

      // ─── TABLE VIEW ───
      const renderTableView = () => {
        const sorted = [...visibleEvents].sort((a, b) => (parseDate(a.startDate) || 0) - (parseDate(b.startDate) || 0));
        return (
          <div style={S.tableContainer}>
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>Age</th><th style={S.th}>When</th><th style={S.th}>Layer</th>
                <th style={S.th}>What</th><th style={S.th}>Notes & Links</th><th style={{...S.th, width:80}}></th>
              </tr></thead>
              <tbody>
                {sorted.length === 0 && <tr><td colSpan={6} style={{...S.td,textAlign:"center",color:"#8a7e6b"}}>No events yet. Click "+ Add Event" to begin.</td></tr>}
                {sorted.map((ev) => {
                  const layer = layerForId(ev.layer);
                  const age = getAgeAt(data.dob, ev.startDate);
                  return (
                    <tr key={ev.id}>
                      <td style={S.td}>{age !== null ? age : "—"}</td>
                      <td style={S.td}>{formatDateDisplay(ev.startDate)}{ev.endDate ? ` → ${formatDateDisplay(ev.endDate)}` : ""}</td>
                      <td style={S.td}><span style={{...S.layerBadge,background:layer?.color||"#666"}}>{layer?.label||ev.layer}</span></td>
                      <td style={{...S.td,fontWeight:500}}>{ev.title}{ev.isPrivate && <span style={S.privateBadge}>private</span>}</td>
                      <td style={{...S.td,color:"#8a7e6b",fontSize:13}}>
                        {ev.notes || ""}
                        {ev.links?.length > 0 && <div style={{marginTop:4}}>
                          {ev.links.map((lk,i) => <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer"
                            style={{color:"#29B6F6",fontSize:11,marginRight:8,textDecoration:"underline"}}>{lk.label||"Link"} ↗</a>)}
                        </div>}
                      </td>
                      <td style={S.td}>
                        <button style={S.smallBtn} onClick={() => {setEditingEvent(ev);setShowAddEvent(true);}}>Edit</button>
                        <button style={{...S.smallBtn,color:"#c44"}} onClick={() => deleteEvent(ev.id)}>×</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      };

      // ─── LAYERS SUMMARY ───
      const renderLayerSummary = () => (
        <div style={S.layerSummaryContainer}>
          {allLayers.filter(l => data.activeLayers.includes(l.id)).map(layer => {
            const evts = data.events.filter(e => e.layer === layer.id).sort((a,b) => (parseDate(a.startDate)||0)-(parseDate(b.startDate)||0));
            return (
              <div key={layer.id} style={S.layerCard}>
                <div style={{...S.layerCardHeader,borderLeftColor:layer.color}}>
                  <span style={{...S.dot,background:layer.color}}></span>
                  <span style={S.layerCardTitle}>{layer.label}</span>
                  <span style={S.layerCardCount}>{evts.length}</span>
                </div>
                <div style={S.layerCardDesc}>{layer.desc}</div>
                {evts.length === 0 ? <div style={S.layerCardEmpty}>No entries yet</div> : (
                  <div style={S.layerCardEvents}>
                    {evts.map(ev => (
                      <div key={ev.id} style={S.layerCardEvent} onClick={() => setSelectedEvent(ev)}>
                        <span style={S.layerCardEventDate}>{formatDateDisplay(ev.startDate)}</span>
                        <span style={S.layerCardEventTitle}>{ev.title}</span>
                        {ev.isPrivate && <span style={S.privateBadge}>private</span>}
                        {ev.endDate === "ongoing" && <span style={S.ongoingBadge}>ongoing</span>}
                        {ev.links?.length > 0 && <span style={{fontSize:10,opacity:0.5}}>🔗</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );

      // ─── TIMELINE VIEW ───
      const renderTimelineView = () => {
        const activeLayers = allLayers.filter(l => data.activeLayers.includes(l.id));
        const activeStrands = (data.strands||[]);
        const strandH = 28, strandBandH = activeStrands.length > 0 ? activeStrands.length * strandH + 24 : 0;
        const trackH = 52, headerH = 50, ageH = 28;
        const svgH = headerH + ageH + strandBandH + activeLayers.length * trackH + 20;
        return (
          <div ref={containerRef} style={S.timelineOuter}
            onMouseDown={handleMouseDown} onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp} onMouseLeave={handleMouseLeave}
            onClick={handleTimelineClick}>
            <div ref={timelineRef} style={{...S.timelineInner,width:timelineWidth+100,
              transform:`translateX(${panOffset}px)`,cursor:isPanning?"grabbing":"grab",height:svgH}}>

              {Array.from({length:totalYears+1},(_,i)=>startYear+i).map(year => {
                const x=yearToX(year), isDec=year%10===0;
                const show = zoomLevel<0.6?isDec:zoomLevel<1.5?year%5===0:true;
                const preBirth = year < birthYear;
                return (<div key={`y${year}`}>
                  <div style={{position:"absolute",left:x,top:headerH,width:1,height:svgH-headerH,
                    background:isDec
                      ? preBirth?(lightMode?"rgba(100,80,60,0.1)":"rgba(180,168,145,0.15)"):(lightMode?"rgba(100,80,60,0.22)":"rgba(180,168,145,0.3)")
                      : preBirth?(lightMode?"rgba(100,80,60,0.04)":"rgba(180,168,145,0.05)"):(lightMode?"rgba(100,80,60,0.1)":"rgba(180,168,145,0.1)")}} />
                  {show && <div style={{position:"absolute",left:x,top:4,transform:"translateX(-50%)",
                    fontSize:isDec?13:11,
                    color:isDec?(preBirth?(lightMode?"#a09070":"#5a5040"):(lightMode?"#3a2e1e":"#b4a891")):(preBirth?(lightMode?"#c0b090":"#3a3228"):(lightMode?"#6a5a40":"#7a7060")),
                    fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:isDec?600:400,whiteSpace:"nowrap"}}>{year}</div>}
                </div>);
              })}

              <div style={{position:"absolute",left:0,top:headerH,width:"100%",height:ageH,
                borderBottom:`1px solid ${lightMode?"rgba(100,80,60,0.2)":"rgba(180,168,145,0.2)"}`}}>
                {ageMarkers.map(age => (
                  <div key={`a${age}`} style={{position:"absolute",left:yearToX(birthYear+age),top:4,
                    transform:"translateX(-50%)",fontSize:10,
                    color: age < 0 ? (lightMode?"rgba(100,80,60,0.4)":"rgba(140,120,90,0.5)") : (lightMode?"#6a5040":"#a09480"),
                    fontFamily:"'DM Sans',system-ui,sans-serif",whiteSpace:"nowrap",
                    fontStyle: age < 0 ? "italic" : "normal",
                  }}>{age}y</div>
                ))}
              </div>

              <div style={{position:"absolute",left:todayX,top:headerH-4,width:2,height:svgH-headerH+4,
                background:"rgba(232,196,104,0.7)",zIndex:5}}>
                <div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",
                  fontSize:10,color:lightMode?"#7a5e00":"#e8c468",whiteSpace:"nowrap",fontFamily:"'DM Sans',system-ui,sans-serif",
                  fontWeight:600,background:lightMode?"#f5f0e8":"#1a1714",padding:"2px 6px",borderRadius:3,
                  border:lightMode?"1px solid rgba(180,140,0,0.3)":"none"}}>
                  TODAY{currentAge!==null?` · Age ${currentAge}`:""}</div>
              </div>

              {data.lifeExpectancy && (
                <div style={{position:"absolute",left:yearToX(birthYear+data.lifeExpectancy),top:headerH,
                  width:1,height:svgH-headerH,background:"rgba(120,100,80,0.3)",
                  borderLeft:"2px dashed rgba(120,100,80,0.4)",zIndex:1}}>
                  <div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",
                    fontSize:10,color:lightMode?"#7a6850":"#7a6850",whiteSpace:"nowrap",fontFamily:"'DM Sans',system-ui,sans-serif",
                    background:lightMode?"#f5f0e8":"#1a1714",padding:"2px 6px",borderRadius:3,
                    border:lightMode?"1px solid rgba(120,100,80,0.25)":"none"}}>~{data.lifeExpectancy}y</div>
                </div>
              )}

              {/* ── PEOPLE BAND — strands rendered above layer tracks ── */}
              {strandBandH > 0 && (
                <div style={{position:"absolute",left:0,top:headerH+ageH,width:"100%",height:strandBandH,
                  borderBottom:`1px solid ${lightMode?"rgba(100,80,60,0.2)":"rgba(180,168,145,0.18)"}`,
                  background:lightMode?"rgba(210,198,178,0.3)":"rgba(30,26,20,0.5)"}}>
                  <div style={{position:"absolute",left:Math.max(10,-panOffset+10),top:4,
                    fontSize:trackFontSize,
                    color:lightMode?"rgba(50,36,20,0.9)":"rgba(210,195,170,0.95)",
                    fontWeight:700,textTransform:"uppercase",
                    letterSpacing:"0.06em",fontFamily:"'DM Sans',system-ui,sans-serif",
                    textShadow:lightMode?"none":"0 0 10px #1a1714, 0 0 20px #1a1714, 0 1px 0 #1a1714"}}>People</div>
                  {[...activeStrands].sort((a,b) => {
                    const yearOf = s => {
                      const d = s.type==="sibling" ? s.siblingDob
                        : (s.type==="parent"||s.type==="grandparent"||s.type==="partner"||s.type==="child"||s.type==="grandchild"||s.type==="friend") ? s.personDob : null;
                      return d ? parseInt(String(d).slice(0,4)) : parseInt(String(s.enteredLifeAt).slice(0,4));
                    };
                    return yearOf(a) - yearOf(b);
                  }).map((strand, idx) => {
                    const typeInfo = STRAND_TYPES.find(t => t.id === strand.type);
                    const color = typeInfo?.color || "#B0BEC5";
                    const y = headerH + ageH + 14 + idx * strandH;
                    // For any person with a known DOB, visually start from their birth —
                    // parents, grandparents, partners, siblings all existed before they entered your life.
                    const personBirthYear = strand.type === "sibling"
                      ? strand.siblingDob
                      : (strand.type === "parent" || strand.type === "grandparent" || strand.type === "partner" || strand.type === "child" || strand.type === "grandchild" || strand.type === "friend")
                      ? strand.personDob
                      : null;
                    const visualStart = personBirthYear || strand.enteredLifeAt;
                    const startX = dateToX(visualStart);
                    const endX = strand.status === "active"
                      ? dateToX(new Date().toISOString().split("T")[0])
                      : strand.closedAt ? dateToX(strand.closedAt) : dateToX(new Date().toISOString().split("T")[0]);
                    const w = Math.max(endX - startX, 12);
                    const isSelected = selectedStrand?.id === strand.id;
                    const displayName = strand.name
                      || (strand.type==="parent"||strand.type==="grandparent" ? strand.relationship?.replace(/_/g," ") : null)
                      || (strand.type==="extended" ? (strand.extendedDesc?.slice(0,30)||"Extended family") : null)
                      || typeInfo?.label || "Person";
                    return (
                      <div key={strand.id}
                        onClick={e => {e.stopPropagation(); setSelectedStrand(isSelected?null:strand);}}
                        style={{
                          position:"absolute", left:startX, top:y-headerH-ageH,
                          width:w, height:strandH-6, zIndex:4, cursor:"pointer",
                          background: strand.status==="active"
                            ? `linear-gradient(90deg,${color}${lightMode?"cc":"28"},${color}${lightMode?"99":"18"})`
                            : `${color}${lightMode?"aa":"12"}`,
                          border:`1px solid ${color}${isSelected?(lightMode?"ff":"88"):(lightMode?"cc":"33")}`,
                          borderRight: strand.status==="active" ? "none" : undefined,
                          borderRadius: strand.status==="active" ? "10px 0 0 10px" : "10px",
                          display:"flex", alignItems:"center", paddingLeft:8,
                          transition:"all 0.15s",
                          boxShadow: isSelected ? `0 0 12px ${color}33` : "none",
                        }}>
                        <span style={{fontSize:12, marginRight:5, opacity:0.8}}>{typeInfo?.emoji}</span>
                        <span style={{fontSize:11, color:lightMode?"#1e1610":color, fontWeight:600, fontFamily:"'DM Sans',system-ui,sans-serif",
                          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                          maxWidth: w-50}}>{w > 60 ? displayName : ""}</span>
                        {strand.status==="active" && (
                          <div style={{position:"absolute",right:0,top:0,bottom:0,width:24,
                            background:`linear-gradient(90deg,transparent,${color}22)`}}>
                            <div style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",
                              fontSize:11,color,fontWeight:700,opacity:0.6}}>→</div>
                          </div>
                        )}
                        {/* Phase transition markers */}
                        {(strand.phases||[]).filter(p=>p.endDate&&p.endDate!=="ongoing").map(phase => {
                          const px = dateToX(phase.endDate) - startX;
                          if (px <= 0 || px >= w) return null;
                          return <div key={phase.id} style={{position:"absolute",left:px,top:0,bottom:0,
                            width:1,background:`${color}44`,borderLeft:`1px dashed ${color}55`}}/>;
                        })}
                        {/* Pre-relationship dimming — for anyone whose birth predates when they entered your world.
                            The dimmed section shows their life before you arrived. The dashed line is your birth. */}
                        {personBirthYear && strand.enteredLifeAt && String(personBirthYear).slice(0,4) < String(strand.enteredLifeAt).slice(0,4) && (() => {
                          const markerX = dateToX(strand.enteredLifeAt) - startX;
                          if (markerX <= 0 || markerX >= w) return null;
                          return <>
                            <div style={{position:"absolute",left:0,top:0,width:markerX,bottom:0,
                              background:"rgba(0,0,0,0.28)",borderRadius:"10px 0 0 10px",pointerEvents:"none"}}/>
                            <div style={{position:"absolute",left:markerX,top:0,bottom:0,width:1,
                              borderLeft:`1px dashed ${color}66`,pointerEvents:"none"}}/>
                          </>;
                        })()}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── WORLD EVENTS — named anchors in the header strip ── */}
              {(data.worldEvents||[]).map(we => {
                const x = yearToX(parseInt(we.year));
                const myAge = data.dob
                  ? Math.floor(parseInt(we.year) - (new Date(data.dob).getFullYear() + new Date(data.dob).getMonth()/12))
                  : null;
                return (
                  <div key={we.id}
                    onMouseEnter={() => { setCursorX(x + panOffset); setCursorYear(parseInt(we.year)); }}
                    onMouseLeave={() => { if (!cursorPinned) { setCursorYear(null); setCursorX(null); } }}
                    onClick={e => {
                      e.stopPropagation();
                      setCursorX(x + panOffset);
                      setCursorYear(parseInt(we.year));
                      setCursorPinned(p => !p);
                    }}
                    style={{position:"absolute", left:x, top:headerH-16, zIndex:6,
                      transform:"translateX(-50%)", cursor:"pointer"}}>
                    {/* Notch line down into age band */}
                    <div style={{position:"absolute",left:"50%",top:0,width:1,height:svgH-headerH+16,
                      background:"rgba(126,182,255,0.2)",borderLeft:"1px dashed rgba(126,182,255,0.25)",
                      pointerEvents:"none"}}/>
                    {/* Diamond marker */}
                    <div style={{
                      width:8, height:8, background:"rgba(126,182,255,0.7)",
                      transform:"rotate(45deg)", margin:"0 auto",
                      boxShadow:"0 0 6px rgba(126,182,255,0.4)",
                      transition:"all 0.15s",
                    }}/>
                    {/* Label — shows on wider zoom */}
                    {zoomLevel > 0.7 && (
                      <div style={{
                        position:"absolute", left:"50%", transform:"translateX(-50%)",
                        top:-16, fontSize:9, color:"rgba(126,182,255,0.55)",
                        fontFamily:"'DM Sans',system-ui,sans-serif",
                        whiteSpace:"nowrap", maxWidth:90, overflow:"hidden",
                        textOverflow:"ellipsis", textAlign:"center",
                        letterSpacing:"0.02em",
                      }}>{we.title}</div>
                    )}
                  </div>
                );
              })}

              {/* Birth year line — the moment the self begins */}
              {startYear < birthYear && (
                <div style={{position:"absolute",left:yearToX(birthYear),top:headerH,
                  width:2,height:svgH-headerH,
                  background:"rgba(197,168,130,0.25)",
                  borderLeft:"2px solid rgba(197,168,130,0.2)",
                  zIndex:2,pointerEvents:"none"}}>
                  <div style={{position:"absolute",top:2,left:4,
                    fontSize:9,color:"rgba(197,168,130,0.4)",
                    fontFamily:"'DM Sans',system-ui,sans-serif",
                    letterSpacing:"0.08em",textTransform:"uppercase",whiteSpace:"nowrap"}}>
                    born {birthYear}
                  </div>
                </div>
              )}

              {activeLayers.map((layer,idx) => {
                const y = headerH + ageH + strandBandH + idx * trackH;
                const layerEvts = visibleEvents.filter(e => e.layer === layer.id);
                return (<div key={layer.id}>
                  <div style={{position:"absolute",left:0,top:y,width:"100%",height:trackH,
                    background:idx%2===0?(lightMode?"rgba(180,165,140,0.12)":"rgba(40,36,30,0.3)"):"transparent",
                    borderBottom:`1px solid ${lightMode?"rgba(100,80,60,0.08)":"rgba(180,168,145,0.08)"}`}} />

                  <div
                    onMouseEnter={(e) => {
                      const r = e.currentTarget.getBoundingClientRect();
                      setHoveredLayer(layer.id);
                      setHoveredLayerPos({x: r.right + 8, y: r.top + r.height/2});
                    }}
                    onMouseLeave={() => setHoveredLayer(null)}
                    style={{position:"absolute",left:Math.max(10,-panOffset+10),top:y+4,
                      fontSize:trackFontSize,color:layer.color,fontWeight:700,
                      fontFamily:"'DM Sans',system-ui,sans-serif",textTransform:"uppercase",
                      letterSpacing:"0.06em",opacity:lightMode?1:0.95,zIndex:3,whiteSpace:"nowrap",
                      textShadow:lightMode?"0 0 8px rgba(245,240,232,0.9), 0 0 16px rgba(245,240,232,0.7)":"0 0 10px #1a1714, 0 0 20px #1a1714, 0 1px 0 #1a1714",cursor:"help",
                      padding:"2px 4px"}}>{layer.label}</div>

                  {layerEvts.map(ev => {
                    const x = dateToX(ev.startDate);
                    const isH = hoveredEvent===ev.id, isS = selectedEvent?.id===ev.id;
                    const isFut = ev.isFutureEvent;
                    const NATURE_COLORS = {intention:"#29B6F6",ambition:"#FFD54F",fear:"#F06292",question:"#BA68C8"};
                    const futColor = isFut ? (NATURE_COLORS[ev.futureNature]||"#C5A882") : null;
                    const evColor = isFut ? futColor : layer.color;
                    if (ev.endDate) {
                      const x2 = dateToX(ev.endDate);
                      const w = Math.max(x2-x, 6);
                      const ongoing = ev.endDate === "ongoing";
                      const barFill = isFut?`${evColor}22`:`${evColor}${isH||isS?(lightMode?"ff":"cc"):(lightMode?"dd":"55")}`;
                      const barBorder = `1px ${isFut?"dashed":"solid"} ${evColor}${isH||isS?"ff":(lightMode?"ff":"88")}`;
                      const barTextColor = isFut?evColor:(lightMode?"#1e1610":"#fff");
                      const barTextShadow = isFut?"none":(lightMode?"none":"0 1px 3px rgba(0,0,0,0.5)");
                      return (<div key={ev.id} className="event-bar"
                        onMouseEnter={() => setHoveredEvent(ev.id)} onMouseLeave={() => setHoveredEvent(null)}
                        onClick={e => {e.stopPropagation();setSelectedEvent(ev);}}
                        style={{position:"absolute",left:x,top:y+20,width:w,height:22,cursor:"pointer",zIndex:4,
                          background:barFill,
                          border:barBorder,
                          borderRight:ongoing?"none":undefined,
                          borderRadius:ongoing?"4px 0 0 4px":"4px",
                          opacity:isFut?0.75:1,
                          transition:"all 0.15s",display:"flex",alignItems:"center",paddingLeft:6,overflow:"hidden"}}>
                        <span style={{fontSize:11,color:barTextColor,fontWeight:500,whiteSpace:"nowrap",
                          overflow:"hidden",textOverflow:"ellipsis",
                          fontFamily:"'DM Sans',system-ui,sans-serif",
                          textShadow:barTextShadow}}>{w>50?ev.title:""}</span>
                        {ongoing && <div style={{position:"absolute",right:0,top:0,bottom:0,width:20,
                          background:`linear-gradient(90deg,transparent,${evColor}44)`}}>
                          <div style={{position:"absolute",right:2,top:"50%",transform:"translateY(-50%)",
                            fontSize:10,color:evColor,fontWeight:700}}>→</div>
                        </div>}
                        {ev.links?.length > 0 && <span style={{fontSize:9,marginLeft:4,opacity:0.7}}>🔗</span>}
                      </div>);
                    } else {
                      return (<div key={ev.id} className="event-marker"
                        onMouseEnter={() => setHoveredEvent(ev.id)} onMouseLeave={() => setHoveredEvent(null)}
                        onClick={e => {e.stopPropagation();setSelectedEvent(ev);}}
                        style={{position:"absolute",left:x-7,top:y+22,width:14,height:14,
                          borderRadius:isFut?"3px":"50%",
                          background:isFut?"transparent":(isH||isS?evColor:`${evColor}99`),
                          border:`2px ${isFut?"dashed":"solid"} ${evColor}`,
                          cursor:"pointer",zIndex:4,opacity:isFut?0.7:1,
                          transition:"all 0.15s",transform:isH||isS?"scale(1.3)":"scale(1)",
                          boxShadow:isH||isS?`0 0 12px ${evColor}66`:"none"}} />);
                    }
                  })}
                </div>);
              })}

              {hoveredEvent && (() => {
                const ev = data.events.find(e => e.id === hoveredEvent);
                if (!ev) return null;
                const x = dateToX(ev.startDate);
                const layer = layerForId(ev.layer);
                const activeLs = allLayers.filter(l => data.activeLayers.includes(l.id));
                const li = activeLs.findIndex(l => l.id === ev.layer);
                const y = 50+28+li*52;
                const age = getAgeAt(data.dob, ev.startDate);
                return (<div style={{position:"absolute",left:x+10,top:y-10,background:"#2a2520",
                  border:"1px solid rgba(180,168,145,0.3)",borderRadius:6,padding:"8px 12px",zIndex:20,
                  maxWidth:280,pointerEvents:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#e8dcc8",marginBottom:2,
                    fontFamily:"'DM Sans',system-ui,sans-serif"}}>{ev.title}
                    {ev.isFutureEvent && <span style={{fontSize:9,marginLeft:6,padding:"1px 5px",borderRadius:3,
                      background:"rgba(197,168,130,0.15)",color:"#c8a84a",border:"1px solid rgba(197,168,130,0.3)",
                      verticalAlign:"middle",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                      {ev.futureNature||"ahead"}</span>}
                  </div>
                  <div style={{fontSize:11,color:layer?.color||"#999"}}>
                    {layer?.label} · {formatDateDisplay(ev.startDate)}
                    {ev.endDate?` → ${formatDateDisplay(ev.endDate)}`:""}
                    {age!==null?` · Age ${age}`:""}
                  </div>
                  {ev.notes && <div style={{fontSize:11,color:"#8a7e6b",marginTop:4}}>{ev.notes}</div>}
                  {ev.reviewDate && <div style={{fontSize:10,color:"#BA68C8",marginTop:3}}>↺ Review: {new Date(ev.reviewDate).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})}</div>}
                  {ev.links?.length>0 && <div style={{fontSize:10,color:"#29B6F6",marginTop:3}}>🔗 {ev.links.length} link{ev.links.length>1?"s":""}</div>}
                  {ev.isPrivate && <div style={{fontSize:10,color:"#90A4AE",marginTop:3}}>🔒 Private</div>}
                </div>);
              })()}
            </div>

            {/* ── TIME CURSOR — vertical inspection line ── */}
            {cursorYear !== null && cursorX !== null && (() => {
              const yr = Math.round(cursorYear * 4) / 4; // quarter-year precision
              const myAge = data.dob ? Math.floor(cursorYear - (new Date(data.dob).getFullYear() + new Date(data.dob).getMonth()/12)) : null;
              const displayYear = Math.floor(cursorYear);

              // Active strands at this year
              const activeStrands = (data.strands||[]).filter(s => {
                const startY = parseInt(s.enteredLifeAt);
                const endY   = s.closedAt ? parseInt(s.closedAt) : 9999;
                return startY <= displayYear && endY >= displayYear;
              });

              // Active events at this year (period events that span this point)
              const activeEvents = data.events.filter(ev => {
                if (ev.isFutureEvent) return false;
                const startY = parseInt(ev.startDate);
                if (!ev.endDate) return Math.abs(startY - displayYear) <= 1;
                const endY = ev.endDate === "ongoing" ? 9999 : parseInt(ev.endDate);
                return startY <= displayYear && endY >= displayYear;
              });

              // Panel position — flip to left if near right edge
              const panelLeft = cursorX + 14;
              const panelRight = panelLeft > (containerRef.current?.offsetWidth || 800) - 240;

              return <>
                {/* The line itself */}
                <div style={{
                  position:"absolute", left:cursorX, top:0, bottom:0, width:1,
                  background: cursorPinned ? "rgba(232,196,104,0.85)" : "rgba(232,196,104,0.45)",
                  borderLeft: cursorPinned ? "1px solid rgba(232,196,104,0.9)" : "1px dashed rgba(232,196,104,0.5)",
                  zIndex:30, pointerEvents:"none", transition: cursorPinned ? "none" : "left 0.05s",
                }}>
                  <div style={{
                    position:"absolute", top:8, left:"50%", transform:"translateX(-50%)",
                    background:"#2a2520", border:"1px solid rgba(232,196,104,0.5)",
                    borderRadius:3, padding:"2px 7px", fontSize:10, color:"#e8c468",
                    fontFamily:"'DM Sans',system-ui,sans-serif", fontWeight:600,
                    whiteSpace:"nowrap",
                  }}>{displayYear}{cursorPinned ? " 📌" : ""}</div>
                </div>

                {/* Snapshot panel */}
                <div style={{
                  position:"absolute",
                  left: panelRight ? undefined : panelLeft,
                  right: panelRight ? (containerRef.current?.offsetWidth - cursorX + 8) : undefined,
                  top: 44, zIndex:31,
                  background:lightMode?"rgba(245,240,232,0.98)":"rgba(28,24,20,0.97)",
                  border:lightMode?"1px solid rgba(100,80,60,0.3)":"1px solid rgba(180,168,145,0.25)",
                  borderRadius:8, padding:"12px 14px",
                  minWidth:200, maxWidth:280,
                  boxShadow:"0 6px 30px rgba(0,0,0,0.2)",
                  fontFamily:"'DM Sans',system-ui,sans-serif",
                  pointerEvents:"none",
                }}>
                  {/* Header — year and my age */}
                  <div style={{borderBottom:`1px solid ${lightMode?"rgba(100,80,60,0.15)":"rgba(180,168,145,0.12)"}`, paddingBottom:8, marginBottom:8}}>
                    <div style={{fontSize:20, fontWeight:700, color:lightMode?"#7a5000":"#e8c468", fontFamily:"'Cormorant Garamond',Georgia,serif"}}>
                      {displayYear}
                    </div>
                    {myAge !== null && myAge >= 0 && (
                      <div style={{fontSize:14, color:lightMode?"#3a2810":"#c8bca8", marginTop:2, fontWeight:500}}>
                        {data.name || "You"} · Age {myAge}
                      </div>
                    )}
                  </div>

                  {/* People — active strands with their ages */}
                  {activeStrands.length > 0 && (
                    <div style={{marginBottom:8}}>
                      {activeStrands.map(s => {
                        const typeInfo = STRAND_TYPES.find(t => t.id === s.type);
                        const dobSource = s.type==="sibling"
                          ? (s.siblingDob || null)
                          : (s.type==="parent"||s.type==="grandparent"||s.type==="partner"||s.type==="child"||s.type==="grandchild"||s.type==="friend")
                          ? s.personDob : null;
                        const theirAge = dobSource
                          ? Math.floor(displayYear - parseInt(String(dobSource).slice(0,4)))
                          : null;
                        const displayName = s.name
                          || (s.type==="parent"||s.type==="grandparent" ? s.relationship?.replace(/_/g," ") : null)
                          || typeInfo?.label;
                        return (
                          <div key={s.id} style={{display:"flex", alignItems:"center", gap:6,
                            padding:"3px 0", borderBottom:`1px solid ${lightMode?"rgba(100,80,60,0.08)":"rgba(180,168,145,0.06)"}`}}>
                            <span style={{fontSize:13}}>{typeInfo?.emoji}</span>
                            <span style={{fontSize:13, color: lightMode?"#2a1e10":(typeInfo?.color||"#c8bca8"), flex:1,
                              textTransform:"capitalize", fontWeight:500}}>{displayName}</span>
                            {theirAge !== null && theirAge >= 0 && (
                              <span style={{fontSize:12, color:lightMode?"#6a4a2a":"#9a8e7e"}}>Age {theirAge}</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Active events at this year */}
                  {activeEvents.length > 0 && (
                    <div style={{borderTop: activeStrands.length>0 ? `1px solid ${lightMode?"rgba(100,80,60,0.1)":"rgba(180,168,145,0.1)"}` : "none",
                      paddingTop: activeStrands.length>0 ? 8 : 0}}>
                      {activeEvents.slice(0,6).map(ev => {
                        const layer = layerForId(ev.layer);
                        return (
                          <div key={ev.id} style={{display:"flex", alignItems:"flex-start", gap:5,
                            padding:"2px 0", fontSize:13}}>
                            <span style={{width:7, height:7, borderRadius:"50%", flexShrink:0,
                              background:layer?.color||"#888", marginTop:3}}/>
                            <span style={{color:lightMode?"#2a1e10":"#c8b898", lineHeight:1.3}}>{ev.title}</span>
                          </div>
                        );
                      })}
                      {activeEvents.length > 6 && (
                        <div style={{fontSize:12, color:lightMode?"#6a4a2a":"#8a7e6b", marginTop:3}}>
                          + {activeEvents.length - 6} more
                        </div>
                      )}
                    </div>
                  )}

                  {/* World events at this year */}
                  {(() => {
                    const wes = (data.worldEvents||[]).filter(w => parseInt(w.year) === displayYear);
                    if (!wes.length) return null;
                    return (
                      <div style={{borderTop:`1px solid ${lightMode?"rgba(41,182,246,0.2)":"rgba(126,182,255,0.12)"}`, paddingTop:7, marginTop:4}}>
                        <div style={{fontSize:11,color:lightMode?"rgba(0,120,200,0.7)":"rgba(126,182,255,0.5)",textTransform:"uppercase",
                          letterSpacing:"0.1em",marginBottom:4}}>In the world</div>
                        {wes.map(w => (
                          <div key={w.id} style={{display:"flex", alignItems:"flex-start", gap:5,
                            padding:"2px 0", fontSize:13}}>
                            <span style={{fontSize:9, color:lightMode?"rgba(0,120,200,0.6)":"rgba(126,182,255,0.6)", marginTop:2}}>◆</span>
                            <div>
                              <span style={{color:lightMode?"rgba(0,100,180,0.85)":"rgba(126,182,255,0.85)"}}>{w.title}</span>
                              {w.notes && <div style={{fontSize:11,color:lightMode?"#6a5040":"#7a6e5e",marginTop:1,fontStyle:"italic"}}>{w.notes}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {activeStrands.length === 0 && activeEvents.length === 0 &&
                   !(data.worldEvents||[]).some(w => parseInt(w.year) === displayYear) && (
                    <div style={{fontSize:13, color:lightMode?"#8a6a50":"#7a6e5e", fontStyle:"italic"}}>
                      Nothing recorded for this year yet.
                    </div>
                  )}

                  {!cursorPinned && (
                    <div style={{fontSize:11, color:lightMode?"#9a8070":"#6a5e4e", marginTop:8, textAlign:"center"}}>
                      Click to pin · click again to release
                    </div>
                  )}
                </div>
              </>;
            })()}
          </div>
        );
      };

      // ─── MAIN RENDER ───
      return (
        <AppCtx.Provider value={{S, lightMode}}>
        <div style={S.app}>
          {/* Hidden file input for import */}
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport} />

          <div style={S.header}>
            <div style={{display:"flex", alignItems:"center", gap:12}}>
              <img src={momoIcon} alt="MoMo Creative"
                onClick={() => setShowAboutModal(true)}
                style={{width:36, height:36, borderRadius:7, cursor:"pointer", opacity:0.85,
                  flexShrink:0, transition:"opacity 0.15s"}}
                onMouseEnter={e=>e.target.style.opacity=1}
                onMouseLeave={e=>e.target.style.opacity=0.85} />
              <div>
                <h1 style={S.title}>All The Me That I Am</h1>
                <div style={S.subtitle}>
                  {data.name && <span>{data.name} · </span>}
                  {currentAge!==null && <span>Age {currentAge} · </span>}
                  <span>{data.events.length} life events</span>
                  {(data.strands||[]).length > 0 && <span> · {(data.strands||[]).length} {(data.strands||[]).length===1?"person":"people"}</span>}
                  {data.events.filter(e => e.endDate==="ongoing").length>0 && <span> · {data.events.filter(e=>e.endDate==="ongoing").length} ongoing</span>}
                </div>
              </div>
            </div>
            <div style={S.headerRight}>
              <button style={{...S.addBtn, background:"rgba(129,199,132,0.12)", color:"#81C784",
                border:"1px solid rgba(129,199,132,0.25)"}}
                onClick={() => {setEditingStrand(null);setShowAddPerson(true);}}>+ Add Person</button>
              <button style={{...S.addBtn, background:"rgba(100,149,237,0.1)", color:"#7EB6FF",
                border:"1px solid rgba(100,149,237,0.2)"}}
                onClick={() => {setEditingWorldEvent(null);setShowWorldEvent(true);}}>+ World Event</button>
              <button style={{...S.addBtn, background:"rgba(100,149,237,0.07)", color:"rgba(126,182,255,0.7)",
                border:"1px solid rgba(100,149,237,0.15)"}}
                onClick={() => setShowWorldLibrary(true)}>📚 Library</button>
              <button style={S.addBtn} onClick={() => {setEditingEvent(null);setShowAddEvent(true);}}>+ Add Event</button>
              <Tooltip text="Import from LinkedIn"><button style={{...S.headerBtn,
                color:"#0A66C2", border:"1px solid rgba(10,102,194,0.3)",
                background:"rgba(10,102,194,0.07)",
              }} onClick={() => setShowLinkedIn(true)}>in</button></Tooltip>
              <Tooltip text="Print / Share"><button style={S.headerBtn} onClick={() => setShowPrintDialog(true)}>🖨</button></Tooltip>
              <Tooltip text="Export data"><button style={S.headerBtn} onClick={exportData}>📤</button></Tooltip>
              <Tooltip text="Import data"><button style={S.headerBtn} onClick={() => importRef.current?.click()}>📥</button></Tooltip>
              <Tooltip text="Settings"><button style={S.headerBtn} onClick={() => setShowSetup(true)}>⚙</button></Tooltip>
              <Tooltip text="About"><button style={{...S.headerBtn, opacity:0.7}} onClick={() => setShowAboutModal(true)}>ℹ</button></Tooltip>
              <Tooltip text="Pass it on"><button style={{...S.headerBtn,
                color:"#81C784", opacity:0.85,
                border:"1px solid rgba(129,199,132,0.2)",
                background:"rgba(129,199,132,0.07)",
              }} onClick={() => setShowShareModal(true)}>✉</button></Tooltip>
              <Tooltip text={lightMode ? "Dark mode" : "Light mode"}>
                <button style={{...S.headerBtn, fontSize:17}} onClick={toggleLight}>
                  {lightMode ? "🌙" : "☀️"}
                </button>
              </Tooltip>
            </div>
          </div>

          {/* Import message */}
          {importMsg && (
            <div style={S.importMsg}>
              <span>{importMsg}</span>
              <button style={{...S.smallBtn,color:"#e8dcc8"}} onClick={() => setImportMsg(null)}>Dismiss</button>
            </div>
          )}

          {/* Review nudge — future events with review dates approaching */}
          {(() => {
            const today = new Date();
            const soon = new Date(); soon.setDate(soon.getDate()+60);
            const due = data.events.filter(ev =>
              ev.isFutureEvent && ev.reviewDate &&
              new Date(ev.reviewDate) >= today &&
              new Date(ev.reviewDate) <= soon
            );
            const overdue = data.events.filter(ev =>
              ev.isFutureEvent && ev.reviewDate &&
              new Date(ev.reviewDate) < today
            );
            if (due.length===0 && overdue.length===0) return null;
            return (
              <div style={{background:"rgba(186,104,200,0.08)",borderBottom:"1px solid rgba(186,104,200,0.2)",
                padding:"8px 24px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                <span style={{fontSize:13,color:"#BA68C8"}}>↺</span>
                <span style={{fontSize:12,color:"#a08ab0",flex:1}}>
                  {overdue.length>0 && <span style={{color:"#F06292",marginRight:8}}>
                    {overdue.length} review{overdue.length>1?"s":""} overdue —</span>}
                  {due.length>0 && <span>{due.length} review{due.length>1?"s":""} coming up — </span>}
                  <span style={{fontStyle:"italic"}}>how does where you are compare with what you intended?</span>
                </span>
                <button style={{...S.smallBtn,color:"#BA68C8"}}
                  onClick={() => saveData({...data,viewMode:"you"})}>View You</button>
              </div>
            );
          })()}

          <div style={S.toolbar}>
            <div style={S.toolbarLeft}>
              <div style={S.viewTabs}>
                {["timeline","table","layers"].map(v => (
                  <button key={v} style={data.viewMode===v?S.viewTabActive:S.viewTab}
                    onClick={() => saveData({...data,viewMode:v})}>{v.charAt(0).toUpperCase()+v.slice(1)}</button>
                ))}
                <div style={{ width:1, height:20, background:"rgba(180,168,145,0.15)", margin:"0 6px", alignSelf:"center" }}/>
                <button
                  style={data.viewMode==="you" ? S.youTabActive : S.youTab}
                  onClick={() => saveData({...data,viewMode:"you"})}
                  title="See yourself as a living shape across time"
                >
                  You
                </button>
                <button
                  style={{
                    ...(data.viewMode==="privacy" ? S.youTabActive : S.youTab),
                    borderColor: data.viewMode==="privacy"
                      ? (lightMode?"rgba(192,57,43,0.5)":"rgba(220,100,100,0.45)")
                      : (lightMode?"rgba(192,57,43,0.2)":"rgba(220,100,100,0.2)"),
                    color: data.viewMode==="privacy"
                      ? (lightMode?"#8b1a1a":"#e07070")
                      : (lightMode?"rgba(150,40,40,0.6)":"rgba(200,100,100,0.55)"),
                  }}
                  onClick={() => saveData({...data,viewMode:"privacy"})}
                  title="Review what you share and what stays yours"
                >
                  🔒 Privacy
                </button>
              </div>
              {data.viewMode==="timeline" && (
                <div style={S.zoomControls}>
                  <button style={S.zoomBtn} onClick={() => setZoomLevel(z=>Math.max(0.3,z*0.8))}>−</button>
                  <span style={S.zoomLabel}>{Math.round(zoomLevel*100)}%</span>
                  <button style={S.zoomBtn} onClick={() => setZoomLevel(z=>Math.min(10,z*1.25))}>+</button>
                  <button style={S.zoomBtn} onClick={() => {setZoomLevel(1);setPanOffset(0);}}>Reset</button>
                  <span style={{...S.zoomLabel, marginLeft:6, color:"rgba(180,168,145,0.4)"}}>|</span>
                  <button style={S.zoomBtn} onClick={() => setTrackFontSize(s=>Math.max(8,s-1))} title="Smaller labels">A−</button>
                  <span style={S.zoomLabel}>{trackFontSize}px</span>
                  <button style={S.zoomBtn} onClick={() => setTrackFontSize(s=>Math.min(16,s+1))} title="Larger labels">A+</button>
                </div>
              )}
            </div>
            <div style={S.toolbarRight}>
              {data.viewMode !== "you" && <>
              <button style={showLayerPanel?S.layerBtnActive:S.layerBtn} onClick={() => setShowLayerPanel(!showLayerPanel)}>
                Layers ({data.activeLayers.length}/{allLayers.length})
              </button>
              {filterLayer && <button style={S.clearFilter} onClick={() => setFilterLayer(null)}>
                Clear: {layerForId(filterLayer)?.label} ×</button>}
              </>}
            </div>
          </div>

          {showLayerPanel && (
            <div className="layer-panel" style={S.layerPanel}>
              <div style={S.layerPanelGrid}>
                {allLayers.map(layer => {
                  const count = data.events.filter(e=>e.layer===layer.id).length;
                  const active = data.activeLayers.includes(layer.id);
                  return (<div key={layer.id} style={S.layerPanelItem}>
                    <Tooltip text={layer.desc}>
                      <div style={{...S.layerPanelToggle,opacity:active?1:0.35}} onClick={() => toggleLayer(layer.id)}>
                        <span style={{...S.dot,background:layer.color}}></span>
                        <span style={S.layerPanelLabel}>{layer.label}</span>
                        <span style={S.layerPanelCount}>{count}</span>
                      </div>
                    </Tooltip>
                    <button style={S.layerFilterBtn} onClick={() => setFilterLayer(filterLayer===layer.id?null:layer.id)}
                      title={`Show only ${layer.label}`}>{filterLayer===layer.id?"◉":"○"}</button>
                    {!layer.builtin && <button style={{...S.layerFilterBtn,color:"#c44"}}
                      onClick={() => removeCustomLayer(layer.id)} title="Remove">×</button>}
                  </div>);
                })}
              </div>
              <div style={S.layerPanelActions}>
                <button style={S.smallBtn} onClick={() => saveData({...data,activeLayers:allLayers.map(l=>l.id)})}>Show all</button>
                <button style={S.smallBtn} onClick={() => saveData({...data,activeLayers:[]})}>Hide all</button>
                <button style={{...S.smallBtn,color:"#e8c468"}} onClick={() => setShowCustomLayerForm(true)}>+ Custom layer</button>
              </div>
            </div>
          )}

          <div style={S.mainContent}>
            {data.viewMode==="timeline" && renderTimelineView()}
            {data.viewMode==="table" && renderTableView()}
            {data.viewMode==="layers" && renderLayerSummary()}
            {data.viewMode==="you" && <YouView
              data={data}
              allLayers={allLayers}
              currentAge={currentAge}
              onRenameBeyondMe={(label) => saveData({...data, beyondMeLabel: label})}
            />}
            {data.viewMode==="privacy" && <PrivacyReview
              data={data}
              allLayers={allLayers}
              onTogglePrivacy={togglePrivacy}
              onToggleGroup={toggleGroupPrivacy}
              onExportSharedSelf={exportSharedSelf}
            />}
          </div>

          {/* Layer hover tooltip - rendered outside timeline transform */}
          {hoveredLayer && (() => {
            const layer = layerForId(hoveredLayer);
            if (!layer) return null;
            return (<div style={{
              position:"fixed", left:hoveredLayerPos.x, top:hoveredLayerPos.y,
              transform:"translateY(-50%)",
              background:"#3a352e", color:"#e8dcc8", fontSize:12,
              padding:"8px 14px", borderRadius:6, whiteSpace:"normal",
              boxShadow:"0 4px 16px rgba(0,0,0,0.4)", zIndex:1000,
              border:`1px solid ${layer.color}44`,
              fontFamily:"'DM Sans',system-ui,sans-serif", fontWeight:400,
              lineHeight:1.4, maxWidth:280, pointerEvents:"none",
            }}>
              <div style={{fontWeight:600,color:layer.color,marginBottom:2,fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em"}}>{layer.label}</div>
              <div>{layer.desc}</div>
            </div>);
          })()}

          {selectedEvent && (
            <div className="modal-overlay" style={S.detailOverlay} onClick={() => setSelectedEvent(null)}>
              <div style={S.detailCard} onClick={e => e.stopPropagation()}>
                <div style={S.detailHeader}>
                  <span style={{...S.layerBadge,background:layerForId(selectedEvent.layer)?.color}}>
                    {layerForId(selectedEvent.layer)?.label}</span>
                  <button style={S.closeBtn} onClick={() => setSelectedEvent(null)}>×</button>
                </div>
                <h3 style={S.detailTitle}>{selectedEvent.title}{selectedEvent.isPrivate && <span style={{...S.privateBadge,marginLeft:8,fontSize:10}}>private</span>}
                  {selectedEvent.isFutureEvent && <span style={{fontSize:10,marginLeft:8,padding:"2px 7px",borderRadius:3,
                    background:"rgba(197,168,130,0.12)",color:"#c8a84a",
                    border:"1px solid rgba(197,168,130,0.3)",fontWeight:500,
                    textTransform:"uppercase",letterSpacing:"0.05em",verticalAlign:"middle"}}>
                    {selectedEvent.futureNature||"ahead"}</span>}
                </h3>
                <div style={S.detailMeta}>
                  {formatDateDisplay(selectedEvent.startDate)}
                  {selectedEvent.endDate?` → ${formatDateDisplay(selectedEvent.endDate)}`:""}
                  {getAgeAt(data.dob,selectedEvent.startDate)!==null && <span> · Age {getAgeAt(data.dob,selectedEvent.startDate)}</span>}
                </div>
                {selectedEvent.notes && <div style={S.detailNotes}>{selectedEvent.notes}</div>}
                {selectedEvent.reviewDate && (
                  <div style={{fontSize:12,color:"#BA68C8",padding:"8px 0",
