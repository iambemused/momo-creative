    // ─── LINKEDIN IMPORT MODAL ───
    function LinkedInImportModal({ onClose, onImport, allLayers }) {
      const { S, lightMode } = React.useContext(AppCtx);
      const [step, setStep]           = React.useState("upload"); // upload | review | done
      const [parsed, setParsed]       = React.useState([]);       // array of draft events
      const [error, setError]         = React.useState(null);
      const [loading, setLoading]     = React.useState(false);
      const [pasteText, setPasteText] = React.useState("");
      const [mode, setMode]           = React.useState("zip");    // zip only now

      // ── Colour palette ──
      const textMain   = lightMode ? "#111827" : "#ede0c8";
      const textMid    = lightMode ? "#1f2937" : "#d4c8b0";
      const textDim    = lightMode ? "#6b7280" : "#b0a080";
      const textDimmer = lightMode ? "#9ca3af" : "#8a7860";
      const borderCol  = lightMode ? "rgba(0,0,0,0.09)" : "rgba(180,168,145,0.15)";
      const bg         = lightMode ? "#ffffff" : "#1a1714";
      const bgSurf     = lightMode ? "#f0f2f5" : "#201d18";
      const bgDeep     = lightMode ? "#e8eaed" : "#252018";
      const inputBg    = lightMode ? "#f3f4f6" : "#2a2420";
      const headerBg   = "#0A66C2";

      // ── LinkedIn date parser ──
      // Handles: "Jan 2015", "January 2015", "2015", "Jan 01, 2015", ""
      const parseLinkedInDate = (str) => {
        if (!str || str.trim() === "" || str.trim().toLowerCase() === "present") return null;
        const s = str.trim();
        // Year only
        if (/^\d{4}$/.test(s)) return s;
        // Month Year
        const my = s.match(/^([A-Za-z]+)\s+(\d{4})$/);
        if (my) {
          const months = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",
                          jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
          const m = months[my[1].slice(0,3).toLowerCase()];
          return m ? `${my[2]}-${m}` : my[2];
        }
        // Full date
        const fd = s.match(/(\d{4})/);
        return fd ? fd[1] : null;
      };

      const yearOf = (dateStr) => {
        if (!dateStr) return null;
        const m = dateStr.match(/(\d{4})/);
        return m ? parseInt(m[1]) : null;
      };

      // ── CSV parser (handles quoted fields with commas) ──
      const parseCSV = (text) => {
        const lines = text.trim().split(/\r?\n/);
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
        return lines.slice(1).map(line => {
          const values = [];
          let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') { inQ = !inQ; }
            else if (line[i] === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
            else { cur += line[i]; }
          }
          values.push(cur.trim());
          const row = {};
          headers.forEach((h, i) => { row[h] = (values[i] || '').replace(/^"|"$/g,'').trim(); });
          return row;
        }).filter(r => Object.values(r).some(v => v));
      };

      // ── Map CSV rows to ATTMTIA events ──
      const mapToEvents = (csvName, rows) => {
        const id = () => Math.random().toString(36).slice(2,10);
        const name = csvName.toLowerCase();

        if (name.includes('position')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'vocation',
            title: [r['Title'], r['Company Name'] || r['Company']].filter(Boolean).join(' — '),
            startDate: parseLinkedInDate(r['Started On']) || '',
            endDate: r['Finished On'] && r['Finished On'].toLowerCase() !== 'present'
              ? (parseLinkedInDate(r['Finished On']) || null) : 'ongoing',
            notes: [r['Description'], r['Location'] ? `Location: ${r['Location']}` : ''].filter(Boolean).join('\n').trim(),
            links: [],
          })).filter(e => e.title && e.startDate);
        }

        if (name.includes('education')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'learning',
            title: [r['School Name'] || r['School'], r['Degree Name'] || r['Degree']].filter(Boolean).join(' — '),
            startDate: parseLinkedInDate(r['Start Date']) || parseLinkedInDate(r['Started On']) || '',
            endDate: parseLinkedInDate(r['End Date']) || parseLinkedInDate(r['Finished On']) || null,
            notes: [r['Activities'], r['Notes'], r['Field Of Study'] ? `Field: ${r['Field Of Study']}` : ''].filter(Boolean).join('\n').trim(),
            links: [],
          })).filter(e => e.title && e.startDate);
        }

        if (name.includes('certification')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'accomplishments',
            title: [r['Name'], r['Authority']].filter(Boolean).join(' — '),
            startDate: parseLinkedInDate(r['Started On']) || parseLinkedInDate(r['Issued On']) || '',
            endDate: parseLinkedInDate(r['Finished On']) || null,
            notes: '',
            links: r['Url'] ? [{ url: r['Url'], label: r['Name'] || 'Certificate' }] : [],
          })).filter(e => e.title && e.startDate);
        }

        if (name.includes('course')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'learning',
            title: r['Name'] || r['Course Name'] || '',
            startDate: new Date().getFullYear().toString(), // courses rarely have dates
            endDate: null,
            notes: r['Number'] ? `Course number: ${r['Number']}` : '',
            links: [],
          })).filter(e => e.title);
        }

        if (name.includes('volunteer')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'community',
            title: [r['Role'], r['Company']].filter(Boolean).join(' — '),
            startDate: parseLinkedInDate(r['Started On']) || '',
            endDate: r['Finished On'] && r['Finished On'].toLowerCase() !== 'present'
              ? (parseLinkedInDate(r['Finished On']) || null) : 'ongoing',
            notes: [r['Description'], r['Cause'] ? `Cause: ${r['Cause']}` : ''].filter(Boolean).join('\n').trim(),
            links: [],
          })).filter(e => e.title && e.startDate);
        }

        if (name.includes('project')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'pursuits',
            title: r['Title'] || r['Name'] || '',
            startDate: parseLinkedInDate(r['Started On']) || '',
            endDate: parseLinkedInDate(r['Finished On']) || null,
            notes: r['Description'] || '',
            links: r['Url'] ? [{ url: r['Url'], label: r['Title'] || 'Project' }] : [],
          })).filter(e => e.title && e.startDate);
        }

        if (name.includes('publication')) {
          return rows.map(r => ({
            id: id(), isPrivate: false, isFutureEvent: false,
            layer: 'creative',
            title: [r['Name'], r['Publisher']].filter(Boolean).join(' — '),
            startDate: parseLinkedInDate(r['Published On']) || parseLinkedInDate(r['Published Date']) || '',
            endDate: null,
            notes: r['Description'] || '',
            links: r['Url'] ? [{ url: r['Url'], label: r['Name'] || 'Publication' }] : [],
          })).filter(e => e.title && e.startDate);
        }

        return [];
      };

      // ── Process ZIP file ──
      const handleZip = async (file) => {
        setLoading(true); setError(null);
        try {
          const zip = await JSZip.loadAsync(file);
          const allEvents = [];
          const fileNames = Object.keys(zip.files);

          const targetFiles = fileNames.filter(name => {
            const n = name.toLowerCase();
            return (n.includes('position') || n.includes('education') ||
                    n.includes('certification') || n.includes('course') ||
                    n.includes('volunteer') || n.includes('project') ||
                    n.includes('publication')) && n.endsWith('.csv');
          });

          if (targetFiles.length === 0) {
            setError("No recognisable LinkedIn export files found in this ZIP. Make sure you're uploading a LinkedIn data export (Settings → Data Privacy → Get a copy of your data).");
            setLoading(false); return;
          }

          for (const fname of targetFiles) {
            const text = await zip.files[fname].async("string");
            const rows = parseCSV(text);
            const baseName = fname.split('/').pop();
            const events = mapToEvents(baseName, rows);
            allEvents.push(...events);
          }

          if (allEvents.length === 0) {
            setError("Files found but no events could be extracted. The CSV files may be empty or in an unexpected format.");
            setLoading(false); return;
          }

          // Sort by start year
          allEvents.sort((a, b) => (yearOf(a.startDate) || 9999) - (yearOf(b.startDate) || 9999));
          setParsed(allEvents);
          setStep("review");
        } catch (e) {
          setError("Could not read the ZIP file. Please ensure it's a valid LinkedIn data export.");
        }
        setLoading(false);
      };

      // ── Process AI paste ──
      const handlePaste = () => {
        if (!pasteText.trim()) return;
        setError(null);

        // ── Client-side LinkedIn text parser ──
        // LinkedIn profile text (copied from browser) has fairly consistent structure.
        // We look for blocks that contain a title, optional organisation, and date patterns.
        const id = () => Math.random().toString(36).slice(2,10);
        const events = [];

        // Date pattern: "Jan 2015", "January 2015", "2015", "Present"
        const datePat = '(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\\s+\\d{4}|\\d{4}';
        const dateRangeRe = new RegExp(`(${datePat})\\s*[–\\-—]\\s*(${datePat}|Present|present)`, 'gi');
        const singleDateRe = new RegExp(`^(${datePat})$`, 'i');

        // Split text into blocks by double newlines or section-like breaks
        const blocks = pasteText.split(/\n{2,}/).map(b => b.trim()).filter(b => b.length > 5);

        // Section heading detection — classify what kind of content follows
        const sectionHeadings = {
          vocation:       /^(experience|work experience|employment|career|positions?)$/i,
          learning:       /^(education|academic|qualifications?)$/i,
          accomplishments:/^(licen[sc]es?\s*[&and]*\s*certifications?|awards?|honours?|honors?)$/i,
          community:      /^(volunteer|volunteering|community|civic|social impact)$/i,
          pursuits:       /^(projects?|initiatives?|side projects?)$/i,
          creative:       /^(publications?|articles?|papers?|books?|writing)$/i,
        };

        let currentSection = 'vocation'; // default assumption for work history

        for (let i = 0; i < blocks.length; i++) {
          const block = blocks[i];
          const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
          if (!lines.length) continue;

          // Check if this block is a section heading
          for (const [layer, re] of Object.entries(sectionHeadings)) {
            if (lines.length <= 2 && re.test(lines[0])) {
              currentSection = layer;
              continue;
            }
          }

          // Look for date ranges in the block
          const dateMatches = [...block.matchAll(dateRangeRe)];

          if (dateMatches.length > 0) {
            for (const match of dateMatches) {
              const startDate = parseLinkedInDate(match[1]);
              const endRaw = match[2];
              const endDate = endRaw.toLowerCase() === 'present'
                ? 'ongoing'
                : parseLinkedInDate(endRaw);

              if (!startDate) continue;

              // Title is usually the first non-date line before this match
              // Find lines that don't look like dates
              const nonDateLines = lines.filter(l =>
                !dateRangeRe.test(l) && !singleDateRe.test(l) && l.length > 2
              );
              const title = nonDateLines.slice(0, 2).join(' — ').slice(0, 120);
              if (!title) continue;

              // Reset regex lastIndex
              dateRangeRe.lastIndex = 0;

              events.push({
                id: id(), isPrivate: false, isFutureEvent: false,
                layer: currentSection,
                title,
                startDate,
                endDate,
                notes: nonDateLines.slice(2).join(' ').slice(0, 150) || '',
                links: [],
              });
              break; // one event per block
            }
          } else {
            // No date range — try single date or year
            const yearMatch = block.match(/\b((?:19|20)\d{2})\b/);
            if (yearMatch) {
              const nonDateLines = lines.filter(l =>
                !singleDateRe.test(l) && !/^\d{4}$/.test(l) && l.length > 3
              );
              const title = nonDateLines.slice(0, 2).join(' — ').slice(0, 120);
              if (title && yearMatch[1]) {
                events.push({
                  id: id(), isPrivate: false, isFutureEvent: false,
                  layer: currentSection,
                  title,
                  startDate: yearMatch[1],
                  endDate: null,
                  notes: nonDateLines.slice(2).join(' ').slice(0, 150) || '',
                  links: [],
                });
              }
            }
          }
        }

        // Deduplicate by title+startDate
        const seen = new Set();
        const unique = events.filter(e => {
          const key = `${e.title}|${e.startDate}`;
          if (seen.has(key)) return false;
          seen.add(key); return true;
        });

        if (unique.length === 0) {
          setError("Couldn't extract events from the pasted text. Try selecting more of your profile — include the Experience and Education sections. Or use the ZIP export option for better results.");
          return;
        }

        unique.sort((a, b) => (yearOf(a.startDate)||9999) - (yearOf(b.startDate)||9999));
        setParsed(unique);
        setStep("review");
      };

      // ── Layer info for the review screen ──
      const layerOptions = [
        { id:"vocation",       label:"Work & Vocation",    color:"#2196F3" },
        { id:"learning",       label:"Learning",           color:"#29B6F6" },
        { id:"accomplishments",label:"Accomplishments",    color:"#FFD54F" },
        { id:"community",      label:"Community & Civic",  color:"#81C784" },
        { id:"pursuits",       label:"Pursuits",           color:"#4CAF50" },
        { id:"creative",       label:"Creative Works",     color:"#F06292" },
        { id:"journeys",       label:"Journeys",           color:"#FF7043" },
        { id:"physical",       label:"The Physical",       color:"#26C6DA" },
        { id:"relationships",  label:"Relationships",      color:"#E91E63" },
        { id:"examined",       label:"The Examined",       color:"#BA68C8" },
        { id:"losses",         label:"Losses",             color:"#90A4AE" },
        { id:"wealth",         label:"Wealth & Means",     color:"#CE9A5B" },
      ];

      const updateEvent = (id, field, value) => {
        setParsed(prev => prev.map(e => e.id === id ? { ...e, [field]: value } : e));
      };
      const removeEvent = (id) => setParsed(prev => prev.filter(e => e.id !== id));

      const layerColor = (layerId) => layerOptions.find(l => l.id === layerId)?.color || "#888";
      const layerLabel = (layerId) => layerOptions.find(l => l.id === layerId)?.label || layerId;

      const inputStyle = {
        padding:"6px 9px", background:inputBg, border:`1px solid ${borderCol}`,
        borderRadius:4, color:textMain, fontSize:13,
        fontFamily:"'DM Sans',system-ui,sans-serif", outline:"none",
      };

      return (
        <div style={{ ...S.modalOverlay, zIndex:1000 }} onClick={onClose}>
          <div style={{
            background:bg, borderRadius:10, border:`1px solid ${borderCol}`,
            width:"100%", maxWidth:720, maxHeight:"90vh",
            display:"flex", flexDirection:"column",
            boxShadow:"0 20px 60px rgba(0,0,0,0.4)",
          }} onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div style={{
              display:"flex", alignItems:"center", gap:14,
              padding:"18px 24px 16px", background:headerBg,
              borderRadius:"10px 10px 0 0", flexShrink:0,
            }}>
              <div style={{
                width:42, height:42, borderRadius:8, flexShrink:0,
                background:"#fff", display:"flex", alignItems:"center",
                justifyContent:"center",
                fontFamily:"Georgia,serif", fontSize:22, fontWeight:700, color:"#0A66C2",
              }}>in</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.5)",
                  textTransform:"uppercase", letterSpacing:"0.13em",
                  fontFamily:"'DM Sans',system-ui,sans-serif", marginBottom:2 }}>
                  LinkedIn Import
                </div>
                <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif",
                  fontSize:22, fontWeight:400, color:"#fff" }}>
                  {step === "upload" ? "Bring your professional history in" : `Review ${parsed.length} events before importing`}
                </div>
              </div>
              <button onClick={onClose} style={{
                background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.25)",
                cursor:"pointer", color:"rgba(255,255,255,0.8)", fontSize:13,
                padding:"4px 12px", borderRadius:4, fontFamily:"'DM Sans',system-ui,sans-serif",
              }}>Close</button>
            </div>

            {/* Body */}
            <div style={{ flex:1, overflowY:"auto", padding:"22px 24px" }}>

              {/* ── UPLOAD STEP ── */}
              {step === "upload" && (
                <div>
                  {/* Note about what this is */}
                  <div style={{ background:lightMode?"#eaf4fb":"rgba(10,102,194,0.1)",
                    borderLeft:"4px solid #0A66C2", borderRadius:4,
                    padding:"13px 16px", marginBottom:20 }}>
                    <p style={{ fontSize:15, color:textMid, lineHeight:1.8,
                      fontFamily:"'Cormorant Garamond',Georgia,serif", margin:0 }}>
                      LinkedIn holds your professional narrative — roles, education, certifications,
                      projects. This imports that timeline into All The Me That I Am so you're not
                      re-entering what you've already documented.
                    </p>
                    <p style={{ fontSize:14, color:textDimmer, lineHeight:1.7, marginTop:8,
                      fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                      Note: this brings in your <em>public professional narrative</em>. Your fuller
                      life map will include much that LinkedIn never knew about.
                    </p>
                  </div>

                  {/* Mode toggle */}
                  <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                    {[{id:"zip",label:"📦 Upload LinkedIn ZIP"},{id:"paste",label:"📋 Paste profile text"}].map(m => (
                      <button key={m.id} onClick={() => setMode(m.id)} style={{
                        padding:"8px 16px", borderRadius:5, cursor:"pointer",
                        fontSize:13, fontWeight: mode===m.id ? 600 : 400,
                        border:`1px solid ${mode===m.id?"#0A66C2":borderCol}`,
                        background: mode===m.id ? (lightMode?"rgba(10,102,194,0.08)":"rgba(10,102,194,0.12)") : "transparent",
                        color: mode===m.id ? "#0A66C2" : textDim,
                        fontFamily:"'DM Sans',system-ui,sans-serif",
                      }}>{m.label}</button>
                    ))}
                  </div>

                  {mode === "zip" && (
                    <div>
                      <div style={{ fontSize:14, fontWeight:600, color:textMain, marginBottom:12,
                        fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                        How to get your LinkedIn export
                      </div>
                      {[
                        "Go to LinkedIn → Me → Settings & Privacy",
                        "Click Data Privacy → Get a copy of your data",
                        "Select 'Want something in particular?' and tick: Positions, Education, Certifications, Courses, Volunteer Experiences, Projects, Publications",
                        "Click Request archive — LinkedIn emails you a download link (usually within minutes for a partial export)",
                        "Download the ZIP file and upload it here"
                      ].map((step, i) => (
                        <div key={i} style={{ display:"flex", gap:12, marginBottom:10, alignItems:"flex-start" }}>
                          <div style={{ width:22, height:22, borderRadius:"50%", flexShrink:0,
                            background:"#0A66C2", color:"#fff", fontSize:12, fontWeight:700,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontFamily:"'DM Sans',system-ui,sans-serif", marginTop:1 }}>{i+1}</div>
                          <div style={{ fontSize:14, color:textMid, lineHeight:1.6,
                            fontFamily:"'DM Sans',system-ui,sans-serif" }}>{step}</div>
                        </div>
                      ))}

                      <label style={{
                        display:"flex", flexDirection:"column", alignItems:"center",
                        justifyContent:"center", gap:10,
                        border:`2px dashed ${lightMode?"#0A66C2":"rgba(10,102,194,0.4)"}`,
                        borderRadius:8, padding:"28px 24px", cursor:"pointer",
                        marginTop:20, background:lightMode?"rgba(10,102,194,0.03)":"rgba(10,102,194,0.06)",
                        transition:"all 0.15s",
                      }}>
                        <span style={{ fontSize:32 }}>📦</span>
                        <span style={{ fontSize:14, fontWeight:600, color:"#0A66C2",
                          fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                          {loading ? "Reading ZIP file…" : "Click to upload your LinkedIn ZIP"}
                        </span>
                        <span style={{ fontSize:12, color:textDimmer,
                          fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                          .zip files only — your data stays on this device
                        </span>
                        <input type="file" accept=".zip" style={{display:"none"}}
                          onChange={e => e.target.files?.[0] && handleZip(e.target.files[0])} />
                      </label>
                    </div>
                  )}

                  {mode === "paste" && (
                    <div>
                      <div style={{ fontSize:14, color:textMid, marginBottom:10, lineHeight:1.6,
                        fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                        Copy your LinkedIn profile text — your Experience, Education, and any other
                        sections — and paste it below. AI will extract events from it.
                      </div>
                      <textarea
                        rows={12}
                        placeholder="Paste your LinkedIn profile text here…"
                        value={pasteText}
                        onChange={e => setPasteText(e.target.value)}
                        style={{ ...inputStyle, width:"100%", resize:"vertical",
                          minHeight:180, lineHeight:1.6, fontSize:13, padding:"10px 12px" }}
                      />
                      <button onClick={handlePaste} disabled={!pasteText.trim()} style={{
                        marginTop:12, padding:"9px 22px", borderRadius:5,
                        cursor: !pasteText.trim() ? "not-allowed" : "pointer",
                        fontSize:14, fontWeight:600, border:"1px solid #0A66C2",
                        background: !pasteText.trim() ? "transparent" : "rgba(10,102,194,0.12)",
                        color: !pasteText.trim() ? textDimmer : "#0A66C2",
                        fontFamily:"'DM Sans',system-ui,sans-serif",
                        opacity: !pasteText.trim() ? 0.5 : 1,
                      }}>
                        Extract events from text
                      </button>
                    </div>
                  )}

                  {error && (
                    <div style={{ marginTop:16, padding:"12px 14px", borderRadius:5,
                      background:lightMode?"#fdf2f2":"rgba(192,57,43,0.09)",
                      border:"1px solid rgba(192,57,43,0.3)",
                      fontSize:14, color:lightMode?"#c0392b":"#e07070", lineHeight:1.6,
                      fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                      {error}
                    </div>
                  )}
                </div>
              )}

              {/* ── REVIEW STEP ── */}
              {step === "review" && (
                <div>
                  <div style={{ marginBottom:16, padding:"12px 14px", borderRadius:4,
                    background:lightMode?"#eaf4fb":"rgba(10,102,194,0.1)",
                    borderLeft:"4px solid #0A66C2", fontSize:14, color:textMid,
                    fontFamily:"'DM Sans',system-ui,sans-serif", lineHeight:1.7 }}>
                    Review each event before it enters your timeline. You can change the layer,
                    edit the title, adjust dates, or remove anything that doesn't belong.
                    These will be added as regular events — you can edit them further afterwards.
                  </div>

                  {/* Group by layer */}
                  {layerOptions
                    .filter(l => parsed.some(e => e.layer === l.id))
                    .map(layer => (
                      <div key={layer.id} style={{ marginBottom:20 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8,
                          marginBottom:8, paddingBottom:6,
                          borderBottom:`2px solid ${layer.color}33` }}>
                          <div style={{ width:10, height:10, borderRadius:"50%",
                            background:layer.color, flexShrink:0 }} />
                          <span style={{ fontSize:13, fontWeight:700, color:textMain,
                            fontFamily:"'DM Sans',system-ui,sans-serif" }}>{layer.label}</span>
                          <span style={{ fontSize:12, color:textDimmer,
                            fontFamily:"'DM Sans',system-ui,sans-serif" }}>
                            ({parsed.filter(e => e.layer === layer.id).length} events)
                          </span>
                        </div>

                        {parsed
                          .filter(e => e.layer === layer.id)
                          .map(event => (
                            <div key={event.id} style={{
                              border:`1px solid ${borderCol}`, borderRadius:6,
                              padding:"10px 12px", marginBottom:8,
                              background:lightMode?"rgba(0,0,0,0.02)":"rgba(255,255,255,0.02)",
                            }}>
                              <div style={{ display:"flex", gap:8, alignItems:"flex-start",
                                marginBottom:6 }}>
                                {/* Title */}
                                <input value={event.title}
                                  onChange={e => updateEvent(event.id, 'title', e.target.value)}
                                  style={{ ...inputStyle, flex:1, fontSize:14, fontWeight:600 }} />
                                {/* Remove */}
                                <button onClick={() => removeEvent(event.id)} style={{
                                  padding:"4px 8px", borderRadius:4, cursor:"pointer",
                                  border:`1px solid ${borderCol}`,
                                  background:"transparent", color:textDimmer, fontSize:16,
                                  flexShrink:0, lineHeight:1,
                                }} title="Remove this event">×</button>
                              </div>

                              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                                {/* Start year */}
                                <div>
                                  <div style={{ fontSize:11, color:textDimmer, marginBottom:3,
                                    fontFamily:"'DM Sans',system-ui,sans-serif" }}>From</div>
                                  <input value={event.startDate}
                                    onChange={e => updateEvent(event.id, 'startDate', e.target.value)}
                                    style={{ ...inputStyle, width:90 }} placeholder="YYYY" />
                                </div>
                                {/* End year */}
                                <div>
                                  <div style={{ fontSize:11, color:textDimmer, marginBottom:3,
                                    fontFamily:"'DM Sans',system-ui,sans-serif" }}>To</div>
                                  <input value={event.endDate || ''}
                                    onChange={e => updateEvent(event.id, 'endDate', e.target.value || null)}
                                    style={{ ...inputStyle, width:100 }} placeholder="YYYY or ongoing" />
                                </div>
                                {/* Layer */}
                                <div style={{ flex:1, minWidth:160 }}>
                                  <div style={{ fontSize:11, color:textDimmer, marginBottom:3,
                                    fontFamily:"'DM Sans',system-ui,sans-serif" }}>Layer</div>
                                  <select value={event.layer}
                                    onChange={e => updateEvent(event.id, 'layer', e.target.value)}
                                    style={{ ...inputStyle, width:"100%", cursor:"pointer" }}>
                                    {layerOptions.map(l => (
                                      <option key={l.id} value={l.id}>{l.label}</option>
                                    ))}
                                  </select>
                                </div>
                              </div>

                              {event.notes && (
                                <div style={{ marginTop:6, fontSize:12, color:textDimmer,
                                  fontFamily:"'DM Sans',system-ui,sans-serif",
                                  fontStyle:"italic", lineHeight:1.5 }}>
                                  {event.notes.slice(0,120)}{event.notes.length > 120 ? "…" : ""}
                                </div>
                              )}
                            </div>
                          ))
                        }
                      </div>
                    ))
                  }

                  {parsed.length === 0 && (
                    <div style={{ textAlign:"center", padding:32, color:textDimmer,
                      fontFamily:"'Cormorant Garamond',Georgia,serif",
                      fontSize:16, fontStyle:"italic" }}>
                      All events removed. Go back to try again.
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              padding:"12px 24px", borderTop:`1px solid ${borderCol}`,
              display:"flex", justifyContent:"space-between", alignItems:"center",
              flexShrink:0, background:bgSurf, borderRadius:"0 0 10px 10px",
            }}>
              <div style={{ fontSize:12, color:textDimmer, fontStyle:"italic",
