                    borderTop:"1px solid rgba(180,168,145,0.1)"}}>
                    ↺ Review: {new Date(selectedEvent.reviewDate).toLocaleDateString("en-AU",{day:"numeric",month:"long",year:"numeric"})}
                  </div>
                )}
                {selectedEvent.links?.length>0 && (
                  <div style={S.detailLinks}>
                    <div style={S.detailLinksTitle}>Linked resources</div>
                    {selectedEvent.links.map((lk,i) => (
                      <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer" style={S.detailLink}>
                        <span>🔗</span><span>{lk.label||lk.url}</span><span style={{fontSize:11,opacity:0.5}}>↗</span>
                      </a>
                    ))}
                  </div>
                )}
                <div style={S.detailActions}>
                  <button style={S.editBtn} onClick={() => {setEditingEvent(selectedEvent);setShowAddEvent(true);setSelectedEvent(null);}}>Edit</button>
                  {selectedEvent.isFutureEvent && (
                    <button style={{...S.editBtn,color:"#4CAF50",borderColor:"rgba(76,175,80,0.3)",
                      background:"rgba(76,175,80,0.08)"}}
                      title="Convert this to a lived event — it happened"
                      onClick={() => {
                        const lived = {...selectedEvent, isFutureEvent:false, futureNature:null, reviewDate:null};
                        addOrUpdateEvent(lived);
                        setSelectedEvent(null);
                      }}>Mark as Lived</button>
                  )}
                  <button style={S.deleteBtn} onClick={() => deleteEvent(selectedEvent.id)}>Delete</button>
                </div>
              </div>
            </div>
          )}

          {showWorldLibrary && <WorldEventLibraryModal
            existingEvents={data.worldEvents||[]}
            dob={data.dob}
            onSync={(events) => {
              saveData({ ...data, worldEvents: events });
              setShowWorldLibrary(false);
            }}
            onCancel={() => setShowWorldLibrary(false)} />}

          {showWorldEvent && <WorldEventModal we={editingWorldEvent} dob={data.dob}
            onSave={addOrUpdateWorldEvent} onCancel={() => {setShowWorldEvent(false);setEditingWorldEvent(null);}} />}

          {showAboutModal && <AboutModal onClose={() => setShowAboutModal(false)} />}}
          {showShareModal && <ATTMTIAShareModal onClose={() => setShowShareModal(false)} data={data} exportSharedSelf={exportSharedSelf} />}
          {showSetup && <SetupScreen data={data} onSave={(d) => { saveData(d); setShowSetup(false); }} onClose={() => setShowSetup(false)} />}
          {showLinkedIn && <LinkedInImportModal onClose={() => setShowLinkedIn(false)} onImport={(events) => { saveData({...data, events:[...data.events, ...events]}); setShowLinkedIn(false); setImportMsg(`${events.length} events imported from LinkedIn.`); }} allLayers={allLayers} />}

          {showAddEvent && <EventModal event={editingEvent} dob={data.dob} layers={allLayers}
            onSave={addOrUpdateEvent} onCancel={() => {setShowAddEvent(false);setEditingEvent(null);}} />}

          {showAddPerson && <StrandModal strand={editingStrand} dob={data.dob}
            onSave={addOrUpdateStrand} onCancel={() => {setShowAddPerson(false);setEditingStrand(null);}} />}

          {selectedStrand && (
            <div className="modal-overlay" style={S.detailOverlay} onClick={() => setSelectedStrand(null)}>
              <div style={S.detailCard} onClick={e => e.stopPropagation()}>
                <div style={S.detailHeader}>
                  <span style={{...S.layerBadge, background: STRAND_TYPES.find(t=>t.id===selectedStrand.type)?.color||"#888"}}>
                    {STRAND_TYPES.find(t=>t.id===selectedStrand.type)?.emoji} {STRAND_TYPES.find(t=>t.id===selectedStrand.type)?.label}
                  </span>
                  <button style={S.closeBtn} onClick={() => setSelectedStrand(null)}>×</button>
                </div>
                <h3 style={S.detailTitle}>
                  {selectedStrand.name ||
                   ((selectedStrand.type==="parent"||selectedStrand.type==="grandparent")
                     ? selectedStrand.relationship?.replace(/_/g," ") : null) ||
                   STRAND_TYPES.find(t=>t.id===selectedStrand.type)?.label}
                </h3>
                {selectedStrand.extendedDesc && (
                  <div style={{...S.detailNotes, fontStyle:"italic"}}>{selectedStrand.extendedDesc}</div>
                )}
                <div style={S.detailMeta}>
                  Entered your life: {selectedStrand.enteredLifeAt}
                  {data.dob && getAgeAt(data.dob, selectedStrand.enteredLifeAt) !== null &&
                    ` · Your age: ${getAgeAt(data.dob, selectedStrand.enteredLifeAt)}`}
                </div>
                <div style={{...S.detailMeta, marginTop:4}}>
                  Status: <span style={{
                    color: selectedStrand.status==="active" ? "#81C784"
                         : selectedStrand.status==="deceased" ? "#90A4AE"
                         : "#F06292"
                  }}>
                    {selectedStrand.status==="active" ? "Active"
                   : selectedStrand.status==="deceased" ? "Passed away"
                   : selectedStrand.status==="estranged" ? "Estranged"
                   : "Transitioned"}
                  </span>
                  {selectedStrand.closedAt && ` · ${selectedStrand.closedAt}`}
                </div>
                {selectedStrand.notes && <div style={S.detailNotes}>{selectedStrand.notes}</div>}
                {(selectedStrand.phases||[]).length > 1 && (
                  <div style={{marginTop:10, borderTop:"1px solid rgba(180,168,145,0.1)", paddingTop:10}}>
                    <div style={{fontSize:11,color:"#5a4e3e",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Phases</div>
                    {(selectedStrand.phases||[]).map(p => (
                      <div key={p.id} style={{fontSize:12,color:"#8a7e6b",marginBottom:3}}>
                        <span style={{color:"#c8bca8"}}>{p.label.replace(/_/g," ")}</span>
                        {" · "}{p.startDate}
                        {p.endDate && p.endDate !== "ongoing" ? ` → ${p.endDate}` : " → ongoing"}
                      </div>
                    ))}
                  </div>
                )}
                <div style={S.detailActions}>
                  <button style={S.editBtn} onClick={() => {
                    setEditingStrand(selectedStrand);
                    setShowAddPerson(true);
                    setSelectedStrand(null);
                  }}>Edit</button>
                  <button style={S.deleteBtn} onClick={() => deleteStrand(selectedStrand.id)}>Remove</button>
                </div>
              </div>
            </div>
          )}

          {showCustomLayerForm && <CustomLayerModal onSave={addCustomLayer} onCancel={() => setShowCustomLayerForm(false)} />}

          {showPrintDialog && <PrintDialog
            events={data.events} layers={allLayers} dob={data.dob} name={data.name} currentAge={currentAge}
            onPrint={executePrint} onCancel={() => setShowPrintDialog(false)} />}

          <div style={S.footer}>
            <span style={S.footerText}>
              {data.viewMode==="you"
                ? "Your entries build your shape — the more you record, the truer the form"
                : "Scroll to zoom · Drag to pan · Click events to inspect · Hover layers for descriptions"}
            </span>
            <button style={S.resetBtn} onClick={resetAll}>Reset all data</button>
          </div>
        </div>
        </AppCtx.Provider>
      );
    }

    // ─── YOU VIEW ─────────────────────────────────────────────────────────────
    function YouView({ data, allLayers, currentAge, onRenameBeyondMe }) {
      const {S, lightMode} = React.useContext(AppCtx);
      const [youAge,       setYouAge]       = useState(currentAge || 30);
      const [displayAge,   setDisplayAge]   = useState(currentAge || 30);
      const [cloudMode,    setCloudMode]    = useState(true);
      const [hovered,      setHovered]      = useState(null);
      const [renaming,     setRenaming]     = useState(false);
      const [renameVal,    setRenameVal]    = useState("");
      const [showAbout,    setShowAbout]    = useState(false);
      const rafRef = useRef(null);

      const lifeExp    = data.lifeExpectancy || 82;
      const dob        = data.dob;
      const N          = allLayers.length;
      const isFuture   = youAge > (currentAge || 0);
      const MIN_R = 0.07, MAX_R = 0.90;

      useEffect(() => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const target = youAge, start = displayAge, t0 = performance.now(), dur = 130;
        const step = now => {
          const t = Math.min(1,(now-t0)/dur), e = t<0.5?2*t*t:-1+(4-2*t)*t;
          setDisplayAge(start+(target-start)*e);
          if (t<1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(rafRef.current);
      }, [youAge]);

      // Weight calculation — past events only (the lived self)
      const computeWeights = useCallback((age) => {
        const raw = {}; allLayers.forEach(l => { raw[l.id] = 0; });
        data.events.forEach(ev => {
          if (ev.isFutureEvent) return;  // future handled separately
          const startAge = getAgeAt(dob, ev.startDate);
          if (startAge === null || startAge > age) return;
          const rawEnd = ev.endDate === "ongoing" ? (currentAge || 0) : (ev.endDate ? getAgeAt(dob, ev.endDate) : startAge);
          const endAge = rawEnd !== null ? rawEnd : startAge;
          const eff    = Math.min(endAge, age);
          const dur    = Math.max(0.5, eff - startAge);
          const acc    = Math.log1p(dur) * 0.45;
          const mid    = (startAge + eff) / 2;
          const dist   = Math.abs(mid - age);
          const act    = dist < 5 ? (1 - dist/5) * 0.7 : 0;
          if (raw[ev.layer] !== undefined) raw[ev.layer] += acc + act;
        });
        const maxVal = Math.max(...Object.values(raw), 0.01);
        const out = {};
        allLayers.forEach(l => { out[l.id] = MIN_R + (raw[l.id]/maxVal)*(MAX_R-MIN_R); });
        return out;
      }, [data.events, allLayers, dob, currentAge]);

      // Future weight calculation — intentions/ambitions project outward, fears pull inward
      const computeFutureWeights = useCallback((age) => {
        const raw = {}; allLayers.forEach(l => { raw[l.id] = 0; });
        data.events.forEach(ev => {
          if (!ev.isFutureEvent) return;
          const startAge = getAgeAt(dob, ev.startDate);
          if (startAge === null) return;
          const rawEnd = ev.endDate ? getAgeAt(dob, ev.endDate) : startAge;
          const endAge = rawEnd !== null ? rawEnd : startAge;
          // Only show if the slider age is within the event's range
          if (age < startAge - 2 || age > endAge + 2) return;
          const NATURE_W = { intention: 1.0, ambition: 0.75, fear: 0.4, question: 0.3 };
          const w = NATURE_W[ev.futureNature] || 0.5;
          if (raw[ev.layer] !== undefined) raw[ev.layer] += w;
        });
        const maxVal = Math.max(...Object.values(raw), 0.01);
        const out = {};
        allLayers.forEach(l => { out[l.id] = raw[l.id] > 0 ? MIN_R + (raw[l.id]/maxVal)*(MAX_R*0.72-MIN_R) : MIN_R; });
        return out;
      }, [data.events, allLayers, dob]);

      const weights       = useMemo(() => computeWeights(displayAge),       [displayAge, computeWeights]);
      const futureWeights = useMemo(() => computeFutureWeights(displayAge),  [displayAge, computeFutureWeights]);
      const hasFutureData = useMemo(() => data.events.some(e => e.isFutureEvent), [data.events]);

      // Core weight — two zones from strand data.
      // Inner zone: partner + children currently at home. Intimate daily world.
      // Outer zone: parents, grandparents, siblings, extended family, community.
      const { innerWeight, outerWeight } = useMemo(() => {
        if (!dob) return { innerWeight: 0, outerWeight: 0 };
        let inner = 0, outer = 0;
        (data.strands||[]).forEach(strand => {
          if (strand.status === "deceased" || strand.status === "estranged") return;
          const sa = getAgeAt(dob, strand.enteredLifeAt);
          if (sa === null || sa > displayAge) return;
          const ea = strand.closedAt ? (getAgeAt(dob, strand.closedAt)||displayAge) : displayAge;
          if (ea < displayAge - 3) return;
          const recency = ea >= displayAge ? 1.0 : Math.max(0, 1 - (displayAge - ea) / 3);
          // Find the active phase at displayAge
          const activePhase = (strand.phases||[]).slice().reverse().find(p => {
            const ps = getAgeAt(dob, p.startDate);
            return ps !== null && ps <= displayAge;
          }) || (strand.phases||[])[0];
          const { zone, w } = strandNucleusWeight(strand, activePhase);
          if (zone === "inner") inner += w * recency;
          if (zone === "outer") outer += w * recency;
        });
        // Events still feed outer zone (community, relationships layer entries)
        data.events.forEach(ev => {
          if (ev.isFutureEvent || !['community'].includes(ev.layer)) return;
          const sa = getAgeAt(dob, ev.startDate);
          if (sa === null || sa > displayAge) return;
          const rawEnd = ev.endDate === "ongoing" ? displayAge : (ev.endDate ? getAgeAt(dob,ev.endDate) : null);
          const ea = rawEnd !== null ? rawEnd : sa + 0.5;
          if (ea < displayAge - 4) return;
          const recency = ea >= displayAge - 0.5 ? 1.0 : Math.max(0, 1 - (displayAge - ea) / 4);
          outer += 0.35 * recency;
        });
        return {
          innerWeight: Math.min(inner, 6),  // max 6 close intimate daily
          outerWeight: Math.min(outer, 8),  // max 8 ambient relational world
        };
      }, [data.strands, data.events, dob, displayAge]);

      const innerR = 4 + (innerWeight / 6) * 28;  // 4px → 32px
      const outerR = innerR + 4 + (outerWeight / 8) * 22; // always outside inner, up to +26px
      const coreR  = outerR; // legacy single value for cloud mode compat


      const SIZE = 500, cx = SIZE/2, cy = SIZE/2, maxR = SIZE*0.36;

      function smoothPath(points, tension=0.38) {
        const n=points.length; if(n<2) return "";
        const segs=[];
        for(let i=0;i<n;i++){
          const p0=points[(i-1+n)%n],p1=points[i],p2=points[(i+1)%n],p3=points[(i+2)%n];
          const cp1x=p1.x+(p2.x-p0.x)*tension,cp1y=p1.y+(p2.y-p0.y)*tension;
          const cp2x=p2.x-(p3.x-p1.x)*tension,cp2y=p2.y-(p3.y-p1.y)*tension;
          if(i===0) segs.push(`M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`);
          segs.push(`C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)} ${cp2x.toFixed(2)} ${cp2y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`);
        }
        segs.push("Z"); return segs.join(" ");
      }

      const radii    = allLayers.map(l => weights[l.id]);
      const pts      = radii.map((r,i) => {
        const a=(i/N)*2*Math.PI-Math.PI/2;
        return { x: cx+r*maxR*Math.cos(a), y: cy+r*maxR*Math.sin(a) };
      });
      const mainPath = smoothPath(pts);

      const sectorPaths = allLayers.map((layer,i) => {
        const r=weights[layer.id], angle=(i/N)*2*Math.PI-Math.PI/2;
        const aL=((i-0.5)/N)*2*Math.PI-Math.PI/2, aR=((i+0.5)/N)*2*Math.PI-Math.PI/2;
        const inner=0.04*maxR, outer=r*maxR*1.15;
        return {
          layer, angle,
          path:[
            `M ${(cx+inner*Math.cos(aL)).toFixed(1)} ${(cy+inner*Math.sin(aL)).toFixed(1)}`,
            `L ${(cx+outer*Math.cos(aL)).toFixed(1)} ${(cy+outer*Math.sin(aL)).toFixed(1)}`,
            `A ${outer} ${outer} 0 0 1 ${(cx+outer*Math.cos(aR)).toFixed(1)} ${(cy+outer*Math.sin(aR)).toFixed(1)}`,
            `L ${(cx+inner*Math.cos(aR)).toFixed(1)} ${(cy+inner*Math.sin(aR)).toFixed(1)}`, "Z"
          ].join(" "),
          labelX: cx+(Math.max(r*maxR, maxR*0.55)+24)*Math.cos(angle),
          labelY: cy+(Math.max(r*maxR, maxR*0.55)+24)*Math.sin(angle),
          isEmpty: r < 0.20,
        };
      });

      const hoveredLayer  = allLayers.find(l => l.id===hovered);
      const hoveredEvents = hovered
        ? data.events.filter(ev => {
            if (ev.layer !== hovered) return false;
            const sa = getAgeAt(dob, ev.startDate); if (sa===null||sa>displayAge+1) return false;
            const ea = ev.endDate==="ongoing"?(currentAge||0):(ev.endDate?getAgeAt(dob,ev.endDate):sa);
            return (ea===null?sa:ea) >= displayAge-6;
          })
        : [];

      const sliderPct = (youAge/lifeExp)*100;
      const nowPct    = ((currentAge||0)/lifeExp)*100;
      const ageRound  = Math.round(displayAge);
      const beyondLayer = allLayers.find(l=>l.id==="beyondme");
      const hasEvents = data.events.length > 0;

      const startRename = () => { setRenameVal(beyondLayer?.label||"Beyond Me"); setRenaming(true); };
      const confirmRename = () => { if(renameVal.trim()) onRenameBeyondMe(renameVal.trim()); setRenaming(false); };

      return (
        <div style={{
          flex:1, overflow:"auto", display:"flex", flexDirection:"column",
          alignItems:"center", background:lightMode?"#f5f0e8":"#1a1714", padding:"16px 12px 32px",
          userSelect:"none",
        }}>
          {/* About toggle */}
          <div style={{ width:"min(500px,calc(100vw - 24px))", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase", color:lightMode?"#6a5040":"#b4a882", fontWeight:600 }}>
              {data.name ? data.name : "All The Me That I Am"}
            </div>
            <button onClick={() => setShowAbout(a=>!a)} style={{
              background:"none", border:"none", color:lightMode?"#7a6050":"#8a7e6b", fontSize:11,
              cursor:"pointer", letterSpacing:"0.06em", fontFamily:"'DM Sans',system-ui,sans-serif",
              textDecoration: showAbout?"underline":"none",
            }}>about this view</button>
          </div>

          {/* About panel */}
          {showAbout && (
            <div style={{
              width:"min(500px,calc(100vw - 24px))",
              background:lightMode?"rgba(240,232,218,0.98)":"rgba(30,26,20,0.96)",
              border:lightMode?"1px solid rgba(100,80,60,0.2)":"1px solid rgba(180,168,145,0.12)",
              borderRadius:6, padding:"14px 18px", marginBottom:14,
              fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:13.5, lineHeight:1.75, color:lightMode?"#3a2e20":"#b4a882",
            }}>
              <p style={{ margin:"0 0 10px" }}>
                This view is a cross-section of a life. Drag the slider and watch the shape
                of who you were — and who you are becoming — shift and breathe.
              </p>
              <p style={{ margin:"0 0 10px" }}>
                Each layer extends outward in proportion to what has been lived and recorded there.
                Where the shape pulls inward, little has been entered yet — those concavities are
                not gaps but invitations.
              </p>
              <p style={{ margin:"0 0 10px" }}>
                The centre holds something different. It grows with the density of your immediate
                relational world — the people whose presence constitutes your daily life. Partners,
                children, close family, community. When that world is full, the core is full. When
                it thins, the core contracts. Divorce, bereavement, a child leaving home — all of
                it is in there, quietly visible.
              </p>
              <p style={{ margin:"0 0 10px" }}>
                The cloud shows the atmosphere of a self, held lightly.
                Click <em>Form</em> to see its more precise outline.
                Both are true. Neither is the whole picture.
              </p>
              <p style={{ margin:0, color:"#6a5e4e", fontStyle:"italic" }}>
                <strong style={{ fontStyle:"normal", color:"#8a7e6b" }}>{beyondLayer?.label}</strong> is
                the one layer named on your behalf — and the one most expected to be renamed.
                It belongs to whatever in your life sits outside the edges of your explainable self.
                Use the pencil beside it to make it yours.
              </p>
            </div>
          )}

          {/* No data state */}
          {!hasEvents && (
            <div style={{
              width:"min(500px,calc(100vw - 24px))",
              background:lightMode?"rgba(220,208,190,0.6)":"rgba(30,26,20,0.6)",
              border:lightMode?"1px solid rgba(100,80,60,0.15)":"1px solid rgba(180,168,145,0.1)",
              borderRadius:6, padding:"20px 24px", marginBottom:14, textAlign:"center",
              fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:14, lineHeight:1.75, color:"#6a5e4e", fontStyle:"italic",
            }}>
              Your shape is waiting to be drawn.<br/>
              <span style={{ fontSize:12 }}>Add events in the Timeline view and return here to see yourself take form.</span>
            </div>
          )}

          {/* Age label */}
          <div style={{
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize: isFuture?22:28, fontWeight: isFuture?300:400,
            fontStyle: isFuture?"italic":"normal",
            color: isFuture?(lightMode?"#8a7060":"#8a7e6b"):(lightMode?"#1e1610":"#e8dcc8"),
            letterSpacing:"0.04em", marginBottom:2,
            transition:"all 0.5s ease", minHeight:38,
          }}>
            {isFuture ? `You, ahead — age ${ageRound}` : `You at ${ageRound}`}
          </div>
          <div style={{
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize:15, fontStyle:"italic",
            color:lightMode?"#5a3e28":"#a09080", marginBottom:8,
          }}>
            {isFuture ? "drawn in intention, not yet in fact" : "the accumulation of everything lived to here"}
          </div>

          {/* SVG Form */}
          <div style={{ position:"relative", width:SIZE, maxWidth:"calc(100vw - 24px)" }}>
            <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{overflow:"visible"}}
              style={{ display:"block", overflow:"visible" }}>
              <defs>
                {allLayers.map(l => (
                  <radialGradient key={l.id} id={`yg-${l.id}`} cx="50%" cy="50%" r="50%">
                    <stop offset="0%"   stopColor={l.color} stopOpacity="0.05"/>
                    <stop offset="60%"  stopColor={l.color} stopOpacity="0.18"/>
                    <stop offset="100%" stopColor={l.color} stopOpacity="0.38"/>
                  </radialGradient>
                ))}
                <radialGradient id="yg-core" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stopColor="#e8c468" stopOpacity="0.07"/>
                  <stop offset="100%" stopColor="#e8c468" stopOpacity="0.00"/>
                </radialGradient>
                <filter id="y-blur-sm"><feGaussianBlur stdDeviation="2.5"/></filter>
                <filter id="y-cloud-lg"><feGaussianBlur stdDeviation="28"/></filter>
                <filter id="y-cloud-sm"><feGaussianBlur stdDeviation="13"/></filter>
              </defs>

              {/* CLOUD MODE */}
              {cloudMode && allLayers.map((layer,i) => {
                const r=weights[layer.id], angle=(i/N)*2*Math.PI-Math.PI/2;
                const dist=r*maxR*0.68, bx=cx+dist*Math.cos(angle), by=cy+dist*Math.sin(angle);
                const rad=r*maxR*0.80, isB=layer.id==="beyondme";
                const op = r<0.18 ? 0.06 : (isFuture?0.11:0.26);
                return (
                  <g key={`yc-${layer.id}`}>
                    <circle cx={bx} cy={by} r={rad*(isB?1.8:1.4)}
                      fill={layer.color} opacity={op*(isB?0.55:0.35)}
                      filter="url(#y-cloud-lg)" style={{transition:"all 0.55s ease"}}/>
                    <circle cx={bx} cy={by} r={rad*(isB?0.9:0.7)}
                      fill={layer.color} opacity={op*(isB?0.85:0.65)}
                      filter="url(#y-cloud-sm)" style={{transition:"all 0.55s ease"}}/>
                  </g>
                );
              })}

              {/* CLOUD MODE — future intention ghost blooms (shown always when future data exists) */}
              {cloudMode && hasFutureData && allLayers.map((layer,i) => {
                const rf=futureWeights[layer.id];
                if (rf <= 0.10) return null;
                const angle=(i/N)*2*Math.PI-Math.PI/2;
                const dist=rf*maxR*0.72, bx=cx+dist*Math.cos(angle), by=cy+dist*Math.sin(angle);
                const rad=rf*maxR*0.65;
                return (
                  <g key={`ycf-${layer.id}`}>
                    <circle cx={bx} cy={by} r={rad*1.3}
                      fill={layer.color} opacity={0.07}
                      filter="url(#y-cloud-lg)" style={{transition:"all 0.55s ease"}}/>
                    <circle cx={bx} cy={by} r={rad*0.6}
                      fill={layer.color} opacity={0.12}
                      filter="url(#y-cloud-sm)" style={{transition:"all 0.55s ease"}}/>
                  </g>
                );
              })}

              {/* FORM MODE */}
              {!cloudMode && <>
                {[0.25,0.5,0.75,1.0].map(f => (
                  <circle key={f} cx={cx} cy={cy} r={f*maxR} fill="none"
                    stroke="rgba(180,168,145,0.05)" strokeWidth={1}
                    strokeDasharray={f===1.0?"3 6":"none"}/>
                ))}
                {allLayers.map((_,i) => {
                  const a=(i/N)*2*Math.PI-Math.PI/2;
                  return <line key={i} x1={cx} y1={cy}
                    x2={cx+maxR*1.05*Math.cos(a)} y2={cy+maxR*1.05*Math.sin(a)}
                    stroke="rgba(180,168,145,0.07)" strokeWidth={0.8}/>;
                })}
                <path d={mainPath} fill="rgba(232,196,104,0.04)" filter="url(#y-blur-sm)"/>
                {!isFuture && <path d={mainPath} fill="url(#yg-core)" stroke="rgba(232,220,200,0.12)" strokeWidth={1}/>}
                {sectorPaths.map(({layer,path,isEmpty}) => (
                  <path key={layer.id} d={path} fill={`url(#yg-${layer.id})`}
                    opacity={isEmpty?0.18:(isFuture?0.35:0.85)} style={{transition:"opacity 0.4s ease"}}/>
                ))}
                <path d={mainPath} fill="none"
                  stroke={isFuture?"rgba(180,168,145,0.25)":"rgba(232,220,200,0.22)"}
                  strokeWidth={isFuture?1:1.5} strokeDasharray={isFuture?"4 5":"none"}
                  style={{transition:"all 0.5s ease"}}/>
                {/* Form mode — future intention ghost outline */}
                {hasFutureData && (() => {
                  const fPts = allLayers.map((l,i) => {
                    const r=futureWeights[l.id], a=(i/N)*2*Math.PI-Math.PI/2;
                    return {x:cx+r*maxR*Math.cos(a), y:cy+r*maxR*Math.sin(a)};
                  });
                  return <path d={smoothPath(fPts)} fill="rgba(197,168,130,0.04)"
                    stroke="rgba(197,168,130,0.30)" strokeWidth={1}
                    strokeDasharray="3 5" style={{transition:"all 0.5s ease"}}/>;
                })()}
              </>}

              {/* Interaction sectors */}
              {sectorPaths.map(({layer,path}) => (
                <path key={`yh-${layer.id}`} d={path} fill="transparent" stroke="none"
                  style={{cursor:"pointer"}}
                  onMouseEnter={() => setHovered(layer.id)}
                  onMouseLeave={() => setHovered(null)}/>
              ))}

              {/* Hover highlight — form only */}
              {!cloudMode && hovered && (() => {
                const s=sectorPaths.find(s=>s.layer.id===hovered);
                const l=allLayers.find(l=>l.id===hovered);
                if(!s||!l) return null;
                return <path d={s.path} fill={`${l.color}18`}
                  stroke={l.color} strokeWidth={1.5} strokeOpacity={0.7}
                  style={{pointerEvents:"none",transition:"all 0.2s"}}/>;
              })()}

              {/* Absence rings */}
              {sectorPaths.map(({layer,angle,isEmpty}) => !isEmpty?null:(
                <circle key={`ya-${layer.id}`}
                  cx={cx+0.26*maxR*Math.cos(angle)} cy={cy+0.26*maxR*Math.sin(angle)}
                  r={3} fill="none" stroke="rgba(138,126,107,0.25)"
                  strokeWidth={1} strokeDasharray="2 2"/>
              ))}

              {/* Living core — two zones: intimate inner world and ambient outer world */}
              {cloudMode ? (
                <g style={{transition:"all 0.7s ease"}}>
                  {/* Outer zone — ambient relational world: parents, siblings, extended family */}
                  {outerR > 8 && <circle cx={cx} cy={cy} r={outerR * 2.4}
                    fill="rgba(197,168,130,0.05)" filter="url(#y-cloud-lg)"/>}
                  {outerR > 6 && <circle cx={cx} cy={cy} r={outerR * 1.4}
                    fill="rgba(197,168,130,0.10)" filter="url(#y-cloud-sm)"/>}
                  {/* Inner zone — intimate daily world: partner, children at home */}
                  {innerR > 5 && <circle cx={cx} cy={cy} r={innerR * 1.8}
                    fill="rgba(232,210,180,0.10)" filter="url(#y-cloud-sm)"/>}
                  <circle cx={cx} cy={cy} r={innerR}
                    fill="rgba(232,196,104,0.22)" style={{transition:"r 0.7s ease"}}/>
                  <circle cx={cx} cy={cy} r={Math.min(innerR * 0.5, 6)}
                    fill="rgba(232,196,104,0.55)"/>
                  <circle cx={cx} cy={cy} r={2.5} fill="rgba(255,248,232,0.9)"/>
                </g>
              ) : (
                <g style={{transition:"all 0.6s ease"}}>
                  {/* Outer ring — ambient relational world */}
                  {outerR > innerR + 3 && <circle cx={cx} cy={cy} r={outerR}
                    fill="rgba(197,168,130,0.04)"
                    stroke="rgba(197,168,130,0.15)" strokeWidth={1}/>}
                  {/* Inner ring — intimate daily world */}
                  {innerR > 5 && <circle cx={cx} cy={cy} r={innerR}
                    fill="rgba(232,196,104,0.07)"
                    stroke="rgba(232,220,200,0.25)" strokeWidth={0.8}/>}
                  <circle cx={cx} cy={cy} r={Math.min(innerR * 0.45, 7)}
                    fill="rgba(232,196,104,0.22)"
                    stroke="rgba(232,196,104,0.4)" strokeWidth={0.8}/>
                  <circle cx={cx} cy={cy} r={2.5} fill="rgba(232,196,104,0.75)"/>
                  <circle cx={cx} cy={cy} r={1.2} fill="rgba(255,248,232,0.95)"/>
                </g>
              )}

              {/* Labels */}
              {sectorPaths.map(({layer,labelX,labelY,angle,isEmpty}) => {
                const isH=hovered===layer.id, cosA=Math.cos(angle), isB=layer.id==="beyondme";
                const anchor=cosA>0.25?"start":cosA<-0.25?"end":"middle";
                const col = isH ? (allLayers.find(l=>l.id===layer.id)?.color)
                  : isEmpty
                    ? (lightMode?"rgba(120,100,80,0.55)":"rgba(130,115,95,0.7)")
                    : isB
                      ? (lightMode?"rgba(80,50,20,0.9)":"rgba(210,185,145,0.95)")
                      : (lightMode?"rgba(30,22,12,0.88)":"rgba(210,195,170,0.92)");
                const fs = cloudMode ? 11 : 12;
                return (
                  <text key={`yl-${layer.id}`} x={labelX} y={labelY}
                    textAnchor={anchor} dominantBaseline="middle"
                    fill={col} fontSize={fs}
                    fontFamily="'DM Sans',system-ui,sans-serif"
                    fontWeight={isH?600:(cloudMode?500:600)} fontStyle={isB?"italic":"normal"}
                    style={{transition:"all 0.25s ease",pointerEvents:"none"}}>
                    {layer.label}
                  </text>
                );
              })}
            </svg>

            {/* Hover tooltip */}
            {hovered && (
              <div style={{
                position:"absolute", bottom:4, left:"50%", transform:"translateX(-50%)",
                background:lightMode?"rgba(245,240,232,0.98)":"rgba(20,18,14,0.97)",
                border:`1px solid ${hoveredLayer?.color}${lightMode?"66":"30"}`,
                borderRadius:5, padding:"6px 14px", fontSize:13,
                color:lightMode?"#2a1e10":"#c8bca8",
                pointerEvents:"none", whiteSpace:"nowrap",
                maxWidth:"90vw", overflow:"hidden", textOverflow:"ellipsis",
              }}>
                <span style={{color:hoveredLayer?.color,fontWeight:600}}>{hoveredLayer?.label}</span>
                {hoveredLayer?.id==="beyondme" && hoveredEvents.length===0
                  ? <span style={{color:lightMode?"#6a5040":"#6a5e4e",fontStyle:"italic",fontSize:12}}> — {hoveredLayer.desc}</span>
                  : hoveredEvents.length>0
                    ? <span style={{color:lightMode?"#3a2810":"#a09080"}}>{" — "+hoveredEvents.map(e=>e.title).join(", ")}</span>
                    : <span style={{color:lightMode?"#8a6a50":"#5a4e3e",fontStyle:"italic"}}> — nothing recorded here yet</span>
                }
              </div>
            )}
          </div>

          {/* Slider */}
          <div style={{ width:"min(500px,calc(100vw - 48px))", marginTop:2 }}>
            <div style={{position:"relative",height:24,display:"flex",alignItems:"center"}}>
              <div style={{
                position:"absolute",left:0,right:0,height:2,borderRadius:2,
                background:`linear-gradient(to right,
                  rgba(232,196,104,0.55) 0%,rgba(232,196,104,0.55) ${sliderPct}%,
                  ${lightMode?"rgba(0,0,0,0.12)":"rgba(180,168,145,0.18)"} ${sliderPct}%,${lightMode?"rgba(0,0,0,0.12)":"rgba(180,168,145,0.18)"} ${nowPct}%,
                  ${lightMode?"rgba(0,0,0,0.06)":"rgba(90,78,62,0.12)"} ${nowPct}%,${lightMode?"rgba(0,0,0,0.06)":"rgba(90,78,62,0.12)"} 100%)`,
              }}/>
              <div style={{
                position:"absolute",left:`${nowPct}%`,transform:"translateX(-50%)",
                width:1,height:10,background:lightMode?"rgba(0,0,0,0.25)":"rgba(138,126,107,0.4)",borderRadius:1,
              }}/>
              <input type="range" min={0} max={lifeExp} step={0.3} value={youAge}
                onChange={e=>setYouAge(parseFloat(e.target.value))}
                style={{position:"absolute",left:0,right:0,width:"100%",
                  appearance:"none",background:"transparent",height:24,cursor:"pointer",outline:"none",margin:0}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginTop:3,fontSize:12,color:lightMode?"rgba(60,40,20,0.75)":"rgba(160,140,110,0.85)",letterSpacing:"0.06em"}}>
              <span>BIRTH</span>
              <span style={{color:Math.abs(youAge-(currentAge||0))<2?(lightMode?"rgba(160,100,0,0.85)":"rgba(232,196,104,0.8)"):(lightMode?"rgba(60,40,20,0.6)":"rgba(140,120,90,0.65)")}}>
                NOW · {currentAge}
              </span>
              <span>{lifeExp}</span>
            </div>

            {/* Controls row */}
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,marginTop:16}}>
              {/* Cloud / Form toggle */}
              <button onClick={() => setCloudMode(c=>!c)} style={{
                background:"transparent",
                border:`1px solid ${cloudMode?(lightMode?"rgba(100,80,60,0.3)":"rgba(180,168,145,0.2)"):(lightMode?"rgba(160,100,0,0.4)":"rgba(232,196,104,0.35)")}`,
                borderRadius:20, padding:"5px 20px",
                color:cloudMode?(lightMode?"#5a3e28":"#9a8e7e"):(lightMode?"#7a5000":"#c8a84a"),
                fontSize:12,letterSpacing:"0.12em",textTransform:"uppercase",
                cursor:"pointer",fontFamily:"'DM Sans',system-ui,sans-serif",
                transition:"all 0.35s ease", display:"flex",alignItems:"center",gap:8,
              }}>
                <span style={{
                  display:"inline-block",width:8,height:8,borderRadius:"50%",
                  background:cloudMode
                    ?"radial-gradient(circle,rgba(180,168,145,0.6),rgba(90,78,62,0.3))"
                    :"radial-gradient(circle,rgba(232,196,104,0.95),rgba(200,160,60,0.6))",
                  boxShadow:cloudMode?"none":"0 0 7px rgba(232,196,104,0.55)",
                  transition:"all 0.35s ease",
                }}/>
                {cloudMode ? "Cloud" : "Form"}
              </button>

              {/* Rename Beyond Me */}
              {!renaming ? (
                <button onClick={startRename} title="Rename this layer to reflect your worldview" style={{
                  background:"transparent",border:`1px solid ${lightMode?"rgba(120,80,30,0.3)":"rgba(197,168,130,0.18)"}`,
                  borderRadius:20,padding:"5px 14px",color:lightMode?"rgba(100,65,20,0.7)":"rgba(197,168,130,0.6)",
                  fontSize:12,letterSpacing:"0.06em",cursor:"pointer",
                  fontFamily:"'DM Sans',system-ui,sans-serif",
                  transition:"all 0.25s ease",display:"flex",alignItems:"center",gap:5,
                }}>
                  <span style={{fontSize:10}}>✎</span>
                  rename "{beyondLayer?.label}"
                </button>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input autoFocus value={renameVal}
                    onChange={e=>setRenameVal(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")confirmRename();if(e.key==="Escape")setRenaming(false);}}
                    style={{
                      background:"rgba(30,26,20,0.9)",border:"1px solid rgba(197,168,130,0.4)",
                      borderRadius:4,padding:"4px 10px",color:"#c8bca8",
                      fontSize:12,fontFamily:"'DM Sans',system-ui,sans-serif",outline:"none",width:130,
                    }}/>
                  <button onClick={confirmRename} style={{
                    background:"rgba(197,168,130,0.15)",border:"1px solid rgba(197,168,130,0.3)",
                    borderRadius:4,padding:"4px 10px",color:"#c8a880",
                    fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',system-ui,sans-serif",
                  }}>done</button>
                  <button onClick={()=>setRenaming(false)} style={{
                    background:"transparent",border:"none",color:"#5a4e3e",
                    fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',system-ui,sans-serif",
                  }}>cancel</button>
                </div>
              )}
            </div>

            {/* Absence invitation */}
            {sectorPaths.some(s=>s.isEmpty) && (
              <div style={{marginTop:12,textAlign:"center"}}>
                <p style={{
                  fontFamily:"'Cormorant Garamond',Georgia,serif",
                  fontSize:15,fontStyle:"italic",
                  color:lightMode?"#5a3e28":"#a09080",
                  lineHeight:1.6,margin:0,
                }}>
                  Faded layers hold little recorded here — each is an invitation to look more closely.
                </p>
              </div>
            )}
          </div>

          <style>{`
            input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e8c468;border:2px solid ${lightMode?"#e8dcc8":"#1a1714"};box-shadow:0 0 6px rgba(232,196,104,0.4);cursor:pointer;transition:transform 0.15s;}
            input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25);}
            input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#e8c468;border:2px solid ${lightMode?"#e8dcc8":"#1a1714"};box-shadow:0 0 6px rgba(232,196,104,0.4);cursor:pointer;}
          `}</style>
        </div>
      );
    }

    // ─── PRIVACY REVIEW ───
    function PrivacyReview({ data, allLayers, onTogglePrivacy, onToggleGroup, onExportSharedSelf }) {
      const {S, lightMode} = React.useContext(AppCtx);
      const [filter, setFilter] = useState("all"); // all | shared | private
      const [groupBy, setGroupBy] = useState("decade"); // decade | layer

      const events = data.events || [];
      const totalCount = events.length;
      const privateCount = events.filter(e => e.isPrivate).length;
      const sharedCount = totalCount - privateCount;

      // Group by decade
      const byDecade = {};
      events.forEach(ev => {
        const decade = Math.floor((ev.year || 0) / 10) * 10;
        const key = `${decade}s`;
        if (!byDecade[key]) byDecade[key] = { label: `${decade}s`, decade, events: [] };
        byDecade[key].events.push(ev);
      });
      const decadeGroups = Object.values(byDecade).sort((a,b) => a.decade - b.decade);

      // Group by layer
      const byLayer = {};
      events.forEach(ev => {
        const layer = allLayers.find(l => l.id === ev.layer);
        const key = ev.layer;
        if (!byLayer[key]) byLayer[key] = { label: layer?.label || ev.layer, color: layer?.color || "#888", events: [] };
        byLayer[key].events.push(ev);
      });
      const layerGroups = Object.values(byLayer).sort((a,b) => b.events.length - a.events.length);

      const groups = groupBy === "decade" ? decadeGroups : layerGroups;

      const applyFilter = (evs) => {
        if (filter === "private") return evs.filter(e => e.isPrivate);
        if (filter === "shared") return evs.filter(e => !e.isPrivate);
        return evs;
      };

      const col = {
        lock: lightMode ? "#c0392b" : "#e07070",
        lockBg: lightMode ? "rgba(192,57,43,0.08)" : "rgba(220,100,100,0.12)",
        lockBorder: lightMode ? "rgba(192,57,43,0.25)" : "rgba(220,100,100,0.25)",
        open: lightMode ? "#2980b9" : "#7EB6FF",
        openBg: lightMode ? "rgba(41,128,185,0.07)" : "rgba(126,182,255,0.08)",
        openBorder: lightMode ? "rgba(41,128,185,0.2)" : "rgba(126,182,255,0.18)",
        text: lightMode ? "#111827" : "#e8dcc8",
        textDim: lightMode ? "#6b7280" : "#a09080",
        rowHover: lightMode ? "rgba(0,0,0,0.03)" : "rgba(255,255,255,0.03)",
        groupBg: lightMode ? "rgba(0,0,0,0.03)" : "rgba(180,168,145,0.06)",
        groupBorder: lightMode ? "rgba(0,0,0,0.08)" : "rgba(180,168,145,0.12)",
        divider: lightMode ? "rgba(0,0,0,0.06)" : "rgba(180,168,145,0.1)",
      };

      const filterBtn = (val, label) => (
        <button onClick={() => setFilter(val)} style={{
          padding:"5px 14px", borderRadius:20, fontSize:13, cursor:"pointer",
          border: filter===val ? `1px solid ${lightMode?"rgba(0,0,0,0.25)":"rgba(197,168,130,0.45)"}` : `1px solid ${lightMode?"rgba(0,0,0,0.12)":"rgba(180,168,145,0.2)"}`,
          background: filter===val ? (lightMode?"rgba(0,0,0,0.07)":"rgba(197,168,130,0.1)") : "transparent",
          color: filter===val ? (lightMode?"#5a3010":"#c8a870") : col.textDim,
          fontFamily:"'DM Sans',system-ui,sans-serif", transition:"all 0.2s ease",
        }}>{label}</button>
      );

      return (
        <div style={{
          display:"flex", flexDirection:"column", height:"100%",
          fontFamily:"'DM Sans',system-ui,sans-serif",
          background: lightMode?"#f5f0e8":"#1a1714",
          overflowY:"auto",
        }}>
          {/* Summary banner */}
          <div style={{
            padding:"28px 32px 20px", borderBottom:`1px solid ${col.divider}`, flexShrink:0,
          }}>
            <div style={{
              fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:22, fontWeight:400, color:col.text, marginBottom:6,
            }}>
              What you bring to the crossroads
            </div>
            <div style={{fontSize:14, color:col.textDim, marginBottom:20, fontStyle:"italic",
              fontFamily:"'Cormorant Garamond',Georgia,serif", lineHeight:1.6}}>
              Review each moment. Decide what is yours alone, and what you choose to share.
            </div>

            {/* The three numbers */}
            <div style={{display:"flex", gap:24, flexWrap:"wrap"}}>
              <div style={{textAlign:"center", padding:"14px 24px", borderRadius:8,
                background: col.openBg, border:`1px solid ${col.openBorder}`}}>
                <div style={{fontSize:36, fontWeight:300, color:col.open, lineHeight:1}}>{sharedCount}</div>
                <div style={{fontSize:12, color:col.textDim, marginTop:4, textTransform:"uppercase", letterSpacing:"0.08em"}}>Shared</div>
              </div>
              <div style={{textAlign:"center", padding:"14px 24px", borderRadius:8,
                background: col.lockBg, border:`1px solid ${col.lockBorder}`}}>
                <div style={{fontSize:36, fontWeight:300, color:col.lock, lineHeight:1}}>{privateCount}</div>
                <div style={{fontSize:12, color:col.textDim, marginTop:4, textTransform:"uppercase", letterSpacing:"0.08em"}}>Private</div>
              </div>
              <div style={{textAlign:"center", padding:"14px 24px", borderRadius:8,
                background: lightMode?"rgba(100,80,60,0.05)":"rgba(180,168,145,0.05)",
                border:`1px solid ${col.divider}`}}>
                <div style={{fontSize:36, fontWeight:300, color:col.textDim, lineHeight:1}}>{totalCount}</div>
                <div style={{fontSize:12, color:col.textDim, marginTop:4, textTransform:"uppercase", letterSpacing:"0.08em"}}>Total</div>
              </div>
              {totalCount === 0 && (
                <div style={{fontSize:14, color:col.textDim, fontStyle:"italic",
                  fontFamily:"'Cormorant Garamond',Georgia,serif", alignSelf:"center"}}>
                  No events recorded yet. Add events in the Timeline view first.
                </div>
              )}
            </div>
          </div>

          {totalCount > 0 && (<>
            {/* Filter + group controls */}
            <div style={{padding:"14px 32px", display:"flex", alignItems:"center",
              gap:12, flexWrap:"wrap", borderBottom:`1px solid ${col.divider}`, flexShrink:0}}>
              <div style={{display:"flex", gap:6}}>
                {filterBtn("all", `All (${totalCount})`)}
                {filterBtn("shared", `Shared (${sharedCount})`)}
                {filterBtn("private", `Private (${privateCount})`)}
              </div>
              <div style={{marginLeft:"auto", display:"flex", gap:6, alignItems:"center"}}>
                <span style={{fontSize:12, color:col.textDim}}>Group by</span>
                {["decade","layer"].map(g => (
                  <button key={g} onClick={() => setGroupBy(g)} style={{
                    padding:"4px 12px", borderRadius:20, fontSize:12, cursor:"pointer",
                    border: groupBy===g ? `1px solid ${lightMode?"rgba(100,70,30,0.4)":"rgba(197,168,130,0.35)"}` : `1px solid ${col.divider}`,
                    background: groupBy===g ? (lightMode?"rgba(100,70,30,0.08)":"rgba(197,168,130,0.08)") : "transparent",
                    color: groupBy===g ? (lightMode?"#5a3010":"#c8a870") : col.textDim,
                    fontFamily:"'DM Sans',system-ui,sans-serif",
                  }}>{g.charAt(0).toUpperCase()+g.slice(1)}</button>
                ))}
              </div>
            </div>

            {/* Event groups */}
            <div style={{flex:1, overflowY:"auto", padding:"16px 32px 40px"}}>
              {groups.map(group => {
                const visibleEvents = applyFilter(group.events).sort((a,b) => (a.year||0)-(b.year||0));
                if (visibleEvents.length === 0) return null;
                const groupPrivate = group.events.filter(e => e.isPrivate).length;
                const groupShared = group.events.length - groupPrivate;
                const allPrivate = group.events.every(e => e.isPrivate);
                const allShared = group.events.every(e => !e.isPrivate);
                const groupColor = group.color || (lightMode?"#5a3010":"#c8a870");

                return (

    // ─── SETUP SCREEN ───
    function SetupScreen({ data, onSave, onClose }) {
      const {S, lightMode} = React.useContext(AppCtx);
      const isFirstTime = !data.dob;  // no close button for first-time users
      const [name, setName] = useState(data.name || "");
      const [le, setLe] = useState(data.lifeExpectancy || 82);

      // Parse existing dob into parts for dropdowns
      const parseDob = (d) => {
        if (!d) return { y:"", m:"", day:"" };
        const parts = String(d).split("-");
        return { y: parts[0]||"", m: parts[1]||"", day: parts[2]||"" };
      };
      const init = parseDob(data.dob || "");
      const [dobY,   setDobY]   = useState(init.y);
      const [dobM,   setDobM]   = useState(init.m);
      const [dobDay, setDobDay] = useState(init.day);

      const dob = dobY && dobM && dobDay
        ? `${dobY}-${dobM.padStart(2,"0")}-${dobDay.padStart(2,"0")}`
        : dobY && dobM
          ? `${dobY}-${dobM.padStart(2,"0")}-01`
          : "";

      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
      const currentYear = new Date().getFullYear();
      const years = Array.from({length: currentYear - 1900 + 1}, (_,i) => currentYear - i);
      const daysInMonth = dobY && dobM ? new Date(parseInt(dobY), parseInt(dobM), 0).getDate() : 31;
      const days = Array.from({length: daysInMonth}, (_,i) => i+1);

      const selStyle = {...S.input, marginBottom:0, cursor:"pointer"};

      return (
        <div style={S.setupScreen} onClick={!isFirstTime ? onClose : undefined}>
          <div style={S.setupCard} onClick={e => e.stopPropagation()}>
            <div style={{display:"flex", flexDirection:"column", alignItems:"center", marginBottom:20}}>
              {!isFirstTime && (
                <button onClick={onClose} style={{
                  position:"absolute", alignSelf:"flex-end", marginTop:-8,
                  background:"none", border:"none", cursor:"pointer",
                  color:lightMode?"rgba(0,0,0,0.35)":"rgba(180,168,145,0.5)",
                  fontSize:22, lineHeight:1, padding:"4px 8px",
                  fontFamily:"'DM Sans',system-ui,sans-serif",
                }} title="Close">×</button>
              )}
              <img src={momoIcon} alt="MoMo Creative"
                style={{width:52, height:52, borderRadius:11, marginBottom:10, opacity:0.9}} />
              <div style={{fontSize:10, color:lightMode?"rgba(0,0,0,0.35)":"rgba(180,168,145,0.45)", textTransform:"uppercase",
                letterSpacing:"0.14em", fontFamily:"'DM Sans',system-ui,sans-serif", marginBottom:10}}>
                MoMo Creative
              </div>
              <h1 style={S.setupTitle}>All The Me That I Am</h1>
            </div>
            <p style={S.setupDesc}>A cartography of self. Map the terrain of your life — its layers, its seasons, its turning points — and see the whole of it laid out before you.</p>
            <div style={S.setupField}>
              <label style={S.label}>Your name (optional)</label>
              <input style={S.input} value={name} onChange={e => setName(e.target.value)} placeholder="How you'd like to be known" />
            </div>
            <div style={S.setupField}>
              <label style={S.label}>Date of birth</label>
              <div style={{display:"flex", gap:6}}>
                <select style={{...selStyle, flex:"0 0 90px"}} value={dobDay} onChange={e => setDobDay(e.target.value)}>
                  <option value="">Day</option>
                  {days.map(d => <option key={d} value={String(d).padStart(2,"0")}>{d}</option>)}
                </select>
                <select style={{...selStyle, flex:1}} value={dobM} onChange={e => setDobM(e.target.value)}>
                  <option value="">Month</option>
                  {months.map((m,i) => <option key={i+1} value={String(i+1).padStart(2,"0")}>{m}</option>)}
                </select>
                <select style={{...selStyle, flex:"0 0 90px"}} value={dobY} onChange={e => setDobY(e.target.value)}>
                  <option value="">Year</option>
                  {years.map(y => <option key={y} value={String(y)}>{y}</option>)}
                </select>
              </div>
              <div style={S.hint}>Pick year first — the list starts from today and goes back.</div>
            </div>
            <div style={S.setupField}>
              <label style={S.label}>Life expectancy (for context)</label>
              <input style={S.input} type="number" value={le} onChange={e => setLe(parseInt(e.target.value)||82)} min={40} max={120} />
              <div style={S.hint}>Australian average is ~83. A contextual horizon, not a prediction.</div>
            </div>
            <button style={{...S.addBtn,width:"100%",marginTop:16}} onClick={() => onSave({...data,name,dob,lifeExpectancy:le})} disabled={!dobY||!dobM}>Begin mapping</button>
          </div>
        </div>
      );
    }

    function WorldEventLibraryModal({ existingEvents, dob, onSync, onCancel }) {
      const {S, lightMode} = React.useContext(AppCtx);
      const existingKeys = new Set((existingEvents||[]).map(e => `${e.year}|${e.title}`));

      // Pre-tick everything already in the world
      const [selected, setSelected] = useState(() => new Set(existingKeys));
      const [filter, setFilter] = useState("");

      const allAvailableKeys = WORLD_EVENT_LIBRARY
        .flatMap(d => d.events)
        .map(e => `${e.year}|${e.title}`);

      const allSelected = allAvailableKeys.length > 0 && allAvailableKeys.every(k => selected.has(k));

      const toggleAll = () => {
        if (allSelected) {
          setSelected(new Set());
        } else {
          setSelected(new Set(allAvailableKeys));
        }
      };

      const toggle = (key) => {
        setSelected(s => {
          const n = new Set(s);
          n.has(key) ? n.delete(key) : n.add(key);
          return n;
        });
      };

      const toggleDecade = (events) => {
        const keys = events.map(e => `${e.year}|${e.title}`);
        const allOn = keys.every(k => selected.has(k));
        setSelected(s => {
          const n = new Set(s);
          keys.forEach(k => allOn ? n.delete(k) : n.add(k));
          return n;
        });
      };

      const filtered = filter.trim()
        ? WORLD_EVENT_LIBRARY.map(d => ({
            ...d,
            events: d.events.filter(e =>
              e.title.toLowerCase().includes(filter.toLowerCase()) ||
              String(e.year).includes(filter)
            )
          })).filter(d => d.events.length > 0)
        : WORLD_EVENT_LIBRARY;

      const handleSync = () => {
        // Build the new world events list:
        // - Keep existing events that are still selected
        // - Add library events that are newly selected
        // - Drop existing events that are no longer selected
        const keptExisting = (existingEvents||[]).filter(e => {
          const key = `${e.year}|${e.title}`;
          // Keep if selected, OR if it's a custom event not in the library at all
          const inLibrary = WORLD_EVENT_LIBRARY.some(d => d.events.some(le => `${le.year}|${le.title}` === key));
          return selected.has(key) || !inLibrary;
        });
        const newlyAdded = [];
        WORLD_EVENT_LIBRARY.forEach(d => d.events.forEach(e => {
          const key = `${e.year}|${e.title}`;
          if (selected.has(key) && !existingKeys.has(key))
            newlyAdded.push({ ...e, notes:"", id: generateId() });
        }));
        onSync([...keptExisting, ...newlyAdded]);
      };

      const blue = lightMode ? "rgba(0,100,200,0.85)" : "rgba(126,182,255,0.9)";
      const blueDim = lightMode ? "rgba(0,100,200,0.5)" : "rgba(126,182,255,0.55)";
      const blueFaint = lightMode ? "rgba(0,100,200,0.15)" : "rgba(126,182,255,0.08)";
      const blueBorder = lightMode ? "rgba(0,100,200,0.3)" : "rgba(126,182,255,0.25)";

      return (
        <div className="modal-overlay" style={S.modalOverlay} onClick={onCancel}>
          <div style={{...S.modal, maxWidth:660, maxHeight:"88vh", display:"flex", flexDirection:"column"}}
            onClick={e => e.stopPropagation()}>
            <h3 style={{...S.modalTitle, marginBottom:4}}>World event library</h3>
            <p style={{fontSize:14, color:lightMode?"#5a3e28":"#b0a48e", marginBottom:10,
              fontFamily:"'Cormorant Garamond',Georgia,serif", lineHeight:1.6}}>
              An Australian perspective — tick the events you want as backdrop to your life.
              Already-added items show with a ✓ but can be re-selected or left alone.
            </p>

            {/* Filter + select all row */}
            <div style={{display:"flex", gap:8, marginBottom:10, flexShrink:0}}>
              <input style={{...S.input, flex:1, marginBottom:0}}
                placeholder="Filter events…" value={filter} onChange={e=>setFilter(e.target.value)} />
              <button onClick={toggleAll} style={{
                padding:"6px 14px", borderRadius:4, cursor:"pointer", fontSize:13, border:"none",
                fontFamily:"'DM Sans',system-ui,sans-serif", flexShrink:0,
                background: allSelected ? (lightMode?"rgba(0,100,200,0.12)":"rgba(126,182,255,0.2)") : blueFaint,
                color: allSelected ? blue : blueDim,
                outline: allSelected ? `1px solid ${lightMode?"rgba(0,100,200,0.4)":"rgba(126,182,255,0.35)"}` : `1px solid ${blueBorder}`,
              }}>{allSelected ? "✓ All selected" : "Select all"}</button>
              {selected.size > 0 && <button onClick={() => setSelected(new Set())} style={{
                padding:"6px 14px", borderRadius:4, cursor:"pointer", fontSize:13, border:"none",
                fontFamily:"'DM Sans',system-ui,sans-serif", flexShrink:0,
                background:lightMode?"rgba(100,80,60,0.08)":"rgba(180,168,145,0.08)",
                color:lightMode?"#5a3e28":"#c8bca8",
                outline:`1px solid ${lightMode?"rgba(100,80,60,0.2)":"rgba(180,168,145,0.2)"}`,
              }}>Clear</button>}
            </div>

            <div style={{overflowY:"auto", flex:1, paddingRight:4}}>
              {filtered.map(decade => {
                const decadeKeys = decade.events.map(e => `${e.year}|${e.title}`);
                const decadeAllOn = decadeKeys.every(k => selected.has(k));
                return (
                  <div key={decade.decade} style={{marginBottom:14}}>
                    {/* Decade header */}
                    <div onClick={() => toggleDecade(decade.events)}
                      style={{display:"flex", alignItems:"center", gap:8, marginBottom:5, cursor:"pointer",
                        padding:"6px 10px", borderRadius:4, transition:"background 0.12s",
                        background: decadeAllOn ? (lightMode?"rgba(0,100,200,0.1)":"rgba(126,182,255,0.12)") : (lightMode?"rgba(0,100,200,0.04)":"rgba(126,182,255,0.04)"),
                        outline: decadeAllOn ? `1px solid ${lightMode?"rgba(0,100,200,0.3)":"rgba(126,182,255,0.25)"}` : `1px solid ${lightMode?"rgba(0,100,200,0.12)":"rgba(126,182,255,0.1)"}`,
                      }}>
                      <div style={{width:15, height:15, borderRadius:3, flexShrink:0,
                        border:`1px solid ${lightMode?"rgba(0,100,200,0.5)":"rgba(126,182,255,0.45)"}`,
                        background: decadeAllOn ? (lightMode?"rgba(0,100,200,0.5)":"rgba(126,182,255,0.4)") : "transparent",
                        display:"flex", alignItems:"center", justifyContent:"center",
                      }}>
                        {decadeAllOn && <span style={{fontSize:10,color:"#fff",fontWeight:700}}>✓</span>}
                      </div>
                      <span style={{fontSize:14, fontWeight:700, color:blue,
                        fontFamily:"'DM Sans',system-ui,sans-serif", textTransform:"uppercase",
                        letterSpacing:"0.1em", flex:1}}>{decade.decade}</span>
                      <span style={{fontSize:13, color:blueDim}}>
                        {decadeAllOn ? "deselect all" : "select all"}
                      </span>
                    </div>

                    {decade.events.map(ev => {
                      const key = `${ev.year}|${ev.title}`;
                      const already = existingKeys.has(key);
                      const checked = selected.has(key);
                      const myAge = dob ? Math.floor(ev.year - (new Date(dob).getFullYear() + new Date(dob).getMonth()/12)) : null;
                      return (
                        <div key={key} onClick={() => toggle(key)}
                          style={{display:"flex", alignItems:"center", gap:10, padding:"7px 10px",
                            borderRadius:4, cursor:"pointer",
                            background: checked ? (lightMode?"rgba(0,100,200,0.07)":"rgba(126,182,255,0.1)") : "transparent",
                            transition:"background 0.12s",
                          }}>
                          <div style={{width:16, height:16, borderRadius:3, flexShrink:0,
                            border: checked ? `1px solid ${lightMode?"rgba(0,100,200,0.6)":"rgba(126,182,255,0.6)"}` : `1px solid ${lightMode?"rgba(0,100,200,0.3)":"rgba(126,182,255,0.25)"}`,
                            background: checked ? (lightMode?"rgba(0,100,200,0.45)":"rgba(126,182,255,0.4)") : "transparent",
                            display:"flex", alignItems:"center", justifyContent:"center",
                          }}>
                            {checked && <span style={{fontSize:11,color:"#fff",fontWeight:700}}>✓</span>}
                          </div>
                          <span style={{fontSize:14, color:lightMode?"#7a5000":"#b8a880", width:40, flexShrink:0, fontWeight:600}}>{ev.year}</span>
                          <span style={{fontSize:14, color: checked ? (lightMode?"#1e1610":"#e8dcc8") : (lightMode?"#3a2810":"#c8b898"), flex:1, lineHeight:1.4}}>
                            {ev.title}
                            {already && !checked && <span style={{fontSize:12, color:blueDim, marginLeft:6}}>added</span>}
                          </span>
                          {myAge !== null && (
                            <span style={{fontSize:13, color:lightMode?"#7a5a3a":"#9a8e7e", flexShrink:0, fontStyle:"italic"}}>
                              {myAge >= 0 ? `age ${myAge}` : `${Math.abs(myAge)}y before`}
                            </span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex", alignItems:"center", gap:8,
              borderTop:`1px solid ${lightMode?"rgba(100,80,60,0.15)":"rgba(180,168,145,0.15)"}`, paddingTop:12, marginTop:8, flexShrink:0}}>
              <span style={{fontSize:13, color:lightMode?"#5a3e28":"#a09480", marginRight:"auto"}}>
                {selected.size} event{selected.size!==1?"s":""} selected
              </span>
              <button style={S.cancelBtn} onClick={onCancel}>Cancel</button>
              <button style={S.saveBtn} onClick={handleSync}>
                Update my world
              </button>
            </div>
          </div>
        </div>
      );
    }
