  // ─── MAIN APP ───
  function Crossroads() {
    const [lightMode, setLightMode] = useState(() => localStorage.getItem('attmtia-cr-lm') === '1');
    const S = buildT(lightMode);
    const T = S.T;

    const [people, setPeople] = useState(() => {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
      catch { return []; }
    });
    const [view, setView] = useState("roster");
    const [focusPerson, setFocusPerson] = useState(null);
    const [importMsg, setImportMsg] = useState(null);
    const [showAbout, setShowAbout] = useState(false);
    const [showShare, setShowShare] = useState(false);

    useEffect(() => {
      localStorage.setItem(STORE_KEY, JSON.stringify(people));
    }, [people]);

    const toggleLight = () => setLightMode(lm => {
      const next = !lm;
      localStorage.setItem('attmtia-cr-lm', next ? '1' : '0');
      return next;
    });

    // ─── IMPORT: new arrival or update by name+birthYear ───
    const handleImport = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = "";
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.type !== "attmtia-shared-self") {
            setImportMsg({ kind:"error", text:"This doesn't look like a Shared Self file. Export from All The Me That I Am → Privacy Review → Bring to the Crossroads." });
            return;
          }
          const { person } = imported;
          const matchIdx = people.findIndex(p =>
            p.person.name === person.name && p.person.birthYear === person.birthYear
          );
          if (matchIdx >= 0) {
            const updated = [...people];
            updated[matchIdx] = {
              ...updated[matchIdx],
              updatedAt: new Date().toISOString(),
              person: imported.person,
              events: imported.events || [],
              strands: imported.strands || [],
              worldEvents: imported.worldEvents || [],
            };
            setPeople(updated);
            setImportMsg({ kind:"success", text:`${person.name}'s shared self has been updated.` });
          } else {
            const colour = PERSON_COLOURS[people.length % PERSON_COLOURS.length];
            setPeople(prev => [...prev, {
              id: genId(),
              colour,
              importedAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
              person: imported.person,
              events: imported.events || [],
              strands: imported.strands || [],
              worldEvents: imported.worldEvents || [],
            }]);
            setImportMsg({ kind:"success", text:`${person.name} has arrived at the Crossroads.` });
          }
        } catch {
          setImportMsg({ kind:"error", text:"Could not read that file. Please try again." });
        }
      };
      reader.readAsText(file);
    };

    // ─── PER-PERSON UPDATE (fixes Roster Update button) ───
    const handlePersonUpdate = (personId, e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = "";
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.type !== "attmtia-shared-self") {
            setImportMsg({ kind:"error", text:"This doesn't look like a Shared Self file." });
            return;
          }
          setPeople(prev => prev.map(p =>
            p.id === personId ? {
              ...p,
              updatedAt: new Date().toISOString(),
              person: imported.person,
              events: imported.events || [],
              strands: imported.strands || [],
              worldEvents: imported.worldEvents || [],
            } : p
          ));
          setImportMsg({ kind:"success", text:`${imported.person.name}'s shared self has been updated.` });
        } catch {
          setImportMsg({ kind:"error", text:"Could not read that file. Please try again." });
        }
      };
      reader.readAsText(file);
    };

    const withdrawPerson = (id) => {
      const p = people.find(p => p.id === id);
      if (!p) return;
      if (!confirm(`Remove ${p.person.name} from the Crossroads entirely?\n\nThis cannot be undone here — they can always bring a new Shared Self file to return.`)) return;
      setPeople(prev => prev.filter(p => p.id !== id));
      if (focusPerson === id) { setFocusPerson(null); setView("roster"); }
      setImportMsg({ kind:"info", text:`${p.person.name} has stepped back from the Crossroads.` });
    };

    const ctx = { S, T, lightMode, people, setPeople, withdrawPerson, handlePersonUpdate, setView, setFocusPerson };

    return (
      <Ctx.Provider value={ctx}>
        <div style={S.app}>

          {/* ─── HEADER ─── */}
          <div style={S.header}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <img
                src={momoIcon}
                alt="MoMo Creative"
                onClick={() => setShowAbout(true)}
                style={{ width:38, height:38, borderRadius:8, flexShrink:0,
                  cursor:"pointer", opacity:0.9, transition:"opacity 0.2s" }}
                title="About The Crossroads"
              />
              <div>
                <div style={S.headerTitle}>The Crossroads</div>
                <div style={S.headerSub}>
                  {people.length === 0
                    ? "Waiting for the first arrival"
                    : `${people.length} ${people.length === 1 ? "life" : "lives"} gathered here`}
                </div>
              </div>
            </div>

            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <label style={{
                ...S.btnPrimary, display:"inline-flex", alignItems:"center",
                gap:7, cursor:"pointer", userSelect:"none",
              }}>
                <span style={{fontSize:15}}>⬆</span>
                <span>Receive a Shared Self</span>
                <input type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
              </label>
              <button onClick={() => { setShowAbout(true); }} style={{
                ...S.btn, padding:"7px 14px", fontSize:13,
              }}>About</button>
              <button onClick={() => setShowShare(true)} style={{
                padding:"7px 14px", borderRadius:5, cursor:"pointer", fontSize:13,
                border:`1px solid ${lightMode?"rgba(60,120,80,0.35)":"rgba(100,200,130,0.3)"}`,
                background:lightMode?"rgba(39,174,96,0.07)":"rgba(39,174,96,0.08)",
                color:lightMode?"#1a6b3a":"#81C784",
                fontFamily:"'DM Sans',system-ui,sans-serif",
                display:"inline-flex", alignItems:"center", gap:5,
                transition:"all 0.2s",
              }} title="Invite someone to try this">✉ Pass it on</button>
              <a href="https://ko-fi.com/momocreative" target="_blank" rel="noopener noreferrer"
                style={{
                  padding:"7px 14px", borderRadius:5, cursor:"pointer", fontSize:13,
                  border:`1px solid ${lightMode?"rgba(180,120,0,0.4)":"rgba(230,180,60,0.4)"}`,
                  background:lightMode?"rgba(180,120,0,0.08)":"rgba(230,180,60,0.08)",
                  color:lightMode?"#7a4f00":"#e8c468",
                  fontFamily:"'DM Sans',system-ui,sans-serif",
                  textDecoration:"none", display:"inline-flex", alignItems:"center", gap:5,
                  transition:"all 0.2s",
                }}>♡ Contribute</a>
              <button onClick={toggleLight} style={{
                ...S.btn, padding:"7px 12px", fontSize:16,
              }} title="Toggle light/dark">{lightMode ? "🌙" : "☀️"}</button>
            </div>
          </div>

          {/* ─── IMPORT MESSAGE ─── */}
          {importMsg && (
            <div style={{
              padding:"10px 28px", fontSize:13, flexShrink:0,
              background: importMsg.kind==="success"
                ? (lightMode?"rgba(39,174,96,0.1)":"rgba(39,174,96,0.12)")
                : importMsg.kind==="error"
                  ? (lightMode?"rgba(192,57,43,0.1)":"rgba(192,57,43,0.12)")
                  : (lightMode?"rgba(41,128,185,0.1)":"rgba(41,128,185,0.12)"),
              color: importMsg.kind==="success"
                ? (lightMode?"#1a6b3a":"#81C784")
                : importMsg.kind==="error"
                  ? (lightMode?"#8b1a1a":"#e07070")
                  : (lightMode?"#1a4a6b":"#7EB6FF"),
              borderBottom:`1px solid ${T.border}`,
              display:"flex", justifyContent:"space-between", alignItems:"center",
            }}>
              <span>{importMsg.text}</span>
              <button onClick={() => setImportMsg(null)} style={{
                background:"none", border:"none", cursor:"pointer",
                color:"inherit", fontSize:16, lineHeight:1, opacity:0.6,
              }}>×</button>
            </div>
          )}

          {/* ─── NAV ─── */}
          {people.length > 0 && (
            <div style={S.nav}>
              {[
                { id:"roster",   label:"Roster" },
                { id:"ayear",    label:"A Year" },
                { id:"onelife",  label:"One Life" },
                { id:"twolives", label:"Two Lives" },
              ].map(v => (
                <button key={v.id}
                  style={view===v.id ? S.navBtnActive : S.navBtn}
                  onClick={() => setView(v.id)}>
                  {v.label}
                </button>
              ))}
            </div>
          )}

          {/* ─── MAIN CONTENT ─── */}
          <div style={S.main}>
            {people.length === 0
              ? <EmptyState onAbout={() => setShowAbout(true)} />
              : view === "roster"   ? <RosterView/>
              : view === "ayear"    ? <AYearView/>
              : view === "onelife"  ? <OneLifeView focusId={focusPerson} setFocusId={setFocusPerson}/>
              : view === "twolives" ? <TwoLivesView/>
              : null
            }
          </div>

          {/* ─── ABOUT MODAL ─── */}
          {showAbout && <AboutModal onClose={() => setShowAbout(false)} />}
          {/* ─── SHARE MODAL ─── */}
          {showShare && <ShareModal onClose={() => setShowShare(false)} people={people} />}
        </div>
      </Ctx.Provider>
    );
  }

  // ─── EMPTY STATE ───
  function EmptyState({ onAbout }) {
    const { S, T } = useContext(Ctx);
    return (
      <div style={{
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        height:"100%", padding:40, textAlign:"center",
      }}>
        <img src={momoIcon} alt="MoMo Creative"
          style={{ width:56, height:56, borderRadius:12, marginBottom:20, opacity:0.7 }} />
        <div style={{
          fontFamily:"'Cormorant Garamond',Georgia,serif",
          fontSize:32, fontWeight:300, color:T.text, marginBottom:12,
        }}>
          The Crossroads is empty.
        </div>
        <div style={{
          fontFamily:"'Cormorant Garamond',Georgia,serif",
          fontSize:16, color:T.textDim, lineHeight:1.8, maxWidth:480, marginBottom:32,
        }}>
          A crossroads only becomes one when more than one path arrives.<br/>
          Bring the first Shared Self to begin.
        </div>
        <div style={{
          fontSize:15, color:T.textDim, lineHeight:1.8, maxWidth:460,
          padding:"18px 24px", border:`1px solid ${T.borderMid}`, borderRadius:8,
          background:T.bg2, marginBottom:20,
        }}>
          In <strong style={{color:T.textMid}}>All The Me That I Am</strong>, open the{" "}
          <strong style={{color:T.textMid}}>🔒 Privacy</strong> view, review your events,
          then click <strong style={{color:T.textMid}}>⬆ Bring to the Crossroads</strong> to
          export your Shared Self. Bring that file here using the button above.
        </div>
        <button onClick={onAbout} style={{
          fontSize:13, color:T.textDimmer, background:"none", border:"none",
          cursor:"pointer", textDecoration:"underline", fontFamily:"'DM Sans',system-ui,sans-serif",
        }}>Learn more about how the Crossroads works</button>
      </div>
    );
  }

  // ─── ROSTER VIEW ───
  function RosterView() {
    const { S, T, lightMode, people, withdrawPerson, handlePersonUpdate } = useContext(Ctx);
    const totalEvents = people.reduce((n, p) => n + p.events.length, 0);

    return (
      <div style={{ padding:"32px 40px", maxWidth:900, margin:"0 auto" }}>
        <div style={{
          fontFamily:"'Cormorant Garamond',Georgia,serif",
          fontSize:26, fontWeight:400, color:T.text, marginBottom:6,
        }}>
          Who is here
        </div>
        <div style={{
          fontSize:14, color:T.textDim, marginBottom:28,
          fontFamily:"'Cormorant Garamond',Georgia,serif", fontStyle:"italic",
        }}>
          {people.length} {people.length===1?"life":"lives"} · {totalEvents} shared {totalEvents===1?"moment":"moments"} between them
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {people.map((p) => {
            const age = p.person.birthYear
              ? new Date().getFullYear() - p.person.birthYear
              : null;
            const updated = new Date(p.updatedAt).toLocaleDateString("en-AU", {
              day:"numeric", month:"long", year:"numeric"
            });
            return (
              <div key={p.id} style={{
                ...S.card,
                borderLeft:`3px solid ${p.colour}`,
                display:"flex", alignItems:"center", gap:20,
              }}>
                {/* Colour avatar */}
                <div style={{
                  width:44, height:44, borderRadius:"50%", flexShrink:0,
                  background:`radial-gradient(circle at 35% 35%, ${p.colour}cc, ${p.colour}55)`,
                  border:`2px solid ${p.colour}66`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"'Cormorant Garamond',Georgia,serif",
                  fontSize:18, color:T.text,
                }}>
                  {p.person.name.charAt(0).toUpperCase()}
                </div>

                {/* Info */}
                <div style={{ flex:1 }}>
                  <div style={{
                    fontFamily:"'Cormorant Garamond',Georgia,serif",
                    fontSize:20, fontWeight:400, color:T.text, marginBottom:2,
                  }}>{p.person.name}</div>
                  <div style={{ fontSize:15, color:T.textDim }}>
                    {p.person.birthYear && `Born ${p.person.birthYear}`}
                    {age !== null && ` · Age ${age}`}
                    {p.person.lifeExpectancy && ` · Life expectancy ${p.person.lifeExpectancy}`}
                  </div>
                  <div style={{ fontSize:14, color:T.textDimmer, marginTop:3 }}>
                    <span style={{ color:lightMode?"rgba(41,128,185,0.9)":"#90C8FF" }}>
                      {p.events.length} shared {p.events.length===1?"event":"events"}
                    </span>
                    {p.strands?.length > 0 && (
                      <span style={{ color:T.textDimmer }}>
                        {" · "}{p.strands.length} {p.strands.length===1?"relationship":"relationships"}
                      </span>
                    )}
                    {" · "}Last brought {updated}
                  </div>
                </div>

                {/* Actions */}
                <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                  <label style={{ ...S.btn, padding:"7px 16px", fontSize:14,
                    cursor:"pointer", display:"inline-flex", alignItems:"center", gap:5 }}
                    title={`Update ${p.person.name}'s shared self`}>
                    ↑ Update
                    <input type="file" accept=".json" style={{display:"none"}}
                      onChange={(e) => handlePersonUpdate(p.id, e)}
                    />
                  </label>
                  <button style={S.btnDanger} onClick={() => withdrawPerson(p.id)}
                    title={`Remove ${p.person.name} from the Crossroads`}>
                    Withdraw
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        {/* How it works note */}
        <div style={{
          marginTop:36, padding:"18px 22px", border:`1px solid ${T.borderMid}`,
          borderRadius:8, fontSize:14, color:T.textDim, lineHeight:1.8,
          background: lightMode?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.02)",
        }}>
          <strong style={{color:T.textMid}}>How the Crossroads works.</strong>{" "}
          Each person brings only what they chose to share — their private moments remain their own.
          When someone updates their Shared Self, their previous version is replaced entirely.
          To withdraw entirely, click Withdraw — they can always return with a new file.
          The Crossroads never connects to anyone's original file directly.
        </div>
      </div>
    );
  }

  // ─── A YEAR VIEW ───
  function AYearView() {
    const { S, T, lightMode, people } = useContext(Ctx);

    const currentYear = new Date().getFullYear();
    const allYears = people.flatMap(p => p.events.map(e => e.year)).filter(Boolean);
    const minYear = allYears.length ? Math.min(...allYears) : currentYear - 50;
    const maxYear = Math.max(currentYear, ...(allYears.length ? allYears : [currentYear]));

    const [year, setYear] = useState(currentYear);

    const profiles = people.map(p => {
      const age = p.person.birthYear ? year - p.person.birthYear : null;
      const alive = age !== null ? (age >= 0 && age <= p.person.lifeExpectancy) : true;
      const activeEvents = p.events.filter(e => {
        const start = e.year;
        const end = e.endYear || e.year;
        return year >= start && year <= end;
      });
      const pointEvents = p.events.filter(e => e.year === year && !e.endYear);
      const spanEvents = p.events.filter(e => {
        if (!e.endYear) return false;
        return year >= e.year && year <= e.endYear;
      });
      return { p, age, alive, pointEvents, spanEvents, activeEvents };
    }).filter(pr => pr.alive);

    return (
      <div style={{ padding:"28px 40px", maxWidth:960, margin:"0 auto" }}>
        <div style={{ marginBottom:28 }}>
          <div style={{
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize:26, fontWeight:400, color:T.text, marginBottom:4,
          }}>
            A Year
          </div>
          <div style={{
            fontSize:14, color:T.textDim, marginBottom:20,
            fontFamily:"'Cormorant Garamond',Georgia,serif", fontStyle:"italic",
          }}>
            Move through time. See what each person was living.
          </div>

          <div style={{ display:"flex", alignItems:"center", gap:20, flexWrap:"wrap" }}>
            <div style={{
              fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:48, fontWeight:300, color:T.text, lineHeight:1, minWidth:90,
            }}>{year}</div>
            <div style={{ flex:1, minWidth:200 }}>
              <input type="range" min={minYear} max={maxYear} step={1} value={year}
                onChange={e => setYear(parseInt(e.target.value))}
                style={{ width:"100%", cursor:"pointer" }}/>
              <div style={{ display:"flex", justifyContent:"space-between",
                fontSize:14, color:T.textDim, marginTop:4 }}>
                <span>{minYear}</span>
                <span>{maxYear}</span>
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button style={S.btn} onClick={() => setYear(y => Math.max(minYear, y-1))}>◀</button>
              <button style={S.btn} onClick={() => setYear(currentYear)}>Now</button>
              <button style={S.btn} onClick={() => setYear(y => Math.min(maxYear, y+1))}>▶</button>
            </div>
          </div>
        </div>

        {profiles.length === 0 ? (
          <div style={{
            textAlign:"center", padding:40,
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize:18, color:T.textDim, fontStyle:"italic",
          }}>
            No one at the Crossroads was yet born in {year}, or all have passed beyond it.
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {profiles.map(({ p, age, pointEvents, spanEvents, activeEvents }) => (
              <div key={p.id} style={{ ...S.card, borderLeft:`3px solid ${p.colour}` }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:12, marginBottom:10 }}>
                  <span style={{
                    fontFamily:"'Cormorant Garamond',Georgia,serif",
                    fontSize:20, fontWeight:400, color:T.text,
                  }}>{p.person.name}</span>
                  {age !== null && (
                    <span style={{ fontSize:14, color:p.colour, fontWeight:500 }}>Age {age}</span>
                  )}

  // ─── ONE LIFE VIEW ───
  function OneLifeView({ focusId, setFocusId }) {
    const { S, T, lightMode, people } = useContext(Ctx);
    const [selectedId, setSelectedId] = useState(focusId || (people[0]?.id || null));
    const [groupBy, setGroupBy] = useState("decade");

    const person = people.find(p => p.id === selectedId);

    if (!person) return (
      <div style={{ padding:40, color:T.textDim, fontStyle:"italic",
        fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:18, textAlign:"center" }}>
        Select a person from the roster.
      </div>
    );

    const events = [...person.events].sort((a,b) => (a.year||0)-(b.year||0));

    const byDecade = {};
    events.forEach(ev => {
      const decade = Math.floor((ev.year||0)/10)*10;
      const key = `${decade}s`;
      if (!byDecade[key]) byDecade[key] = { label:`${decade}s`, decade, events:[] };
      byDecade[key].events.push(ev);
    });
    const decadeGroups = Object.values(byDecade).sort((a,b) => a.decade - b.decade);

    const byLayer = {};
    events.forEach(ev => {
      const key = ev.layer || "other";
      if (!byLayer[key]) byLayer[key] = { label: ev.layerLabel || key, color: ev.layerColor || "#888", events:[] };
      byLayer[key].events.push(ev);
    });
    const layerGroups = Object.values(byLayer).sort((a,b) => b.events.length - a.events.length);
    const groups = groupBy === "decade" ? decadeGroups : layerGroups;

    const age = person.person.birthYear ? new Date().getFullYear() - person.person.birthYear : null;

    return (
      <div style={{ padding:"28px 40px", maxWidth:860, margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:24, flexWrap:"wrap" }}>
          <div style={{ flex:1 }}>
            <div style={{
              fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:26, fontWeight:400, color:T.text, marginBottom:2,
            }}>One Life</div>
            <div style={{ fontSize:14, color:T.textDim, fontStyle:"italic",
              fontFamily:"'Cormorant Garamond',Georgia,serif" }}>
              The shared self of one person, seen whole.
            </div>
          </div>
          <select value={selectedId || ""} onChange={e => setSelectedId(e.target.value)}
            style={{ ...S.input, width:"auto", minWidth:160 }}>
            {people.map(p => (
              <option key={p.id} value={p.id}>{p.person.name}</option>
            ))}
          </select>
        </div>

        <div style={{
          ...S.card, borderLeft:`3px solid ${person.colour}`,
          display:"flex", gap:20, marginBottom:24, alignItems:"center",
        }}>
          <div style={{
            width:50, height:50, borderRadius:"50%", flexShrink:0,
            background:`radial-gradient(circle at 35% 35%, ${person.colour}cc, ${person.colour}44)`,
            border:`2px solid ${person.colour}66`,
            display:"flex", alignItems:"center", justifyContent:"center",
            fontFamily:"'Cormorant Garamond',Georgia,serif", fontSize:22, color:T.text,
          }}>{person.person.name.charAt(0)}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif",
              fontSize:22, color:T.text, marginBottom:3 }}>{person.person.name}</div>
            <div style={{ fontSize:13, color:T.textDim }}>
              {person.person.birthYear && `Born ${person.person.birthYear}`}
              {age !== null && ` · Age ${age}`}
              {" · "}
              <span style={{ color:person.colour }}>{events.length} shared {events.length===1?"moment":"moments"}</span>
            </div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            {["decade","layer"].map(g => (
              <button key={g} onClick={() => setGroupBy(g)} style={{
                padding:"5px 12px", borderRadius:20, fontSize:12, cursor:"pointer",
                border: groupBy===g
                  ? `1px solid ${lightMode?"rgba(100,70,30,0.4)":"rgba(197,168,130,0.35)"}`
                  : `1px solid ${T.border}`,
                background: groupBy===g
                  ? (lightMode?"rgba(100,70,30,0.08)":"rgba(197,168,130,0.08)")
                  : "transparent",
                color: groupBy===g ? (lightMode?"#5a3010":"#c8a870") : T.textDim,
              }}>{g.charAt(0).toUpperCase()+g.slice(1)}</button>
            ))}
          </div>
        </div>

        {events.length === 0 ? (
          <div style={{ textAlign:"center", padding:40,
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize:16, color:T.textDim, fontStyle:"italic" }}>
            {person.person.name} has not shared any events yet.
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
            {groups.map(group => (
              <div key={group.label}>
                <div style={{
                  display:"flex", alignItems:"center", gap:10,
                  padding:"6px 12px", borderRadius:5, marginBottom:6,
                  background: lightMode?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.03)",
                  border:`1px solid ${T.border}`,
                }}>
                  {group.color && (
                    <span style={{ width:9, height:9, borderRadius:"50%",
                      background:group.color, display:"inline-block", flexShrink:0 }}/>
                  )}
                  <span style={{ fontSize:13, fontWeight:700, color:T.textMid,
                    textTransform:"uppercase", letterSpacing:"0.08em", flex:1 }}>
                    {group.label}
                  </span>
                  <span style={{ fontSize:12, color:T.textDimmer }}>
                    {group.events.length} {group.events.length===1?"event":"events"}
                  </span>
                </div>

                {group.events.map(ev => (
                  <div key={ev.id} style={{
                    display:"flex", gap:12, padding:"8px 12px",
                    borderBottom:`1px solid ${T.border}`, alignItems:"flex-start",
                  }}>
                    <span style={{
                      fontSize:13, fontWeight:600, color:person.colour,
                      width:42, flexShrink:0, paddingTop:1,
                    }}>{ev.year}</span>
                    <span style={{
                      width:8, height:8, borderRadius:"50%", flexShrink:0,
                      background: ev.layerColor || person.colour, marginTop:5,
                    }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:15, color:T.text, lineHeight:1.5 }}>
                        {ev.title}
                        {ev.endYear && (
                          <span style={{ fontSize:13, color:T.textDimmer, marginLeft:8 }}>
                            → {ev.endYear}
                          </span>
                        )}
                      </div>
                      {ev.notes && (
                        <div style={{ fontSize:14, color:T.textDim, marginTop:3,
                          fontStyle:"italic", lineHeight:1.5 }}>{ev.notes}</div>
                      )}
                      {groupBy === "decade" && (
                        <div style={{ fontSize:13, color:T.textDimmer, marginTop:2 }}>
                          {ev.layerLabel}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ─── TWO LIVES VIEW ───

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:28 }}>
          {[{id:idA,setId:setIdA,person:pA},{id:idB,setId:setIdB,person:pB}].map(({id,setId,person},i) => (
            <div key={i} style={{
              ...S.card,
              borderLeft: person ? `3px solid ${person.colour}` : `3px solid ${T.border}`,
              display:"flex", alignItems:"center", gap:12,

              {person && (

                  background:`radial-gradient(circle at 35% 35%, ${person.colour}cc, ${person.colour}44)`,
                  display:"flex", alignItems:"center", justifyContent:"center",

          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 60px 1fr",

              <div style={{ fontSize:16, fontWeight:700, color:pA.colour,
                padding:"4px 12px" }}>{pA.person.name}</div>
              <div/>
              <div style={{ fontSize:16, fontWeight:700, color:pB.colour,
                padding:"4px 12px", textAlign:"right" }}>{pB.person.name}</div>
            </div>

            {allYears.map(yr => {
              const evA = pA.events.filter(e => e.year === yr || (e.endYear && yr >= e.year && yr <= e.endYear));
              const evB = pB.events.filter(e => e.year === yr || (e.endYear && yr >= e.year && yr <= e.endYear));

              const ageB = pB.person.birthYear ? yr - pB.person.birthYear : null;

              return (
                <div key={yr} style={{
                  display:"grid", gridTemplateColumns:"1fr 60px 1fr",
                  borderBottom:`1px solid ${T.border}`,
                  background: lightMode?"rgba(0,0,0,0.01)":"rgba(255,255,255,0.01)",
                  marginBottom:2,
                }}>
                  <div style={{ padding:"8px 12px" }}>
                    {evA.map(ev => (
                      <div key={ev.id} style={{ marginBottom:6 }}>
                        <div style={{ fontSize:15, color:T.text, lineHeight:1.5 }}>{ev.title}</div>
                        {ev.notes && <div style={{ fontSize:13, color:T.textDim,
                          fontStyle:"italic", lineHeight:1.4 }}>{ev.notes}</div>}
                        <div style={{ fontSize:13, color:T.textDimmer }}>{ev.layerLabel}</div>
                      </div>

                  <div style={{ display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center",
                    borderLeft:`1px solid ${T.border}`, borderRight:`1px solid ${T.border}`,
                    padding:"4px 0",

                    <span style={{ fontSize:14, fontWeight:700, color:T.textMid }}>{yr}</span>
                    {ageA !== null && <span style={{ fontSize:12, color:pA.colour }}>{ageA}</span>}

                  <div style={{ padding:"8px 12px" }}>
                    {evB.map(ev => (
                      <div key={ev.id} style={{ marginBottom:6 }}>
                        <div style={{ fontSize:15, color:T.text, lineHeight:1.5 }}>{ev.title}</div>
                        {ev.notes && <div style={{ fontSize:13, color:T.textDim,

                  </div>

        {pA && pB && allYears.length === 0 && (
          <div style={{ textAlign:"center", padding:40,
            fontFamily:"'Cormorant Garamond',Georgia,serif",
            fontSize:16, color:T.textDim, fontStyle:"italic" }}>

          </div>
        )}
      </div>
    );

  // ─── SHARE / PASS IT ON MODAL ───
  function ShareModal({ onClose, people }) {
    const { S, T, lightMode } = useContext(Ctx);
    const [toEmail, setToEmail]       = useState("");
    const [personalNote, setPersonalNote] = useState("");
    const [includeSharedSelf, setIncludeSharedSelf] = useState(false);
    const [selectedPerson, setSelectedPerson] = useState(people[0]?.id || null);
    const [appDownloaded, setAppDownloaded]   = useState(false);
    const [dataDownloaded, setDataDownloaded] = useState(false);
    const [step, setStep] = useState(1); // 1 = compose, 2 = send

    const MOMO_SITE = "https://the-clan.wixsite.com/momocreative";
    const KOFI      = "https://ko-fi.com/momocreative";

    // Download a clean copy of the app (no localStorage — that's per-browser)
    const downloadApp = () => {
      const html = document.documentElement.outerHTML;
      const blob = new Blob([html], { type:"text/html" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "the-crossroads.html";
      a.click();
      URL.revokeObjectURL(url);
      setAppDownloaded(true);
    };

    // Re-export one person's Shared Self from the Crossroads data
    const downloadSharedSelf = () => {
      const p = people.find(p => p.id === selectedPerson);
      if (!p) return;
      const payload = {
        type:        "attmtia-shared-self",
        exportedAt:  new Date().toISOString(),
        person:      p.person,
        events:      p.events  || [],
        strands:     p.strands || [],
        worldEvents: p.worldEvents || [],
      };
      const blob     = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const url      = URL.createObjectURL(blob);
      const a        = document.createElement("a");
      const safeName = (p.person.name || "shared-self").replace(/\s+/g,"-").toLowerCase();
      a.href         = url;
      a.download     = `crossroads-${safeName}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setDataDownloaded(true);
    };

    // Build the mailto body
    const buildEmailBody = () => {
      const note = personalNote.trim();
      const selectedP = people.find(p => p.id === selectedPerson);
      const sharedSelfLine = includeSharedSelf && selectedP
        ? `\nI've also attached my Shared Self — a small file with the parts of my own life I'm happy for you to see. You can import it into the Crossroads immediately to get a sense of how it works, and to see where our lives might line up.\n`
        : "";

      return encodeURIComponent(
`${note ? note + "\n\n---\n\n" : ""}I wanted to pass something on to you.

It's a free app called The Crossroads. It's for families, or people who are close enough that the question "what were you living, during the years I wasn't paying close enough attention?" starts to feel worth asking.

The short version: you map your own life privately in a companion app called All The Me That I Am — your events, your relationships, the years that mattered. Then you decide what you're willing to share. The Crossroads holds the shared parts from multiple people, side by side, across time. You can ask where your lives ran alongside each other, and where they didn't. You can see what someone was carrying during a year you remember for something entirely different.

No accounts. No internet connection. No tracking. Nothing leaves your device unless you choose to share it. You open it in a browser, and it's there.
${sharedSelfLine}
I've attached a copy of the app. Open it in any browser. Or download the latest version from the MoMo Creative website:
${MOMO_SITE}

If you find it useful and want to support the person who built it:
${KOFI}

The Crossroads is a place you arrive at. It doesn't summon you.`
      );
    };

    const openEmail = () => {
      const subject = encodeURIComponent("Something worth passing on — The Crossroads");
      const to      = encodeURIComponent(toEmail.trim());
      const body    = buildEmailBody();
      window.open(`mailto:${to}?subject=${subject}&body=${body}`, "_self");
    };

    // ── shared panel colours ──
    const panelColors = {
      green:   { bg: lightMode?"#e8f8f5":"rgba(39,174,96,0.09)",  border:"#27ae60" },
      amber:   { bg: lightMode?"#fef9e7":"rgba(220,168,40,0.11)", border:lightMode?"#e0a020":"#d4a020" },
      blue:    { bg: lightMode?"#eaf4fb":"rgba(41,128,185,0.10)", border:"#3498db" },
      neutral: { bg: lightMode?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.03)", border:T.borderMid },
    };
    const Panel = ({ color="neutral", children, style }) => {
      const c = panelColors[color] || panelColors.neutral;

          {children}

            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.5)",
                textTransform:"uppercase", letterSpacing:"0.13em",

                MoMo Creative

              <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif",
                fontSize:22, fontWeight:400, color:"#fff" }}>
                Pass it on

                fontFamily:"'DM Sans',system-ui,sans-serif", marginTop:3 }}>

            {/* Step 1 — Who are you inviting */}

                    <Bullet>World events they chose to include.</Bullet>
                    <Bullet>Basic biographical data: name, birth year, life expectancy.</Bullet>
                  </Panel>
                </Section>

                <Section title="What the Crossroads does not hold">
                  <Panel color="red">
                    <Bullet><strong>Private events</strong> — marked private in ATTMTIA, never appear in any Shared Self file and are never visible here.</Bullet>
                    <Bullet><strong>Full backup data</strong> — the Shared Self export is not a backup. It contains only shared content.</Bullet>
                    <Bullet><strong>Any connection to the original file</strong> — there is no live link. No sync. No pull.</Bullet>
                    <Bullet><strong>Historical versions</strong> — when a person updates their contribution, the previous version is gone.</Bullet>
                  </Panel>
                </Section>

                <Section title="Local storage — what this means">
                  <P>
                    The Crossroads stores all data in your browser's local storage. This means:
                  </P>
                  <Bullet>No data is transmitted to any server.</Bullet>
                  <Bullet>No account is required. No login. No tracking.</Bullet>
                  <Bullet>Clearing your browser's data, or switching browsers or devices, will erase the Crossroads data.</Bullet>
                  <Bullet>Private browsing / incognito mode may not save data between sessions.</Bullet>
                  <Panel color="amber" style={{marginTop:12}}>
                    <Note>
                      Keep a record of whose Shared Self files you hold so you can re-import if
                      your browser data is ever cleared. Export regularly.
                    </Note>
                  </Panel>
                </Section>

                    </P>
                    <P>

                      never included in the Shared Self file — they are not present in the data at
                      all. There is nothing to intercept. There is nothing to breach.
                    </P>
                    <P dim>This is the only design worth building.</P>
                  </Panel>
                </Section>
